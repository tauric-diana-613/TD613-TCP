# PR-triggered finalization: 2026-07-16T19:00Z
name: Amari Vercel budget finalizer

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/amari-vercel-budget-finalizer.yml"
  push:
    branches:
      - amari/vercel-11-function-budget
    paths:
      - ".github/workflows/amari-vercel-budget-finalizer.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: amari/vercel-11-function-budget
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies without lifecycle hooks
        run: npm ci --ignore-scripts
      - name: Apply 11-plus-1 function-budget repair
        run: node scripts/repair-vercel-function-budget.mjs
      - name: Validate function count, routes, provider boundaries, and anti-drift law
        run: |
          node tests/vercel-deploy-hygiene.test.mjs
          node tests/gemini-quality-routing-vercel.test.mjs
          node tests/gemini-model-policy.test.mjs
          node tests/hush-gemini-quality-router.test.mjs
          node tests/khonapolit-gemini-quality-router.test.mjs
          node tests/hush-backend-prompt-detox.test.mjs
          node tests/hush-strict-provider-integrity.test.mjs
          node tests/hush-phase34-expressive-generation.test.mjs
          node tests/khonapolit-api-contract.test.mjs
          node tests/product-architecture/ledger.test.mjs
      - name: Remove one-shot machinery and transient diagnostics
        run: |
          rm -f scripts/repair-vercel-function-budget.mjs
          rm -f .github/workflows/amari-vercel-function-budget-repair.yml
          rm -f .github/workflows/amari-vercel-budget-finalizer.yml
          rm -f .github/amari-vercel-repair-diagnostics.txt
      - name: Validate release plumbing after cleanup
        run: npm run test:release
      - name: Commit repaired deployment surface
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Restore Vercel 11-plus-1 function budget"
          git push origin HEAD:amari/vercel-11-function-budget
