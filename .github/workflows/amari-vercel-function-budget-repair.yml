name: Amari one-shot Vercel function budget repair

on:
  push:
    branches:
      - amari/vercel-11-function-budget
  pull_request:
    branches:
      - main
    paths:
      - "scripts/repair-vercel-function-budget.mjs"
      - ".github/workflows/amari-vercel-function-budget-repair.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  repair:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: amari/vercel-11-function-budget
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies without lifecycle hooks
        run: npm ci --ignore-scripts
      - name: Apply repair and capture focused diagnostics
        id: diagnose
        shell: bash
        run: |
          set +e
          node scripts/repair-vercel-function-budget.mjs > /tmp/amari-vercel-repair-diagnostics.txt 2>&1
          repair_status=$?
          if [ "$repair_status" -eq 0 ]; then
            for test_file in \
              tests/vercel-deploy-hygiene.test.mjs \
              tests/gemini-quality-routing-vercel.test.mjs \
              tests/gemini-model-policy.test.mjs \
              tests/hush-gemini-quality-router.test.mjs \
              tests/khonapolit-gemini-quality-router.test.mjs \
              tests/hush-backend-prompt-detox.test.mjs \
              tests/hush-strict-provider-integrity.test.mjs \
              tests/hush-phase34-expressive-generation.test.mjs \
              tests/khonapolit-api-contract.test.mjs
            do
              printf '\n===== %s =====\n' "$test_file" >> /tmp/amari-vercel-repair-diagnostics.txt
              node "$test_file" >> /tmp/amari-vercel-repair-diagnostics.txt 2>&1
              test_status=$?
              printf 'exit_status=%s\n' "$test_status" >> /tmp/amari-vercel-repair-diagnostics.txt
            done
          fi
          git reset --hard HEAD
          git clean -fd
          cp /tmp/amari-vercel-repair-diagnostics.txt .github/amari-vercel-repair-diagnostics.txt
      - name: Commit diagnostics receipt
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/amari-vercel-repair-diagnostics.txt
          git commit -m "Record Vercel function budget repair diagnostics"
          git push origin HEAD:amari/vercel-11-function-budget
