name: Apply Flight date refresh fix

on:
  push:
    branches: [ main ]
    paths:
      - .github/workflows/apply-flight-date-refresh.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-flight-date-refresh-fix
  cancel-in-progress: true

jobs:
  apply:
    if: github.repository == 'tauric-diana-613/TD613-TCP'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Patch TD613 Flight date refresh behavior
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          python3 <<'PY'
          from pathlib import Path

          flight = Path('app/safe-harbor/td613-flight.html')
          workflow = Path('.github/workflows/apply-flight-date-refresh.yml')
          html = flight.read_text(encoding='utf-8')

          if 'function refreshFlightDateForOpen' not in html:
              anchor = '''function getBrowserDateValue() {
const now = new Date();
const local = new Date(now.getTime() - now.getTimezoneOffset() * 60000);
return local.toISOString().slice(0, 10);
}
'''
              insert = anchor + '''
function rewriteFlightAuthDateInText(value, nextDate) {
return String(value || "").split("\n").map(line => {
if (!line.includes("TD613-Binding:")) return line;
return line.replace(/\b\d{4}-\d{2}-\d{2}\b/g, nextDate);
}).join("\n");
}

function refreshFlightDateForOpen(options = {}) {
const opts = { rebuild: true, persist: true, ...options };
const nextDate = getBrowserDateValue();
const dateInput = document.getElementById("authDate");
const output = document.getElementById("outputText");
const previousDate = dateInput ? dateInput.value : "";
if (dateInput && dateInput.value !== nextDate) dateInput.value = nextDate;
if (output && output.value) output.value = rewriteFlightAuthDateInText(output.value, nextDate);
if (opts.rebuild && typeof buildOutput === "function") buildOutput();
else {
try { updateOutputStatus(); } catch (error) {}
try { updateVisualState(); } catch (error) {}
if (opts.persist) try { persistFlightDraft(); } catch (error) {}
}
return { date: nextDate, previousDate };
}
'''
              if anchor not in html:
                  raise SystemExit('getBrowserDateValue anchor not found')
              html = html.replace(anchor, insert, 1)

          html = html.replace('''if (!key || el.id === "flightShiInput") return;
if (el.type === "checkbox" || el.type === "radio") {''', '''if (!key || el.id === "flightShiInput" || el.id === "authDate") return;
if (el.type === "checkbox" || el.type === "radio") {''', 1)

          html = html.replace('''if (!saved || el.id === "flightShiInput") return;
if (el.type === "checkbox" || el.type === "radio") {''', '''if (!saved || el.id === "flightShiInput" || el.id === "authDate") return;
if (el.type === "checkbox" || el.type === "radio") {''', 1)

          html = html.replace('''const restoredDraft = restoreFlightDraft();
if (!restoredDraft) clearAll();
initFlightShiGate();''', '''const restoredDraft = restoreFlightDraft();
if (!restoredDraft) clearAll();
refreshFlightDateForOpen({ rebuild: false, persist: false });
initFlightShiGate();''', 1)

          event_anchor = '''document.getElementById("outputText").addEventListener("input", () => {
updateOutputStatus();
persistFlightDraft();
});
'''
          event_insert = event_anchor + '''window.addEventListener("pageshow", () => refreshFlightDateForOpen({ rebuild: true, persist: true }), { passive: true });
document.addEventListener("visibilitychange", () => {
if (document.visibilityState === "visible") refreshFlightDateForOpen({ rebuild: true, persist: true });
});
'''
          if 'visibilitychange", () => {' not in html:
              if event_anchor not in html:
                  raise SystemExit('outputText listener anchor not found')
              html = html.replace(event_anchor, event_insert, 1)

          if workflow.exists():
              workflow.unlink()

          flight.write_text(html, encoding='utf-8')
          PY

          grep -q 'function refreshFlightDateForOpen' app/safe-harbor/td613-flight.html
          grep -q 'visibilitychange' app/safe-harbor/td613-flight.html
          grep -q 'el.id === "authDate"' app/safe-harbor/td613-flight.html
          git add app/safe-harbor/td613-flight.html .github/workflows/apply-flight-date-refresh.yml
          git diff --cached --quiet && exit 0
          git commit -m "Refresh Flight authorship date on every open"
          git push origin HEAD:main
