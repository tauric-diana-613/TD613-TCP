name: Apply Ash Phase 1 Hardening

on:
  push:
    branches:
      - amari/ash-phase01-hardening
    paths:
      - "scripts/apply_phase1_hardening.py"
      - ".github/workflows/apply-phase1-hardening.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: amari/ash-phase01-hardening
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: npm ci
      - run: python -m pip install --disable-pip-version-check pytest sympy
      - name: Materialize hardening patch
        run: python scripts/apply_phase1_hardening.py
      - name: Validate focused JavaScript contract
        run: node tests/dome-world-phase1-hardening.test.mjs
      - name: Validate focused Python contract
        run: python -m pytest packages/dome_world_exact/tests/test_phase1_hardening.py -q
      - name: Re-run existing Phase 1 browser contract
        run: node tests/dome-world-ash-custody.test.mjs
      - name: Re-run existing API integration
        run: python -m pytest packages/dome_world_exact/tests/test_api_integration.py -q
      - name: Commit materialized patch
        shell: bash
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "No patch changes to commit."
            exit 0
          fi
          git config user.name "td613-phase1-hardening[bot]"
          git config user.email "td613-phase1-hardening[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(ash): close Phase 1 post-review seams"
          git push origin HEAD:amari/ash-phase01-hardening
