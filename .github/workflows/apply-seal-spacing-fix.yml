name: Apply seal spacing fix

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-seal-spacing-fix
  cancel-in-progress: true

jobs:
  apply:
    if: github.repository == 'tauric-diana-613/TD613-TCP'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Patch Flight seal spacing in source file
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          python3 <<'PY'
          from pathlib import Path

          flight = Path('app/safe-harbor/td613-flight.html')
          analytics = Path('app/analytics.js')
          test = Path('tests/td613-flight-mobile-layout.test.mjs')
          workflow = Path('.github/workflows/apply-seal-spacing-fix.yml')

          html = flight.read_text(encoding='utf-8')
          start = html.find('/* PR167_SENTINEL restore Seal spacing panels to side-by-side desktop layout */')
          if start < 0:
              start = html.find('/* PR168_SENTINEL definitive Seal spacing panel repair.')
          if start < 0:
              raise SystemExit('Could not find seal spacing CSS sentinel')
          end = html.find('\n\n</style>', start)
          if end < 0:
              raise SystemExit('Could not find seal spacing CSS block end')

          pr168_css = '''/* PR168_SENTINEL definitive Seal spacing panel repair.
   This must come after the older PR90/PR91 mobile/coarse-pointer patches because those
   patches assign section-split children by nth-child and grid-template-areas. */
.flight-lane-output .seal-card .seal-spacing-grid {
  display: grid !important;
  grid-template-columns: minmax(0, .86fr) minmax(0, 1.14fr) !important;
  grid-template-areas: "target zwnj" !important;
  align-items: stretch !important;
  gap: .46rem !important;
  margin-top: .08rem !important;
}

.flight-lane-output .seal-card .seal-spacing-grid > div {
  min-width: 0 !important;
  align-self: stretch !important;
  margin-top: 0 !important;
  transform: none !important;
  -webkit-transform: none !important;
}

.flight-lane-output .seal-card .seal-target-panel {
  grid-area: target !important;
}

.flight-lane-output .seal-card .seal-zwnj-panel {
  grid-area: zwnj !important;
}

.flight-lane-output .seal-card .seal-target-panel input#sealTargetWord {
  width: 100% !important;
  max-width: 100% !important;
}

@media (max-width: 520px) {
  .flight-lane-output .seal-card .seal-spacing-grid {
    grid-template-columns: 1fr !important;
    grid-template-areas: "target" "zwnj" !important;
  }
}
'''
          html = html[:start] + pr168_css + html[end:]

          if '<div class="section-split-row seal-spacing-grid">' not in html:
              raise SystemExit('Seal spacing grid markup missing')
          if '<div class="seal-target-panel">' not in html:
              raise SystemExit('Seal target panel markup missing')
          if '<div class="seal-zwnj-panel">' not in html:
              raise SystemExit('Seal ZWNJ panel markup missing')
          flight.write_text(html, encoding='utf-8')

          if analytics.exists():
              js = analytics.read_text(encoding='utf-8')
              def remove_iife(source, name):
                  marker = f'(function {name}() {{'
                  i = source.find(marker)
                  if i < 0:
                      return source
                  j = source.find('\n})();', i)
                  if j < 0:
                      raise SystemExit(f'Could not close {name}')
                  j += len('\n})();')
                  while j < len(source) and source[j] == '\n':
                      j += 1
                  return source[:i].rstrip() + '\n\n' + source[j:].lstrip()
              js = remove_iife(js, 'installFlightSealSpacingRescue')
              js = remove_iife(js, 'installFlightMobileLanePreloadRescue')
              analytics.write_text(js, encoding='utf-8')

          tests = test.read_text(encoding='utf-8')
          if "PR168_SENTINEL definitive Seal spacing panel repair" not in tests:
              anchor = "assert(html.includes('Append lozenge + SAC'));\n"
              additions = """assert(html.includes('PR168_SENTINEL definitive Seal spacing panel repair'));
assert(html.includes('grid-template-areas: \"target zwnj\" !important'));
assert(html.includes('.flight-lane-output .seal-card .seal-target-panel'));
assert(html.includes('.flight-lane-output .seal-card .seal-zwnj-panel'));
assert(html.indexOf('PR90_SENTINEL TD613 Flight seal side-by-side target/zwnj repair') < html.indexOf('PR168_SENTINEL definitive Seal spacing panel repair'));
assert(html.indexOf('PR91_SENTINEL TD613 Flight mobile tile controls restoration') < html.indexOf('PR168_SENTINEL definitive Seal spacing panel repair'));
"""
              if anchor not in tests:
                  raise SystemExit('Test anchor missing')
              tests = tests.replace(anchor, anchor + additions, 1)
          if "<div class=\"seal-target-panel\">') < html.indexOf('<div class=\"seal-zwnj-panel\">" not in tests:
              anchor = "assert(html.indexOf('<div class=\"card output-card\">') < html.indexOf('<div class=\"card seal-card\">'));\n"
              if anchor not in tests:
                  raise SystemExit('Test order anchor missing')
              tests = tests.replace(anchor, anchor + "assert(html.indexOf('<div class=\"seal-target-panel\">') < html.indexOf('<div class=\"seal-zwnj-panel\">'));\n", 1)
          test.write_text(tests, encoding='utf-8')

          if workflow.exists():
              workflow.unlink()
          PY

          node tests/td613-flight-mobile-layout.test.mjs
          git add app/safe-harbor/td613-flight.html app/analytics.js tests/td613-flight-mobile-layout.test.mjs .github/workflows/apply-seal-spacing-fix.yml
          git diff --cached --quiet && exit 0
          git commit -m "Apply seal spacing panel repair in Flight source"
          git push origin HEAD:main
