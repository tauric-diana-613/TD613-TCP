name: Apply Vercel Deployment Law

on:
  push:
    branches:
      - hotfix/ash-live-ingress-demos-cache
    paths:
      - scripts/apply-vercel-deployment-law.mjs
      - .github/workflows/apply-vercel-deployment-law.yml

permissions:
  contents: write

concurrency:
  group: apply-vercel-deployment-law
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: hotfix/ash-live-ingress-demos-cache
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Apply executable deployment law
        run: node scripts/apply-vercel-deployment-law.mjs
      - name: Verify law before commit
        run: |
          node tests/vercel-deploy-hygiene.test.mjs
          node tests/product-architecture/shell.test.mjs
      - name: Commit governed configuration
        run: |
          git config user.name "td613-release-law"
          git config user.email "actions@users.noreply.github.com"
          git add vercel.json tests/vercel-deploy-hygiene.test.mjs tests/product-architecture/shell.test.mjs docs/STRATEGIC_VERCEL_DEPLOYMENT_LAW.md scripts/apply-vercel-deployment-law.mjs .github/workflows/apply-vercel-deployment-law.yml
          git commit -m "Enforce explicit Vercel deployment authorization"
          git push origin HEAD:hotfix/ash-live-ingress-demos-cache
