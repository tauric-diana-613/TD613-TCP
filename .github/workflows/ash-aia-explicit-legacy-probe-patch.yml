name: Patch inherited Ash probes to explicit legacy route

on:
  push:
    branches:
      - agent/ash-keep-live-child-legible-aia
    paths:
      - '.github/workflows/ash-aia-explicit-legacy-probe-patch.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/ash-keep-live-child-legible-aia
          fetch-depth: 0
      - name: Apply exact probe-route declarations
        run: |
          python - <<'PY'
          from pathlib import Path

          replacements = {
              Path('scripts/ash-keep-production-probe.mjs'): [
                  (
                      "const keepUrl = `${base}/dome-world/ash-keep.html`;",
                      "const keepUrl = `${base}/dome-world/ash-keep.html?presentation=legacy`;"
                  )
              ],
              Path('scripts/ash-live-release-browser-probe.mjs'): [
                  (
                      "function cleanUrl(){return new URL('/dome-world/ash-keep.html',base).toString();}",
                      "function cleanUrl(){const url=new URL('/dome-world/ash-keep.html',base);url.searchParams.set('presentation','legacy');return url.toString();}"
                  ),
                  (
                      "  const url=new URL('/dome-world/ash-keep.html',base);\n  url.searchParams.set('ash_flush',ASH_CACHE_FLUSH_EPOCH);",
                      "  const url=new URL('/dome-world/ash-keep.html',base);\n  url.searchParams.set('presentation','legacy');\n  url.searchParams.set('ash_flush',ASH_CACHE_FLUSH_EPOCH);"
                  )
              ]
          }

          for path, pairs in replacements.items():
              text = path.read_text()
              for old, new in pairs:
                  count = text.count(old)
                  if count != 1:
                      raise SystemExit(f'{path}: expected one exact seam, observed {count}: {old!r}')
                  text = text.replace(old, new)
              path.write_text(text)
          PY
      - name: Verify explicit routes and remove one-use workflow
        run: |
          grep -F "ash-keep.html?presentation=legacy" scripts/ash-keep-production-probe.mjs
          grep -F "searchParams.set('presentation','legacy')" scripts/ash-live-release-browser-probe.mjs
          rm .github/workflows/ash-aia-explicit-legacy-probe-patch.yml
          git config user.name 'td613-housekeeping'
          git config user.email 'td613-housekeeping@users.noreply.github.com'
          git add scripts/ash-keep-production-probe.mjs scripts/ash-live-release-browser-probe.mjs .github/workflows/ash-aia-explicit-legacy-probe-patch.yml
          git commit -m 'Declare legacy route in inherited Ash probes'
          git push origin HEAD:agent/ash-keep-live-child-legible-aia
