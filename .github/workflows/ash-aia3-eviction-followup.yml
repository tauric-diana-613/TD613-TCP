name: Apply Ash AIA3 eviction follow-up

on:
  push:
    branches: [agent/ash-aia3-eviction-release]
    paths:
      - 'scripts/apply-ash-aia3-eviction-followup.mjs'
      - '.github/workflows/ash-aia3-eviction-followup.yml'

permissions:
  contents: write

concurrency:
  group: ash-aia3-eviction-followup
  cancel-in-progress: false

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/ash-aia3-eviction-release
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Apply guarded compatibility patch
        run: node scripts/apply-ash-aia3-eviction-followup.mjs
      - name: Validate changed contracts
        run: |
          node --check api/dome-world-shell.js
          node --check scripts/ash-keep-aia3-task-journey-v3.mjs
          node tests/ash-aia3-mass-eviction.test.mjs
          node tests/ash-custody-workspace-bridge.test.mjs
          node tests/dome-world-lab-marrowline-link.test.mjs
          node tests/ash-live-ingress-demos-cache.test.mjs
          node tests/product-architecture/shell.test.mjs
      - name: Remove one-use machinery
        run: rm scripts/apply-ash-aia3-eviction-followup.mjs .github/workflows/ash-aia3-eviction-followup.yml
      - name: Commit compatibility repair
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'fix: preserve legacy rollback and eviction receipts'
          git push origin HEAD:agent/ash-aia3-eviction-release
