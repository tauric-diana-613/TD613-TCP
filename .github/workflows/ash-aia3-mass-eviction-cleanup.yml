name: Clean Ash AIA3 mass-eviction repair branch

on:
  push:
    branches: [agent/ash-aia3-mass-eviction-v2]
    paths:
      - '.github/workflows/ash-aia3-mass-eviction-cleanup.yml'

permissions:
  contents: write

jobs:
  cleanup:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/ash-aia3-mass-eviction-v2
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Remove duplicate and accidental files
        shell: bash
        run: |
          set -euo pipefail
          rm -f \
            app/dome-world/ash-stale-client-fixture-sw.js \
            tests/ash-aia3-mass-eviction-v2.test.mjs \
            scripts/finalize-ash-aia3-mass-eviction-v2.mjs \
            .github/workflows/ash-aia3-mass-eviction-finalize.yml \
            docs/receipts/ASH_AIA3_MASS_EVICTION_V2_BROWSER_AUTHORITY.md \
            docs/receipts/ASH_AIA3_MASS_EVICTION_V2_HUMAN_GATE.md \
            docs/receipts/ASH_AIA3_MASS_EVICTION_V2_NO_OMISSION.md \
            docs/receipts/ASH_AIA3_MASS_EVICTION_V2_OPERATOR_REPORT.md \
            docs/receipts/ASH_AIA3_MASS_EVICTION_V2_PREMERGE.md \
            docs/receipts/ASH_AIA3_MASS_EVICTION_V2_PR_NOW.md \
            docs/receipts/ASH_AIA3_MASS_EVICTION_V2_PR_READY.md \
            docs/receipts/ASH_AIA3_MASS_EVICTION_V2_PR_TOOL_ROUTING_FAILURE.md \
            docs/receipts/ASH_AIA3_MASS_EVICTION_V2_RELEASE_CEILING.md \
            docs/receipts/ASH_AIA3_MASS_EVICTION_V2_SCOPE_LOCK.md \
            docs/receipts/ASH_AIA3_MASS_EVICTION_V2_STOP.md \
            docs/receipts/ASH_AIA3_MASS_EVICTION_V2_TEST_MATRIX.md \
            docs/receipts/ASH_AIA3_MASS_EVICTION_V2_WORKING_RECEIPT.md \
            docs/receipts/ASH_AIA3_MASS_EVICTION_V3_CANONICALIZATION.md
          git checkout origin/main -- scripts/ash-keep-aia3-task-journey-v2.mjs
      - name: Migrate inherited ingress law to the mass-eviction epoch
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('tests/ash-live-ingress-demos-cache.test.mjs')
          s = p.read_text()
          old = """assert.match(lifecycle, /ash-ingress-layout-hydration\\.js\\?v=20260718-canonical-membrane-v6/);
          assert.match(lifecycle, /ash-cache-flush\\.js\\?v=20260718-canonical-membrane-v7-readiness-boundary/);
          assert.equal(ASH_LIFECYCLE_MODULE, '/dome-world/ash-lifecycle.js?v=20260718-canonical-membrane-v7-readiness-boundary');
          const renderedKeep = injectAshKeepLifecycle(keepHtml);
          assert.match(renderedKeep, /src=\"\\/dome-world\\/ash-lifecycle\\.js\\?v=20260718-canonical-membrane-v7-readiness-boundary\"/);
          assert.doesNotMatch(renderedKeep, /src=\"\\/dome-world\\/ash-lifecycle\\.js\"/);
          assert.equal(injectAshKeepLifecycle(renderedKeep), renderedKeep, 'Lifecycle cache-boundary injection is not idempotent.');"""
          new = """assert.match(lifecycle, /ash-cache-eviction-aia3\\.js\\?v=\\$\\{assetEpoch\\}/);
          assert.match(lifecycle, /ash-ingress-layout-hydration\\.js\\?v=\\$\\{assetEpoch\\}/);
          assert.doesNotMatch(lifecycle, /ash-cache-flush\\.js/);
          assert.equal(ASH_LIFECYCLE_MODULE, '/dome-world/ash-lifecycle.js?v=20260720-aia3-mass-eviction-v2');
          const renderedKeep = injectAshKeepLifecycle(keepHtml);
          for (const module of ['ash-keep.js', 'ash-convergence.js', 'ash-lifecycle.js', 'ash-workspace-bridge.js', 'ash-case-controls.js']) {
            const escaped = module.replace('.', '\\\\.');
            assert.match(renderedKeep, new RegExp(`src=\"\\/dome-world\\/${escaped}\\?v=20260720-aia3-mass-eviction-v2\"`));
          }
          assert.match(renderedKeep, /ash-cache-preflight/);
          assert.match(renderedKeep, /Updating Ash Keep · preserving local cases/);
          assert.match(renderedKeep, /local_case_pointer_preserved/);
          assert.equal(injectAshKeepLifecycle(renderedKeep), renderedKeep, 'Lifecycle cache-boundary injection is not idempotent.');"""
          if s.count(old) != 1:
              raise SystemExit(f'inherited lifecycle block count={s.count(old)}')
          p.write_text(s.replace(old, new))
          PY
      - name: Validate canonical packet
        run: |
          node --check api/dome-world-shell.js
          node --check app/dome-world/ash-lifecycle.js
          node --check app/dome-world/ash-cache-eviction-aia3.js
          node --check scripts/ash-keep-aia3-task-journey-v3.mjs
          node tests/ash-aia3-mass-eviction.test.mjs
          node tests/product-architecture/shell.test.mjs
          node tests/ash-live-ingress-demos-cache.test.mjs
      - name: Remove one-use cleanup workflow
        run: rm .github/workflows/ash-aia3-mass-eviction-cleanup.yml
      - name: Commit canonical cleanup
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'chore: canonicalize Ash mass-eviction repair packet'
          git push origin HEAD:agent/ash-aia3-mass-eviction-v2
