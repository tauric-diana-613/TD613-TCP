name: Finalize Ash AIA3 mass eviction v2

on:
  push:
    branches: [agent/ash-aia3-mass-eviction-v2]
    paths:
      - 'scripts/finalize-ash-aia3-mass-eviction-v2.mjs'
      - '.github/workflows/ash-aia3-mass-eviction-finalize.yml'

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/ash-aia3-mass-eviction-v2
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Apply guarded finalization
        run: node scripts/finalize-ash-aia3-mass-eviction-v2.mjs
      - name: Validate exact files
        run: |
          node --check api/dome-world-shell.js
          node --check scripts/ash-keep-aia3-task-journey-v2.mjs
          node --check app/dome-world/ash-stale-client-fixture-sw.js
          node tests/ash-aia3-mass-eviction-v2.test.mjs
          node tests/product-architecture/shell.test.mjs
          node tests/ash-live-ingress-demos-cache.test.mjs
      - name: Remove one-use machinery
        run: rm scripts/finalize-ash-aia3-mass-eviction-v2.mjs .github/workflows/ash-aia3-mass-eviction-finalize.yml
      - name: Commit finalization
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add api/dome-world-shell.js tests/ash-live-ingress-demos-cache.test.mjs .github/workflows/ash-keep-live-aia-browser.yml scripts/finalize-ash-aia3-mass-eviction-v2.mjs .github/workflows/ash-aia3-mass-eviction-finalize.yml
          git commit -m 'test: prove stale and fresh Ash clients converge'
          git push origin HEAD:agent/ash-aia3-mass-eviction-v2
