name: Ash AIA3 v0.5 observer convergence

on:
  push:
    branches: [agent/ash-legal-demo-navigation-animation]
    paths:
      - '.github/workflows/ash-aia3-v05-observer-converge.yml'
      - '.github/workflows/ash-research-ux.yml'

permissions:
  contents: write

concurrency:
  group: ash-aia3-v05-observer-convergence
  cancel-in-progress: false

jobs:
  converge:
    if: ${{ !contains(github.event.head_commit.message, '[aia3-v05-observers-converged]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/ash-legal-demo-navigation-animation
          fetch-depth: 0
      - name: Migrate exact composition receipt in static observers and remove helper
        run: |
          python - <<'PY'
          from pathlib import Path
          files = [
              Path('tests/ash-keep-live-aia-surface.test.mjs'),
              Path('tests/ash-aia3-mass-eviction.test.mjs'),
              Path('tests/ash-legal-ux.test.mjs'),
          ]
          old = r'v0\.4-open-case-render-readiness'
          new = r'v0\.5-human-profile-choice'
          for path in files:
              text = path.read_text()
              if old not in text:
                  raise SystemExit(f'Missing prior AIA3 receipt assertion in {path}')
              path.write_text(text.replace(old, new))
          Path('.github/workflows/ash-aia3-v05-observer-converge.yml').unlink()
          PY
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add tests/ash-keep-live-aia-surface.test.mjs tests/ash-aia3-mass-eviction.test.mjs tests/ash-legal-ux.test.mjs .github/workflows/ash-aia3-v05-observer-converge.yml
          git commit -m 'test(ash): migrate observers to human profile choice [aia3-v05-observers-converged]'
          git push origin HEAD:agent/ash-legal-demo-navigation-animation
