name: Ash AIA3 witness epoch patch

on:
  push:
    branches: [agent/ash-legal-demo-navigation-animation]

permissions:
  contents: write

concurrency:
  group: ash-aia3-witness-epoch-patch
  cancel-in-progress: false

jobs:
  patch:
    if: ${{ !contains(github.event.head_commit.message, '[witness-epoch-patched]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/ash-legal-demo-navigation-animation
          fetch-depth: 0
      - name: Migrate exact witness epoch and remove this workflow
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('scripts/ash-keep-aia3-task-journey-v3.mjs')
          text = path.read_text()
          pairs = [
            ("const EPOCH = '20260720-aia3-mass-eviction-v2';", "const EPOCH = '20260721-legal-demo-ux-v1';"),
            ("const CACHE_EPOCH = 'td613.ash.cache-flush/2026-07-20-aia3-mass-eviction-v2';", "const CACHE_EPOCH = 'td613.ash.cache-flush/2026-07-21-legal-demo-ux-v1';")
          ]
          for old, new in pairs:
            if old not in text:
              raise SystemExit(f'Missing retired witness marker: {old}')
            text = text.replace(old, new)
          path.write_text(text)
          Path('.github/workflows/ash-aia3-witness-epoch-patch.yml').unlink()
          PY
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add scripts/ash-keep-aia3-task-journey-v3.mjs .github/workflows/ash-aia3-witness-epoch-patch.yml
          git commit -m 'test(ash): migrate AIA3 witness to Legal UX epoch [witness-epoch-patched]'
          git push origin HEAD:agent/ash-legal-demo-navigation-animation
