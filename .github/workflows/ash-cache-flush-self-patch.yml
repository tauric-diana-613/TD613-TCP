name: Ash Cache Flush Self Patch

on:
  push:
    branches: [agent/ash-one-time-cache-flush]

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/ash-one-time-cache-flush
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Apply bounded cache-flush wiring
        run: |
          python - <<'PY'
          from pathlib import Path
          import json

          keep_path = Path('app/dome-world/ash-keep.js')
          keep = keep_path.read_text()
          line = "import './ash-cache-flush.js';\n"
          if not keep.startswith(line):
              keep_path.write_text(line + keep)

          vercel_path = Path('vercel.json')
          data = json.loads(vercel_path.read_text())
          sources = {'/dome-world/ash-(.*)', '/app/dome-world/ash-(.*)'}
          data['headers'] = [rule for rule in data.get('headers', []) if rule.get('source') not in sources]
          for source in ['/dome-world/ash-(.*)', '/app/dome-world/ash-(.*)']:
              data['headers'].append({
                  'source': source,
                  'headers': [{'key': 'Cache-Control', 'value': 'no-store, max-age=0'}]
              })
          vercel_path.write_text(json.dumps(data, indent=2) + '\n')

          workflow_path = Path('.github/workflows/ash-user-test-flight.yml')
          workflow = workflow_path.read_text()
          marker = "      - 'tests/ash-cache-flush.test.mjs'\n"
          for anchor in ["      - 'tests/ash-capsule-recovery-entry.test.mjs'\n"]:
              first = workflow.find(anchor)
              if first != -1 and marker not in workflow[:first + len(anchor) + len(marker)]:
                  workflow = workflow[:first + len(anchor)] + marker + workflow[first + len(anchor):]
              second = workflow.find(anchor, first + len(anchor) + len(marker))
              if second != -1 and marker not in workflow[second:second + len(anchor) + len(marker)]:
                  workflow = workflow[:second + len(anchor)] + marker + workflow[second + len(anchor):]
          command = "          node tests/ash-cache-flush.test.mjs\n"
          workflow = workflow.replace(
              "          node tests/ash-premium-ui.test.mjs\n",
              "          node tests/ash-premium-ui.test.mjs\n" + command
          )
          workflow_path.write_text(workflow)
          PY
          node tests/ash-cache-flush.test.mjs
      - name: Commit bounded patch
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add app/dome-world/ash-keep.js vercel.json .github/workflows/ash-user-test-flight.yml
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "Wire one-time Ash cache flush"
          git push origin HEAD:agent/ash-one-time-cache-flush
