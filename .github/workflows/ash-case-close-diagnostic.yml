name: Ash Case Close Diagnostic

on:
  pull_request:
    paths:
      - "app/dome-world/ash-case-controls.js"
      - "app/dome-world/ash-case-close-repair.js"
      - "app/dome-world/ash-workspace-bridge.js"
      - "scripts/ash-case-close-diagnostic.mjs"
      - ".github/workflows/ash-case-close-diagnostic.yml"

permissions:
  contents: read

jobs:
  observe:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Install Chromium
        run: |
          npm install --no-save --package-lock=false playwright@1.53.2
          npx playwright install --with-deps chromium
      - name: Start bounded Ash runtime
        run: |
          mkdir -p artifacts
          node scripts/ash-keep-local-closure-server.mjs 6130 > artifacts/ash-case-close-diagnostic-server.log 2>&1 &
          echo $! > artifacts/ash-case-close-diagnostic-server.pid
          for attempt in $(seq 1 30); do
            if curl -fsS --max-time 2 http://127.0.0.1:6130/__ash_keep_closure/readiness; then exit 0; fi
            sleep 1
          done
          cat artifacts/ash-case-close-diagnostic-server.log || true
          exit 1
      - name: Observe two governed saves and closes
        env:
          TD613_BASE_URL: http://127.0.0.1:6130
          TD613_ARTIFACT_DIR: artifacts/ash-case-close-diagnostic
        run: node scripts/ash-case-close-diagnostic.mjs
      - name: Preserve close-boundary evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ash-case-close-diagnostic-evidence
          path: |
            artifacts/ash-case-close-diagnostic/
            artifacts/ash-case-close-diagnostic-server.log
          if-no-files-found: error
          retention-days: 7
      - name: Stop bounded runtime
        if: always()
        run: |
          if [ -f artifacts/ash-case-close-diagnostic-server.pid ]; then
            kill "$(cat artifacts/ash-case-close-diagnostic-server.pid)" 2>/dev/null || true
          fi
