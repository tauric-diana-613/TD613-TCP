name: Ash Convergence Observer Guided Migration

on:
  push:
    branches: [maintenance/ash-lifecycle-guided-observer]

permissions:
  contents: write

jobs:
  migrate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: maintenance/ash-lifecycle-guided-observer
      - name: Route convergence Test and Map through guided workspaces
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('scripts/run-ash-constitutional-convergence-probe.mjs')
          source = path.read_text()
          insertion_anchor = "const deletionTarget = `  await page.locator('#selectCase').selectOption(secondCase);"
          declarations = '''const testWorkspaceTarget = `  await page.locator('[data-workspace="test"]').click();`;
          const testWorkspaceReplacement = `  await page.evaluate(() => {
            const open = window.__td613AshPremiumUI?.open
              || window.__td613OpenAshWorkspace
              || window.__td613AshKeep?.openWorkspace;
            if (typeof open !== 'function') throw new Error('Ash guided workspace API is unavailable for convergence Test.');
            open('test');
          });
          await page.waitForFunction(() => document.getElementById('workspace-test')?.classList.contains('active'));`;

          const mapWorkspaceTarget = `  await page.locator('[data-workspace="map"]').click();`;
          const mapWorkspaceReplacement = `  await page.evaluate(() => {
            const open = window.__td613AshPremiumUI?.open
              || window.__td613OpenAshWorkspace
              || window.__td613AshKeep?.openWorkspace;
            if (typeof open !== 'function') throw new Error('Ash guided workspace API is unavailable for convergence Map.');
            open('map');
          });
          await page.waitForFunction(() => document.getElementById('workspace-map')?.classList.contains('active'));`;

          '''
          if 'const testWorkspaceTarget' not in source:
              if insertion_anchor not in source:
                  raise SystemExit('Convergence declaration insertion seam not found.')
              source = source.replace(insertion_anchor, declarations + insertion_anchor, 1)
          count_anchor = "const readinessCount = source.split(readinessTarget).length - 1;\nconst deletionCount"
          count_replacement = "const readinessCount = source.split(readinessTarget).length - 1;\nconst testWorkspaceCount = source.split(testWorkspaceTarget).length - 1;\nconst mapWorkspaceCount = source.split(mapWorkspaceTarget).length - 1;\nconst deletionCount"
          if count_anchor in source:
              source = source.replace(count_anchor, count_replacement, 1)
          assert_anchor = "if (readinessCount !== 1) throw new Error(`Convergence observer expected one Ash boot-readiness seam; observed ${readinessCount}.`);\nif (deletionCount"
          assert_replacement = "if (readinessCount !== 1) throw new Error(`Convergence observer expected one Ash boot-readiness seam; observed ${readinessCount}.`);\nif (testWorkspaceCount !== 1) throw new Error(`Convergence observer expected one legacy Test workspace seam; observed ${testWorkspaceCount}.`);\nif (mapWorkspaceCount !== 1) throw new Error(`Convergence observer expected one legacy Map workspace seam; observed ${mapWorkspaceCount}.`);\nif (deletionCount"
          if assert_anchor in source:
              source = source.replace(assert_anchor, assert_replacement, 1)
          runtime_anchor = "const runtime = source.replace(readinessTarget, readinessReplacement).replace(deletionTarget, deletionReplacement);"
          runtime_replacement = "const runtime = source.replace(readinessTarget, readinessReplacement).replace(testWorkspaceTarget, testWorkspaceReplacement).replace(mapWorkspaceTarget, mapWorkspaceReplacement).replace(deletionTarget, deletionReplacement);"
          if runtime_anchor in source:
              source = source.replace(runtime_anchor, runtime_replacement, 1)
          verify_anchor = "if (!runtime.includes(\"select.dispatchEvent(new Event('change', { bubbles: true }))\") || !runtime.includes('remove.click()')) {"
          verify_replacement = "if (!runtime.includes(\"open('test')\") || !runtime.includes(\"open('map')\") || runtime.includes(\"page.locator('[data-workspace=\\\"test\\\"]').click()\")) {\n  throw new Error('Convergence observer guided workspace migration was not materialized.');\n}\n" + verify_anchor
          if "guided workspace migration was not materialized" not in source:
              if verify_anchor not in source:
                  raise SystemExit('Convergence verification seam not found.')
              source = source.replace(verify_anchor, verify_replacement, 1)
          path.write_text(source)
          PY
          git rm .github/workflows/ash-convergence-observer-guided-migration.yml
      - name: Commit guided convergence observer
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add scripts/run-ash-constitutional-convergence-probe.mjs
          git commit -m "Migrate convergence observer to guided workspaces"
          git push origin HEAD:maintenance/ash-lifecycle-guided-observer
