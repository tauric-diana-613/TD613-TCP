name: Ash Custodian Return

on:
  pull_request:
    paths:
      - 'app/engine/ash-custodian-return*.js'
      - 'app/dome-world/ash-custodian-return*.js'
      - 'app/dome-world/ash-return-ready-bundle.js'
      - 'app/dome-world/ash-workspace-bridge.js'
      - 'scripts/ash-custodian-return*.mjs'
      - 'tests/ash-custodian-return*.test.mjs'
      - '.github/workflows/ash-custodian-return*.yml'
  push:
    branches: [main]
    paths:
      - 'app/engine/ash-custodian-return*.js'
      - 'app/dome-world/ash-custodian-return*.js'
      - 'app/dome-world/ash-return-ready-bundle.js'
      - 'app/dome-world/ash-workspace-bridge.js'
      - 'scripts/ash-custodian-return*.mjs'
      - 'tests/ash-custodian-return*.test.mjs'
      - '.github/workflows/ash-custodian-return*.yml'

permissions:
  contents: read

jobs:
  validate-and-local-observe:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install repository dependencies
        run: npm ci
      - name: Validate base Return receipts
        run: node tests/ash-custodian-return.test.mjs
      - name: Validate base Return integration contract
        run: node tests/ash-custodian-return-contract.test.mjs
      - name: Validate return-ready closure fixtures
        run: node tests/ash-custodian-return-closure.test.mjs
      - name: Validate production-closure boundary contract
        run: node tests/ash-custodian-return-closure-contract.test.mjs
      - name: Validate Stretch 2 runtime and probe syntax
        run: |
          node --check app/engine/ash-custodian-return.js
          node --check app/engine/ash-custodian-return-closure.js
          node --check app/dome-world/ash-custodian-return.js
          node --check app/dome-world/ash-custodian-return-closure.js
          node --check app/dome-world/ash-return-ready-bundle.js
          node --check scripts/ash-custodian-return-fixture.mjs
          node --check scripts/ash-custodian-return-production-probe.mjs
      - name: Install Chromium probe runtime
        run: |
          npm install --no-save --package-lock=false playwright@1.53.2
          npx playwright install --with-deps chromium
      - name: Start bounded Ash runtime
        run: |
          set -euo pipefail
          mkdir -p artifacts
          node scripts/ash-keep-local-closure-server.mjs 6130 > artifacts/ash-custodian-return-server.log 2>&1 &
          echo $! > artifacts/ash-custodian-return-server.pid
          for attempt in $(seq 1 30); do
            if curl -fsS --max-time 2 http://127.0.0.1:6130/__ash_keep_closure/readiness; then
              exit 0
            fi
            sleep 1
          done
          cat artifacts/ash-custodian-return-server.log || true
          exit 1
      - name: Run bounded synthetic Custodian Return observation
        env:
          TD613_BASE_URL: http://127.0.0.1:6130
          TD613_ARTIFACT_DIR: artifacts/ash-custodian-return
          TD613_OBSERVED_COMMIT: ${{ github.event.pull_request.head.sha || github.sha }}
        run: node scripts/ash-custodian-return-production-probe.mjs
      - name: Preserve local Stretch 2 evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ash-custodian-return-local-evidence
          path: |
            artifacts/ash-custodian-return/
            artifacts/ash-custodian-return-server.log
          if-no-files-found: warn
          retention-days: 14
      - name: Stop bounded Ash runtime
        if: always()
        run: |
          if [ -f artifacts/ash-custodian-return-server.pid ]; then
            kill "$(cat artifacts/ash-custodian-return-server.pid)" 2>/dev/null || true
          fi
