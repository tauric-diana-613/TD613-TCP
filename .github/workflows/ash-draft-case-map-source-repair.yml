name: Ash Draft Case Map Source Repair

on:
  pull_request:
    paths:
      - "app/dome-world/ash-keep.js"
      - "scripts/prepare-ash-draft-case-map-source-fix.mjs"
      - ".github/workflows/ash-draft-case-map-source-repair.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ash-draft-case-map-source-repair-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Prepare exact canonical source repair
        id: repair
        shell: bash
        run: |
          node scripts/prepare-ash-draft-case-map-source-fix.mjs
          if git diff --quiet -- app/dome-world/ash-keep.js; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Verify patched source syntax
        run: node --check app/dome-world/ash-keep.js
      - name: Verify canonical Draft binding marker
        run: grep -F "caseMapDigest: state.caseMap.case_map_digest," app/dome-world/ash-keep.js
      - name: Commit exact source repair
        if: steps.repair.outputs.changed == 'true'
        uses: actions/github-script@v7
        env:
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref || github.ref_name }}
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require('node:fs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const path = 'app/dome-world/ash-keep.js';
            const branch = process.env.HEAD_BRANCH;
            const current = await github.rest.repos.getContent({ owner, repo, path, ref: branch });
            await github.rest.repos.createOrUpdateFileContents({
              owner,
              repo,
              path,
              branch,
              sha: current.data.sha,
              message: 'Bind canonical Ash Drafts to the current Case Map',
              content: fs.readFileSync(path).toString('base64')
            });
