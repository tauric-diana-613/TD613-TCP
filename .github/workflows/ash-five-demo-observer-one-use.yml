name: Ash Five Demo Observer One Use

on:
  issue_comment:
    types: [created]

permissions:
  contents: write

concurrency:
  group: ash-five-demo-observer-one-use
  cancel-in-progress: false

jobs:
  patch:
    if: >-
      github.event.issue.number == 405 &&
      github.event.issue.pull_request == null &&
      github.event.comment.user.login == github.repository_owner &&
      github.event.comment.body == '/td613-fix-five-demo-observer e662a665baabc7890ac618800641c6a01e9b0ab5'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/ash-five-demo-production-observer
          fetch-depth: 0
      - name: Correct exact serialized observer token
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('scripts/run-ash-constitutional-convergence-probe.mjs')
          source = path.read_text()
          repairs = {
            "dataset.ashPremiumWorkspace === 'test\"\"": "dataset.ashPremiumWorkspace === 'test'\"",
            'document.documentEment': 'document.documentElement'
          }
          applied = 0
          for bad, good in repairs.items():
            count = source.count(bad)
            if count > 1:
              raise SystemExit(f'unexpected duplicate serialized token: {bad} x{count}')
            if count == 1:
              source = source.replace(bad, good)
              applied += 1
          if applied != 1:
            raise SystemExit(f'expected one serialized observer repair; applied {applied}')
          path.write_text(source)
          PY
          node --check scripts/run-ash-constitutional-convergence-probe.mjs
          node tests/ash-guided-observer-contract.test.mjs
      - name: Commit repaired PR branch
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add scripts/run-ash-constitutional-convergence-probe.mjs
          git commit -m 'fix: correct serialized five-demo observer token'
          git push origin HEAD:agent/ash-five-demo-production-observer
      - name: Remove one-use workflow from live main
        run: |
          git fetch origin main
          git checkout -B main origin/main
          rm -f .github/workflows/ash-five-demo-observer-one-use.yml
          git add .github/workflows/ash-five-demo-observer-one-use.yml
          git commit -m 'chore: remove one-use five-demo observer correction'
          git push origin HEAD:main
