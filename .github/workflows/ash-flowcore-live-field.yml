name: Ash Flow-Core Live Field

on:
  pull_request:
    branches: [main]
    paths:
      - 'api/dome-world-shell.js'
      - 'app/safe-harbor/ash-keep-recovery.html'
      - 'app/dome-world/ash-flowcore-pedagogy-field.*'
      - 'app/dome-world/ash-whole-instrument-pedagogy.*'
      - 'app/dome-world/docs/ASH_KEEP_A2_A5_IMPLEMENTATION_RECEIPT_V0_1.md'
      - 'app/dome-world/ash-flowcore-ingress-portal.js'
      - 'app/dome-world/ash-flowcore-ingress-portal-loader.js'
      - 'app/dome-world/ash-post-ingress-motion-restoration.js'
      - 'app/dome-world/ash-reviewability-repair.js'
      - 'app/dome-world/ash-threshold.html'
      - 'app/dome-world/ash-session-boundary.js'
      - 'app/dome-world/ash-ingress-copy-spacing.js'
      - 'app/dome-world/ash-workspace-bridge.js'
      - 'app/dome-world/ash-cache-flush.js'
      - 'app/dome-world/ash-ingress-layout-hydration.js'
      - 'app/dome-world/ash-profile-demo-hydration.js'
      - 'app/dome-world/ash-investigation-demo-hydration.js'
      - 'app/dome-world/ash-case-close-repair.js'
      - 'app/dome-world/ash-emergency-stability-contract.js'
      - 'app/dome-world/ash-workspace-navigation.js'
      - 'app/dome-world/ash-ui-ux-rescue.js'
      - 'app/dome-world/ash-legal-profile-demo.js'
      - 'app/dome-world/ash-apeq-paia-profile-demos.js'
      - 'app/dome-world/ash-research-demo-hydration.js'
      - 'app/dome-world/ash-research-demo-control-state.js'
      - 'app/dome-world/ash-aia3-composition.js'
      - 'app/dome-world/ash-lifecycle.js'
      - 'app/dome-world/ash-premium-ui.js'
      - 'scripts/ash-keep-local-closure-server.mjs'
      - 'scripts/ash-a2-a5-browser-probe.mjs'
      - 'tests/ash-a2-a5-whole-instrument.test.mjs'
      - 'tests/ash-flowcore-live-field.test.mjs'
      - 'tests/ash-ingress-polish.test.mjs'
      - 'tests/ash-aia3-mass-eviction.test.mjs'
      - 'tests/ash-live-ingress-demos-cache.test.mjs'
      - 'tests/product-architecture/shell.test.mjs'
      - 'tests/ash-reviewability.test.mjs'
      - 'tests/ash-research-ux-rehydration.test.mjs'
      - 'tests/ash-final-rehydration-boundaries.test.mjs'
      - 'scripts/ash-flowcore-live-field-browser-probe.mjs'
      - 'scripts/ash-ingress-polish-browser-probe.mjs'
      - 'scripts/ash-reviewability-browser-probe.mjs'
      - 'scripts/ash-research-ux-browser-probe.mjs'
      - '.github/workflows/ash-flowcore-live-field.yml'
      - '.github/workflows/ash-keep-production-closure.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ash-flowcore-live-field-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  contracts:
    runs-on: ubuntu-latest
    timeout-minutes: 18
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Syntax-check live product modules
        run: |
          node --check api/dome-world-shell.js
          node --check scripts/ash-keep-local-closure-server.mjs
          node --check app/dome-world/ash-flowcore-pedagogy-field.js
          node --check app/dome-world/ash-whole-instrument-pedagogy.js
          node --check app/dome-world/ash-flowcore-ingress-portal.js
          node --check app/dome-world/ash-flowcore-ingress-portal-loader.js
          node --check app/dome-world/ash-post-ingress-motion-restoration.js
          node --check app/dome-world/ash-reviewability-repair.js
          node --check app/dome-world/ash-session-boundary.js
          node --check app/dome-world/ash-ingress-copy-spacing.js
          node --check app/dome-world/ash-research-demo-hydration.js
          node --check app/dome-world/ash-research-demo-control-state.js
          node --check scripts/ash-a2-a5-browser-probe.mjs
          node --check scripts/ash-research-ux-browser-probe.mjs
      - name: A2-A5, live field, A1 first paint, reviewability, and Research contracts
        run: |
          mkdir -p artifacts
          set +e
          {
            node tests/ash-a2-a5-whole-instrument.test.mjs
            node tests/ash-flowcore-live-field.test.mjs
            node tests/ash-ingress-polish.test.mjs
            node tests/ash-aia3-mass-eviction.test.mjs
            node tests/ash-live-ingress-demos-cache.test.mjs
            node tests/product-architecture/shell.test.mjs
            node tests/ash-reviewability.test.mjs
            node tests/ash-research-ux-rehydration.test.mjs
            node tests/ash-final-rehydration-boundaries.test.mjs
          } > artifacts/ash-flowcore-contract.log 2>&1
          status=$?
          cat artifacts/ash-flowcore-contract.log
          exit "$status"
      - name: Preserve contract evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ash-flowcore-contract-evidence
          path: artifacts/ash-flowcore-contract.log
          if-no-files-found: warn
          retention-days: 45
      - name: Inherited Flow-Core visual grammar
        run: node --test tests/flowcore-pedagogue-visual.test.mjs
      - name: Inherited live AIA surface
        run: node tests/ash-keep-live-aia-surface.test.mjs
      - name: Inherited ingress close boundary
        run: node tests/ash-keep-ingress-readiness-close-boundary.test.mjs
      - name: TCP smoke
        run: node tests/tcp-smoke.test.mjs

  browser-witness:
    name: ${{ matrix.browser }} consequence field
    runs-on: ubuntu-latest
    timeout-minutes: 65
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Syntax-check witness and product modules
        run: |
          node --check api/dome-world-shell.js
          node --check scripts/ash-keep-local-closure-server.mjs
          node --check scripts/ash-a2-a5-browser-probe.mjs
          node --check scripts/ash-flowcore-live-field-browser-probe.mjs
          node --check scripts/ash-ingress-polish-browser-probe.mjs
          node --check scripts/ash-reviewability-browser-probe.mjs
          node --check scripts/ash-research-ux-browser-probe.mjs
          node --check app/dome-world/ash-flowcore-pedagogy-field.js
          node --check app/dome-world/ash-whole-instrument-pedagogy.js
          node --check app/dome-world/ash-flowcore-ingress-portal.js
          node --check app/dome-world/ash-flowcore-ingress-portal-loader.js
          node --check app/dome-world/ash-post-ingress-motion-restoration.js
          node --check app/dome-world/ash-reviewability-repair.js
          node --check app/dome-world/ash-session-boundary.js
          node --check app/dome-world/ash-ingress-copy-spacing.js
          node --check app/dome-world/ash-research-demo-hydration.js
          node --check app/dome-world/ash-research-demo-control-state.js
      - name: Install browser witness runtime
        run: |
          npm install --no-save --package-lock=false playwright@1.53.2
          npx playwright install --with-deps ${{ matrix.browser }}
      - name: Start bounded local Ash Keep runtime
        run: |
          mkdir -p artifacts
          node scripts/ash-keep-local-closure-server.mjs 6130 > artifacts/ash-flowcore-field-server.log 2>&1 &
          echo $! > artifacts/ash-flowcore-field-server.pid
          for attempt in $(seq 1 50); do
            if curl -fsS --max-time 2 http://127.0.0.1:6130/__ash_keep_closure/readiness > artifacts/ash-flowcore-field-readiness.json; then
              cat artifacts/ash-flowcore-field-readiness.json
              exit 0
            fi
            sleep 1
          done
          cat artifacts/ash-flowcore-field-server.log || true
          exit 1
      - name: Observe A2-A5 whole-instrument recompilation
        env:
          TD613_BROWSER: ${{ matrix.browser }}
          TD613_BASE_URL: http://127.0.0.1:6130
          TD613_ARTIFACT_DIR: artifacts/ash-a2-a5-${{ matrix.browser }}
        run: timeout --foreground --signal=INT --kill-after=15s 540s node scripts/ash-a2-a5-browser-probe.mjs
      - name: Observe ingress copy, zero-artifact Flow-Core, and Close Case return
        env:
          TD613_BROWSER: ${{ matrix.browser }}
          TD613_BASE_URL: http://127.0.0.1:6130
          TD613_ARTIFACT_DIR: artifacts/ash-flowcore-field-${{ matrix.browser }}
        run: timeout --foreground --signal=INT --kill-after=15s 480s node scripts/ash-flowcore-live-field-browser-probe.mjs
      - name: Observe canonical first paint, clean URL, and one field
        env:
          TD613_BROWSER: ${{ matrix.browser }}
          TD613_BASE_URL: http://127.0.0.1:6130
          TD613_ARTIFACT_DIR: artifacts/ash-ingress-polish-${{ matrix.browser }}
        run: timeout --foreground --signal=INT --kill-after=15s 360s node scripts/ash-ingress-polish-browser-probe.mjs
      - name: Observe native scroll, live setup panel, and descender clearance
        env:
          TD613_BROWSER: ${{ matrix.browser }}
          TD613_BASE_URL: http://127.0.0.1:6130
          TD613_ARTIFACT_DIR: artifacts/ash-reviewability-${{ matrix.browser }}
        run: timeout --foreground --signal=INT --kill-after=15s 420s node scripts/ash-reviewability-browser-probe.mjs
      - name: Observe Research hydration, dormancy, and mobile geometry
        env:
          TD613_BROWSER: ${{ matrix.browser }}
          TD613_BASE_URL: http://127.0.0.1:6130
          TD613_ARTIFACT_DIR: artifacts/ash-research-ux-${{ matrix.browser }}
        run: timeout --foreground --signal=INT --kill-after=15s 480s node scripts/ash-research-ux-browser-probe.mjs
      - name: Stop bounded local runtime
        if: always()
        run: |
          test -f artifacts/ash-flowcore-field-server.pid && kill "$(cat artifacts/ash-flowcore-field-server.pid)" || true
      - name: Preserve evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ash-flowcore-field-${{ matrix.browser }}-evidence
          path: |
            artifacts/ash-a2-a5-${{ matrix.browser }}/
            artifacts/ash-flowcore-field-${{ matrix.browser }}/
            artifacts/ash-ingress-polish-${{ matrix.browser }}/
            artifacts/ash-reviewability-${{ matrix.browser }}/
            artifacts/ash-research-ux-${{ matrix.browser }}/
            artifacts/ash-flowcore-field-server.log
            artifacts/ash-flowcore-field-readiness.json
          if-no-files-found: warn
          retention-days: 45
