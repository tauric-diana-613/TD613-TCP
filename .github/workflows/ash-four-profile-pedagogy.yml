name: Ash Four Profile Pedagogy Rehydration

on:
  pull_request:
    paths:
      - 'app/dome-world/ash-demo-pedagogy-rehydration.js'
      - 'app/dome-world/ash-profile-demo-hydration.js'
      - 'app/dome-world/ash-apeq-paia-profile-demos.js'
      - 'app/dome-world/ash-apeq-paia-profile-specs.js'
      - 'app/dome-world/ash-research-demo-hydration.js'
      - 'app/dome-world/ash-aia3-composition.js'
      - 'app/dome-world/ash-ui-ux-rescue.js'
      - 'tests/ash-four-profile-pedagogy.test.mjs'
      - 'scripts/ash-four-profile-pedagogy-browser-probe.mjs'
      - '.github/workflows/ash-four-profile-pedagogy.yml'
  push:
    branches: [main]
    paths:
      - 'app/dome-world/ash-demo-pedagogy-rehydration.js'
      - 'app/dome-world/ash-profile-demo-hydration.js'
      - 'app/dome-world/ash-apeq-paia-profile-demos.js'
      - 'app/dome-world/ash-apeq-paia-profile-specs.js'
      - 'app/dome-world/ash-research-demo-hydration.js'
      - 'app/dome-world/ash-aia3-composition.js'
      - 'app/dome-world/ash-ui-ux-rescue.js'
      - 'tests/ash-four-profile-pedagogy.test.mjs'
      - 'scripts/ash-four-profile-pedagogy-browser-probe.mjs'
      - '.github/workflows/ash-four-profile-pedagogy.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ash-four-profile-pedagogy-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  static-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: node tests/ash-four-profile-pedagogy.test.mjs
      - run: |
          node --check app/dome-world/ash-demo-pedagogy-rehydration.js
          node --check app/dome-world/ash-profile-demo-hydration.js
          node --check scripts/ash-four-profile-pedagogy-browser-probe.mjs

  browser-matrix:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm install --no-save --package-lock=false playwright@1.53.2
      - run: npx playwright install --with-deps ${{ matrix.browser }}
      - name: Start bounded local Ash runtime
        run: |
          node scripts/ash-keep-local-closure-server.mjs > artifacts-ash-four-profile-server.log 2>&1 &
          echo $! > ash-four-profile-server.pid
          for attempt in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:6130/dome-world/ash-keep.html >/dev/null; then exit 0; fi
            sleep 1
          done
          cat artifacts-ash-four-profile-server.log
          exit 1
      - name: Exercise four distinct legacy demos through current pedagogy and UX
        env:
          TD613_BROWSER: ${{ matrix.browser }}
          TD613_BASE_URL: http://127.0.0.1:6130
          TD613_ARTIFACT_DIR: artifacts/ash-four-profile-pedagogy-${{ matrix.browser }}
        run: node scripts/ash-four-profile-pedagogy-browser-probe.mjs
      - name: Stop bounded local runtime
        if: always()
        run: |
          if [ -f ash-four-profile-server.pid ]; then kill $(cat ash-four-profile-server.pid) || true; fi
          cat artifacts-ash-four-profile-server.log || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ash-four-profile-pedagogy-${{ matrix.browser }}-evidence
          path: artifacts/ash-four-profile-pedagogy-${{ matrix.browser }}/
          if-no-files-found: error
          retention-days: 30
