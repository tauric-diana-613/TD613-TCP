name: Ash Investigation Guided Flight

on:
  pull_request:
    paths:
      - 'app/dome-world/ash-investigation-*'
      - 'app/dome-world/ash-guided-*'
      - 'app/dome-world/ash-workspace-bridge.js'
      - 'app/dome-world/fixtures/ash-investigation-*'
      - 'scripts/ash-investigation-guidance-browser-probe.mjs'
      - 'tests/ash-investigation-guidance.test.mjs'
      - 'tests/ash-keep-investigation-guidance-closure.test.mjs'
      - '.github/workflows/ash-investigation-guided-flight.yml'
  push:
    branches: [main]
    paths:
      - 'app/dome-world/ash-investigation-*'
      - 'app/dome-world/ash-guided-*'
      - 'app/dome-world/ash-workspace-bridge.js'
      - 'app/dome-world/fixtures/ash-investigation-*'
      - 'scripts/ash-investigation-guidance-browser-probe.mjs'
      - 'tests/ash-investigation-guidance.test.mjs'
      - 'tests/ash-keep-investigation-guidance-closure.test.mjs'
      - '.github/workflows/ash-investigation-guided-flight.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ash-investigation-guided-flight-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  source-patch:
    name: One-shot event-driven map source patch
    if: github.event_name == 'pull_request' && github.head_ref == 'fix/ash-canonical-membrane-native-scroll'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/ash-canonical-membrane-native-scroll
          fetch-depth: 0
      - name: Replace perpetual scheduler and obsolete witness
        run: |
          python - <<'PY'
          from pathlib import Path

          core_path = Path('app/dome-world/ash-keep.js')
          core = core_path.read_text()
          old = """const scheduleFrame = callback => requestAnimationFrame(callback);

function frame(time) {
  state.frame = 0;
  if (!state.mapVisible || state.reducedMotion) return;
  drawMap(time);
  state.frame = scheduleFrame(frame);
}

function startScheduler() {
  if (state.reducedMotion) { drawMap(0); return; }
  if (!state.frame) state.frame = scheduleFrame(frame);
}

function stopScheduler() {
  if (state.frame) cancelAnimationFrame(state.frame);
  state.frame = 0;
}
"""
          new = """const scheduleFrame = callback => requestAnimationFrame(callback);

function frame(time) {
  state.frame = 0;
  if (!state.mapVisible) return;
  drawMap(state.reducedMotion ? 0 : time);
}

function requestMapDraw() {
  if (!state.mapVisible || state.frame) return false;
  state.frame = scheduleFrame(frame);
  return true;
}

function startScheduler() {
  requestMapDraw();
}

function stopScheduler() {
  if (state.frame) cancelAnimationFrame(state.frame);
  state.frame = 0;
}
"""
          if old in core:
              core = core.replace(old, new)
          elif 'state.frame = scheduleFrame(frame);' in core:
              raise SystemExit('perpetual scheduler shape drifted')
          core = core.replace("version: 'td613.ash-keep.browser-core/v1.1-convergence-native',", "version: 'td613.ash-keep.browser-core/v1.2-event-driven-map',")
          core = core.replace("openWorkspace: setWorkspace\n  });", "openWorkspace: setWorkspace,\n    mapScheduler: () => Object.freeze({ mode: 'EVENT_DRIVEN_COALESCED', frame_pending: Boolean(state.frame), map_visible: state.mapVisible })\n  });")
          core_path.write_text(core)

          probe_path = Path('scripts/ash-investigation-guidance-browser-probe.mjs')
          probe = probe_path.read_text()
          old_probe = """    const before=window.__td613AshFlickerHardening.diagnostics();
    const legendStyle=getComputedStyle(document.getElementById('guidedMapControlLegend'));
    await new Promise(resolve=>setTimeout(resolve,1800));
    const after=window.__td613AshFlickerHardening.diagnostics();
    observer.disconnect();
    return{before,after,childListMutations,attributeMutations,legendBackdrop:legendStyle.backdropFilter||legendStyle.webkitBackdropFilter||'none'};
  });
  assert(idleStability.after.blockedAshMapFrames>=1,'Ash map frame guard never intercepted the perpetual scheduler.');
  assert(idleStability.after.blockedAshMapFrames-idleStability.before.blockedAshMapFrames<=1,`Ash map frame loop continued while idle: ${JSON.stringify(idleStability)}`);
"""
          new_probe = """    const before=window.__td613AshKeep.mapScheduler();
    const legendStyle=getComputedStyle(document.getElementById('guidedMapControlLegend'));
    await new Promise(resolve=>setTimeout(resolve,1800));
    const after=window.__td613AshKeep.mapScheduler();
    observer.disconnect();
    return{before,after,childListMutations,attributeMutations,legendBackdrop:legendStyle.backdropFilter||legendStyle.webkitBackdropFilter||'none'};
  });
  assert.equal(idleStability.after.mode,'EVENT_DRIVEN_COALESCED','Ash map scheduler mode drifted.');
  assert.equal(idleStability.after.frame_pending,false,`Ash map retained a pending frame while idle: ${JSON.stringify(idleStability)}`);
"""
          if old_probe in probe:
              probe = probe.replace(old_probe, new_probe)
          elif 'Ash map frame guard never intercepted the perpetual scheduler.' in probe:
              raise SystemExit('investigation scheduler witness shape drifted')
          probe_path.write_text(probe)

          test_path = Path('tests/ash-investigation-guidance.test.mjs')
          test = test_path.read_text()
          test = test.replace("assert.match(probe, /Ash map frame loop continued while idle/);", "assert.match(probe, /EVENT_DRIVEN_COALESCED/);\nassert.match(probe, /Ash map retained a pending frame while idle/);")
          test_path.write_text(test)
          PY
      - name: Verify and push source repair
        run: |
          node --check app/dome-world/ash-keep.js
          node --check scripts/ash-investigation-guidance-browser-probe.mjs
          node tests/ash-investigation-guidance.test.mjs
          test "$(grep -o 'requestAnimationFrame(' app/dome-world/ash-keep.js | wc -l)" -eq 1
          ! grep -q 'state.frame = scheduleFrame(frame)' app/dome-world/ash-keep.js
          if git diff --quiet; then exit 0; fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add app/dome-world/ash-keep.js scripts/ash-investigation-guidance-browser-probe.mjs tests/ash-investigation-guidance.test.mjs
          git commit -m 'Make Ash Case Map redraw event-driven'
          git push origin HEAD:fix/ash-canonical-membrane-native-scroll

  local-candidate:
    name: Investigation Flight · Local Candidate
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install repository dependencies
        run: npm ci
      - name: Verify Investigation fixture and guided contract
        run: |
          node tests/ash-profile-demos.test.mjs
          node tests/ash-investigation-guidance.test.mjs
          node tests/ash-keep-investigation-guidance-closure.test.mjs
          node --check app/dome-world/ash-investigation-demo-hydration.js
          node --check app/dome-world/ash-guided-operator-ui.js
          node --check scripts/ash-investigation-guidance-browser-probe.mjs
      - name: Install browser runtime
        run: |
          npm install --no-save --package-lock=false playwright@1.54.1
          npx playwright install --with-deps chromium
      - name: Start bounded Ash candidate runtime
        run: |
          node scripts/ash-keep-local-closure-server.mjs 6130 > /tmp/ash-investigation-flight.log 2>&1 &
          echo $! > /tmp/ash-investigation-flight.pid
          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:6130/dome-world/ash-keep.html >/dev/null; then exit 0; fi
            sleep 1
          done
          cat /tmp/ash-investigation-flight.log || true
          exit 1
      - name: Fly guided Investigation workflow
        env:
          TD613_BASE_URL: http://127.0.0.1:6130
          TD613_ARTIFACT_DIR: artifacts/ash-investigation-guided-flight
        run: node scripts/ash-investigation-guidance-browser-probe.mjs
      - name: Stop bounded runtime
        if: always()
        run: kill "$(cat /tmp/ash-investigation-flight.pid)" 2>/dev/null || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ash-investigation-guided-flight-evidence
          path: |
            artifacts/ash-investigation-guided-flight
            /tmp/ash-investigation-flight.log
          if-no-files-found: error
          retention-days: 30

  deployed-exact-main:
    name: Investigation Flight · Deployed Exact Main
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install repository dependencies
        run: npm ci
      - name: Verify Investigation fixture and guided contract
        run: |
          node tests/ash-profile-demos.test.mjs
          node tests/ash-investigation-guidance.test.mjs
          node tests/ash-keep-investigation-guidance-closure.test.mjs
      - name: Install browser runtime
        run: |
          npm install --no-save --package-lock=false playwright@1.54.1
          npx playwright install --with-deps chromium
      - name: Wait for deployed Investigation instrument
        run: |
          for attempt in $(seq 1 90); do
            investigation="$(curl -fsS https://td613.com/dome-world/ash-investigation-demo-hydration.js || true)"
            guided="$(curl -fsS https://td613.com/dome-world/ash-guided-operator-ui.js || true)"
            if printf '%s' "$investigation" | grep -q 'v0.1-glass-meridian' \
              && printf '%s' "$guided" | grep -q 'v0.2-stable-membrane'; then exit 0; fi
            sleep 2
          done
          exit 1
      - name: Fly deployed guided Investigation workflow
        env:
          TD613_BASE_URL: https://td613.com
          TD613_ARTIFACT_DIR: artifacts/ash-investigation-guided-flight-deployed
        run: node scripts/ash-investigation-guidance-browser-probe.mjs
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ash-investigation-guided-flight-deployed-evidence
          path: artifacts/ash-investigation-guided-flight-deployed
          if-no-files-found: error
          retention-days: 30
