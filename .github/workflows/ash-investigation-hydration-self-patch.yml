name: Ash Investigation Hydration Self Patch

on:
  push:
    branches: [agent/ash-investigation-demo-hydration]

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/ash-investigation-demo-hydration
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Materialize Investigation fixture and profile wiring
        env:
          INVESTIGATION_FIXTURE_GZIP_BASE64: 
        run: |
          python - <<'PY'
          from pathlib import Path
          import base64, gzip, os

          root = Path('.')
          fixture = gzip.decompress(base64.b64decode(os.environ['INVESTIGATION_FIXTURE_GZIP_BASE64'])).decode('utf-8')
          fixture_path = root / 'app/dome-world/fixtures/ash-keep-demo-investigation.json'
          fixture_path.write_text(fixture)

          def patch(path, old, new, count=1):
              file = root / path
              source = file.read_text()
              if new in source:
                  return
              if source.count(old) < count:
                  raise SystemExit(f'{path}: expected patch seam not found: {old[:80]}')
              file.write_text(source.replace(old, new, count))

          patch('app/dome-world/ash-profile-demo-hydration.js',
                "export const ASH_PROFILE_DEMO_VERSION = 'td613.ash.profile-demos/v0.2-campaign-fundraiser';",
                "export const ASH_PROFILE_DEMO_VERSION = 'td613.ash.profile-demos/v0.3-investigation-campaign-fundraiser';")
          patch('app/dome-world/ash-profile-demo-hydration.js',
                "export const ASH_PROFILE_DEMOS = Object.freeze({\n  political_campaign:",
                "export const ASH_PROFILE_DEMOS = Object.freeze({\n  investigation: Object.freeze({\n    label: 'Investigation',\n    fixture: '/dome-world/fixtures/ash-keep-demo-investigation.json'\n  }),\n  political_campaign:")
          patch('app/dome-world/ash-workspace-bridge.js',
                "import './ash-premium-ui.js';\n",
                "import './ash-premium-ui.js';\nimport './ash-guided-operator-ui.js?v=20260717-investigation-v1';\n")

          patch('tests/ash-profile-demos.test.mjs',
                "const fixtures = [\n  ['political_campaign'",
                "const fixtures = [\n  ['investigation', 'app/dome-world/fixtures/ash-keep-demo-investigation.json', 12, 56, 72],\n  ['political_campaign'")
          patch('tests/ash-profile-demos.test.mjs',
                "assert.equal(CASE_PROFILES.political_campaign, 'Campaign Map');",
                "assert.equal(CASE_PROFILES.investigation, 'Case Map');\nassert.equal(CASE_PROFILES.political_campaign, 'Campaign Map');")
          patch('tests/ash-profile-demos.test.mjs',
                "assert.match(hydration, /political_campaign/);",
                "assert.match(hydration, /investigation/);\nassert.match(hydration, /political_campaign/);")

          patch('scripts/ash-profile-demo-browser-probe.mjs',
                "report = {\n  schema: 'td613.ash.profile-demo-flight/v0.1'",
                "report = {\n  schema: 'td613.ash.profile-demo-flight/v0.2'")
          patch('scripts/ash-profile-demo-browser-probe.mjs',
                "document.documentElement.dataset.ashDemoProfiles === 'td613.ash.profile-demos/v0.2-campaign-fundraiser'",
                "document.documentElement.dataset.ashDemoProfiles === 'td613.ash.profile-demos/v0.3-investigation-campaign-fundraiser'")
          patch('scripts/ash-profile-demo-browser-probe.mjs',
                "assert(current.routeMemory?.entries?.length === 3, `${profile}: Route Memory was not hydrated.`);",
                "assert(current.routeMemory?.entries?.length === expected.routes, `${profile}: Route Memory was not hydrated.`);")
          patch('scripts/ash-profile-demo-browser-probe.mjs',
                "try {\n  await fly('political_campaign'",
                "try {\n  await fly('investigation', {\n    button: 'Investigation',\n    title: 'Glass Meridian Vendor Integrity Inquiry',\n    rooms: 12,\n    nodes: 56,\n    relationships: 72,\n    routes: 4,\n    route: 'route_llm_analysis'\n  });\n  await fly('political_campaign'")
          patch('scripts/ash-profile-demo-browser-probe.mjs',
                "relationships: 34,\n    route: 'route_reporter_response'",
                "relationships: 34,\n    routes: 3,\n    route: 'route_reporter_response'")
          patch('scripts/ash-profile-demo-browser-probe.mjs',
                "relationships: 35,\n    route: 'route_lead_host_brief'",
                "relationships: 35,\n    routes: 3,\n    route: 'route_lead_host_brief'")

          workflow = root / '.github/workflows/ash-user-test-flight.yml'
          source = workflow.read_text()
          source = source.replace("      - 'scripts/ash-premium-ui-browser-probe.mjs'\n", "      - 'scripts/ash-premium-ui-browser-probe.mjs'\n      - 'scripts/ash-investigation-guidance-browser-probe.mjs'\n")
          source = source.replace("      - 'tests/ash-premium-ui.test.mjs'\n", "      - 'tests/ash-premium-ui.test.mjs'\n      - 'tests/ash-investigation-guidance.test.mjs'\n")
          source = source.replace("          node tests/ash-premium-ui.test.mjs\n", "          node tests/ash-premium-ui.test.mjs\n          node tests/ash-investigation-guidance.test.mjs\n")
          source = source.replace('Fly Political Campaign and Fundraiser demos', 'Fly Investigation, Political Campaign, and Fundraiser demos')
          source = source.replace("profile-demos/v0.2-campaign-fundraiser", "profile-demos/v0.3-investigation-campaign-fundraiser")
          local_anchor = "      - name: Fly premium Command Deck, Choir, and Capsule\n"
          local_step = "      - name: Fly guided Investigation workflow\n        env:\n          TD613_BASE_URL: http://127.0.0.1:6130\n          TD613_ARTIFACT_DIR: artifacts/ash-user-flight-local/investigation-guidance\n        run: node scripts/ash-investigation-guidance-browser-probe.mjs\n"
          if local_step not in source:
              source = source.replace(local_anchor, local_step + local_anchor, 1)
          deployed_anchor = "      - name: Fly deployed premium Command Deck, Choir, and Capsule\n"
          deployed_step = "      - name: Fly deployed guided Investigation workflow\n        if: github.event_name == 'push'\n        env:\n          TD613_BASE_URL: https://td613.com\n          TD613_ARTIFACT_DIR: artifacts/ash-user-flight-deployed/investigation-guidance\n        run: node scripts/ash-investigation-guidance-browser-probe.mjs\n"
          if deployed_step not in source:
              source = source.replace(deployed_anchor, deployed_step + deployed_anchor, 1)
          workflow.write_text(source)
          PY
          node tests/ash-profile-demos.test.mjs
          node tests/ash-investigation-guidance.test.mjs
          node --check app/dome-world/ash-guided-operator-ui.js
          node --check scripts/ash-investigation-guidance-browser-probe.mjs
      - name: Remove self-patch workflow and commit
        run: |
          git rm .github/workflows/ash-investigation-hydration-self-patch.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add app/dome-world/fixtures/ash-keep-demo-investigation.json app/dome-world/ash-profile-demo-hydration.js app/dome-world/ash-workspace-bridge.js tests/ash-profile-demos.test.mjs scripts/ash-profile-demo-browser-probe.mjs .github/workflows/ash-user-test-flight.yml
          git commit -m "Hydrate rigorous Investigation demo and guided flight"
          git push origin HEAD:agent/ash-investigation-demo-hydration
