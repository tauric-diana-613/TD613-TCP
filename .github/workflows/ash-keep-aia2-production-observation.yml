name: Ash Keep AIA2 Production Observation

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write

concurrency:
  group: td613-ash-aia2-production-observation
  cancel-in-progress: false

jobs:
  observe:
    if: >-
      github.event.issue.number == 405 &&
      github.event.issue.pull_request == null &&
      github.event.comment.user.login == github.repository_owner &&
      startsWith(github.event.comment.body, '/td613-ash-aia2-observe ')
    runs-on: ubuntu-latest
    timeout-minutes: 65
    env:
      RELEASE_GATE_ISSUE: '405'
      TD613_CANONICAL_PRODUCTION_URL: https://td613.com
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Check out current main with source history
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Validate exact read-only observation command
        id: authorize
        env:
          AUTHORIZATION: ${{ github.event.comment.body }}
        run: |
          set -euo pipefail
          read -r COMMAND TARGET SELECTED_SHA EXTRA <<< "$AUTHORIZATION"
          [[ "$COMMAND" == '/td613-ash-aia2-observe' ]] || { echo 'Unexpected observation command.' >&2; exit 1; }
          [[ "$TARGET" == 'PRODUCTION' ]] || { echo 'Only the named PRODUCTION target is accepted.' >&2; exit 1; }
          [[ -z "${EXTRA:-}" ]] || { echo 'Observation command must contain exactly command, target, and SHA.' >&2; exit 1; }
          [[ "$SELECTED_SHA" =~ ^[0-9a-f]{40}$ ]] || { echo 'Observation command omitted a 40-character SHA.' >&2; exit 1; }
          git cat-file -e "$SELECTED_SHA^{commit}"
          git merge-base --is-ancestor "$SELECTED_SHA" HEAD || { echo 'Selected source packet is not an ancestor of current main.' >&2; exit 1; }
          git checkout --detach "$SELECTED_SHA"
          test -f scripts/ash-keep-aia2-task-journey-v5.mjs
          echo "selected_sha=$SELECTED_SHA" >> "$GITHUB_OUTPUT"

      - name: Record accepted read-only observation
        run: |
          gh api "repos/$GITHUB_REPOSITORY/issues/$RELEASE_GATE_ISSUE/comments" \
            -f body="$(cat <<EOF_COMMENT
          𝌋 Ash Keep AIA2 read-only production observation accepted.

          \`\`\`text
          source_packet_commit = ${{ steps.authorize.outputs.selected_sha }}
          target = PRODUCTION
          deployment_count = 0
          repository_write_authority = false
          workflow_run = $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID
          \`\`\`

          This conduit observes the deployed task journey only. It cannot deploy, relock, mutate Ash, authorize a child study, or close the program. ⟐
          EOF_COMMENT
          )"

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install bounded witness dependencies
        run: |
          npm ci
          npm install --no-save --package-lock=false playwright@1.53.2
          npx playwright install --with-deps chromium firefox webkit

      - name: Observe exact deployed Ash Keep task journey
        env:
          TD613_BASE_URL: ${{ env.TD613_CANONICAL_PRODUCTION_URL }}
          TD613_SOURCE_PACKET_COMMIT: ${{ steps.authorize.outputs.selected_sha }}
          TD613_PRODUCTION_OBSERVATION: 'true'
        run: |
          set -euo pipefail
          for browser in chromium firefox webkit; do
            TD613_BROWSER="$browser" \
            TD613_ARTIFACT_DIR="artifacts/ash-aia2-production/$browser" \
            node scripts/ash-keep-aia2-task-journey-v5.mjs
          done

      - name: Verify bounded production receipts
        run: |
          node --input-type=module <<'NODE'
          import fs from 'node:fs';
          const expected = '${{ steps.authorize.outputs.selected_sha }}';
          for (const browser of ['chromium', 'firefox', 'webkit']) {
            const path = `artifacts/ash-aia2-production/${browser}/ash-aia2-task-continuity.json`;
            const receipt = JSON.parse(fs.readFileSync(path, 'utf8'));
            if (receipt.status !== 'PASS') throw new Error(`${browser} production journey held.`);
            if (receipt.source_packet_commit !== expected) throw new Error(`${browser} source-packet label drifted.`);
            if (receipt.production_observation !== true) throw new Error(`${browser} was not marked as production observation.`);
            const authority = receipt.authority || {};
            if (authority.counts_as_human_evidence !== false || authority.authorizes_child_study !== false || authority.authorizes_release !== false || authority.closes_program !== false) {
              throw new Error(`${browser} observer widened authority.`);
            }
          }
          NODE

      - name: Preserve Ash Keep production evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ash-aia2-production-observation
          path: artifacts/ash-aia2-production/
          if-no-files-found: warn
          retention-days: 45

      - name: Seal successful read-only observation
        if: success()
        run: |
          gh api "repos/$GITHUB_REPOSITORY/issues/$RELEASE_GATE_ISSUE/comments" \
            -f body="$(cat <<EOF_COMMENT
          𝌋 Ash Keep AIA2 production task continuity observed.

          \`\`\`text
          source_packet_commit = ${{ steps.authorize.outputs.selected_sha }}
          target = PRODUCTION
          deployment_count = 0
          chromium_desktop_mobile = PASS
          firefox_desktop_mobile = PASS
          webkit_desktop_mobile = PASS
          exact_ingress = PASS
          local_document_path = PASS
          route_continuity = PASS
          tutorial_non_mutation = PASS
          rest_return = PASS
          counts_as_human_evidence = false
          child_study_authorized = false
          release_authorized = false
          human_closure_required = true
          \`\`\`

          The deployed Ash Keep task journey is observed across all three engines. This receipt does not authorize another deployment, a child study, or program closure. Sealed ⟐
          EOF_COMMENT
          )"

      - name: Record held read-only observation
        if: failure()
        run: |
          gh api "repos/$GITHUB_REPOSITORY/issues/$RELEASE_GATE_ISSUE/comments" \
            -f body="$(cat <<EOF_COMMENT
          𝌋 Ash Keep AIA2 production observation held.

          \`\`\`text
          source_packet_commit = ${{ steps.authorize.outputs.selected_sha || 'unresolved' }}
          target = PRODUCTION
          deployment_count = 0
          workflow_run = $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID
          \`\`\`

          No deployment, retry authority, child-study authority, or closure authority follows from this held observation. ⟐
          EOF_COMMENT
          )"