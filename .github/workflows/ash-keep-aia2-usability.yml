name: Ash Keep AIA2 usability rescue

on:
  pull_request:
    paths:
      - '.aia2-stage/**'
      - 'app/dome-world/ash-keep*.html'
      - 'app/dome-world/ash-keep-aia*.js'
      - 'app/dome-world/ash-keep-aia*.css'
      - 'app/dome-world/ash-lifecycle.js'
      - 'app/engine/ash-live-aia.js'
      - 'scripts/ash-keep-aia2-*.mjs'
      - 'tests/ash-keep-aia2-*.test.mjs'
      - '.github/workflows/apply-ash-aia2-controller-once.yml'
      - '.github/workflows/ash-keep-aia2-usability.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ash-keep-aia2-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  apply-staged-controller:
    name: Apply staged task-continuity controller once
    if: github.event_name == 'pull_request' && github.event.pull_request.head.ref == 'agent/ash-keep-aia2-usability-rescue'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Apply only while staging exists
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -d .aia2-stage ]]; then
            echo 'Staged controller already applied.'
            exit 0
          fi
          cat .aia2-stage/ash-keep-aia.js.b64.* | tr -d '\n\r' | base64 --decode > app/dome-world/ash-keep-aia.js
          test "$(wc -c < app/dome-world/ash-keep-aia.js | tr -d ' ')" -gt 25000
          grep -Fq 'td613.ash.live-aia-browser/v0.2-task-continuity' app/dome-world/ash-keep-aia.js
          grep -Fq 'task_continuity_required: true' app/dome-world/ash-keep-aia.js
          grep -Fq 'Open a local document' app/dome-world/ash-keep-aia.js
          node --check app/dome-world/ash-keep-aia.js
          sha256sum app/dome-world/ash-keep-aia.js
          rm -rf .aia2-stage
          rm -f .github/workflows/apply-ash-aia2-controller-once.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add app/dome-world/ash-keep-aia.js .aia2-stage .github/workflows/apply-ash-aia2-controller-once.yml
          git commit -m 'Replace Ash Keep facade with task-continuity controller'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

  production-diagnosis:
    name: Observe current production desktop and mobile
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm install --no-save --package-lock=false playwright@1.53.2
      - run: npx playwright install --with-deps chromium
      - name: Observe current production without mutation
        env:
          TD613_BASE_URL: https://td613.com
          TD613_ARTIFACT_DIR: artifacts/ash-aia2-production-diagnosis
        run: node scripts/ash-keep-aia2-production-diagnosis.mjs
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ash-aia2-production-diagnosis
          path: artifacts/ash-aia2-production-diagnosis/
          if-no-files-found: error
          retention-days: 45

  inherited-contracts:
    name: Preserve Ash law while rescue is in progress
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: node tests/ash-keep-live-aia-engine.test.mjs
      - run: node tests/ash-lifecycle.test.mjs
      - run: node tests/ash-keep-core.test.mjs
      - run: node tests/ash-keep-continuity.test.mjs
      - run: node tests/ash-keep-hush-api.test.mjs
      - run: node tests/tcp-smoke.test.mjs
