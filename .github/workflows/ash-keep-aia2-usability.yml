name: Ash Keep AIA2 usability rescue

on:
  pull_request:
    paths:
      - 'app/dome-world/ash-keep-aia*.js'
      - 'app/dome-world/ash-keep-aia*.css'
      - 'app/dome-world/ash-lifecycle.js'
      - 'app/engine/ash-live-aia.js'
      - 'scripts/ash-keep-aia2-*.mjs'
      - 'tests/ash-keep-live-aia-surface.test.mjs'
      - 'tests/ash-keep-aia2-*.test.mjs'
      - 'app/dome-world/docs/ASH_KEEP_AIA2_USABILITY_RESCUE_RECEIPT_V0_1.md'
      - '.github/workflows/ash-keep-aia2-usability.yml'
  push:
    branches: [main]
    paths:
      - 'app/dome-world/ash-keep-aia*.js'
      - 'app/dome-world/ash-keep-aia*.css'
      - 'app/dome-world/ash-lifecycle.js'
      - 'app/engine/ash-live-aia.js'
      - 'scripts/ash-keep-aia2-*.mjs'
      - 'tests/ash-keep-live-aia-surface.test.mjs'
      - 'tests/ash-keep-aia2-*.test.mjs'
      - 'app/dome-world/docs/ASH_KEEP_AIA2_USABILITY_RESCUE_RECEIPT_V0_1.md'
      - '.github/workflows/ash-keep-aia2-usability.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ash-keep-aia2-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  contracts:
    name: Task continuity and inherited Ash law
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Validate rescue scripts
        run: |
          node --check app/dome-world/ash-keep-aia.js
          node --check app/dome-world/ash-keep-aia-workspace-bridge.js
          node --check scripts/ash-keep-aia2-production-diagnosis.mjs
          node --check scripts/ash-keep-aia2-task-journey.mjs
      - name: Live presentation and task-continuity contracts
        run: node tests/ash-keep-live-aia-surface.test.mjs
      - name: Live AIA engine contracts
        run: node tests/ash-keep-live-aia-engine.test.mjs
      - name: Inherited P6 pedagogue contracts
        run: node tests/ash-pedagogue-custody-route.test.mjs
      - name: Exact lifecycle contracts
        run: node tests/ash-lifecycle.test.mjs
      - name: Ash Keep core contracts
        run: node tests/ash-keep-core.test.mjs
      - name: Ash Keep continuity contracts
        run: node tests/ash-keep-continuity.test.mjs
      - name: Ash Keep Hush API contracts
        run: node tests/ash-keep-hush-api.test.mjs
      - name: Static delivery and smoke
        run: |
          node tests/dome-world-ash-custody.test.mjs
          node tests/tcp-smoke.test.mjs
