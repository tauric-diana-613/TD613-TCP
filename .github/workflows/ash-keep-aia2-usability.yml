name: Ash Keep AIA3 inherited law

on:
  pull_request:
    paths:
      - 'api/dome-world-shell.js'
      - 'vercel.json'
      - 'app/dome-world/ash-keep-aia*.js'
      - 'app/dome-world/ash-keep-aia*.css'
      - 'app/dome-world/ash-aia3-*.js'
      - 'app/dome-world/ash-cache-eviction-aia3.js'
      - 'app/dome-world/ash-lifecycle.js'
      - 'app/engine/ash-live-aia.js'
      - 'scripts/ash-keep-aia3-task-journey-v3.mjs'
      - 'scripts/ash-keep-local-closure-server.mjs'
      - 'tests/ash-aia3-mass-eviction.test.mjs'
      - 'tests/ash-keep-live-aia-surface.test.mjs'
      - 'tests/ash-live-ingress-demos-cache.test.mjs'
      - 'tests/product-architecture/shell.test.mjs'
      - '.github/workflows/ash-keep-aia2-usability.yml'
  push:
    branches: [main]
    paths:
      - 'api/dome-world-shell.js'
      - 'vercel.json'
      - 'app/dome-world/ash-keep-aia*.js'
      - 'app/dome-world/ash-keep-aia*.css'
      - 'app/dome-world/ash-aia3-*.js'
      - 'app/dome-world/ash-cache-eviction-aia3.js'
      - 'app/dome-world/ash-lifecycle.js'
      - 'app/engine/ash-live-aia.js'
      - 'scripts/ash-keep-aia3-task-journey-v3.mjs'
      - 'scripts/ash-keep-local-closure-server.mjs'
      - 'tests/ash-aia3-mass-eviction.test.mjs'
      - 'tests/ash-keep-live-aia-surface.test.mjs'
      - 'tests/ash-live-ingress-demos-cache.test.mjs'
      - 'tests/product-architecture/shell.test.mjs'
      - '.github/workflows/ash-keep-aia2-usability.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ash-keep-aia3-inherited-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  contracts:
    name: AIA3 presentation and inherited Ash law
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Validate durable AIA3 source and canonical witness
        run: |
          node --check app/dome-world/ash-keep-aia.js
          node --check app/dome-world/ash-aia3-composition.js
          node --check app/dome-world/ash-cache-eviction-aia3.js
          node --check app/dome-world/ash-keep-aia-workspace-bridge.js
          node --check app/dome-world/ash-lifecycle.js
          node --check scripts/ash-keep-aia3-task-journey-v3.mjs
          node --check scripts/ash-keep-local-closure-server.mjs
          node --check api/dome-world-shell.js
          node tests/ash-aia3-mass-eviction.test.mjs
          node tests/product-architecture/shell.test.mjs
          node tests/ash-live-ingress-demos-cache.test.mjs
      - name: Live presentation and task-continuity contracts
        run: node tests/ash-keep-live-aia-surface.test.mjs
      - name: Live AIA engine contracts
        run: node tests/ash-keep-live-aia-engine.test.mjs
      - name: Inherited P6 pedagogue contracts
        run: node tests/ash-pedagogue-custody-route.test.mjs
      - name: Exact lifecycle contracts
        run: node tests/ash-lifecycle.test.mjs
      - name: Ash Keep core, continuity, and Hush contracts
        run: |
          node tests/ash-keep-core.test.mjs
          node tests/ash-keep-continuity.test.mjs
          node tests/ash-keep-hush-api.test.mjs
      - name: Static delivery and smoke
        run: |
          node tests/dome-world-ash-custody.test.mjs
          node tests/tcp-smoke.test.mjs
