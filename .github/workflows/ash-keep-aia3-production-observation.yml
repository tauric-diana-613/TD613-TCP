name: Ash Keep AIA3 Production Observation

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write

concurrency:
  group: td613-ash-aia3-production-observation
  cancel-in-progress: false

jobs:
  observe:
    if: >-
      github.event.issue.number == 405 &&
      github.event.issue.pull_request == null &&
      github.event.comment.user.login == github.repository_owner &&
      startsWith(github.event.comment.body, '/td613-ash-aia3-observe ')
    runs-on: ubuntu-latest
    timeout-minutes: 75
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_GATE_ISSUE: '405'
      TD613_BASE_URL: https://td613.com
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Validate exact deployed-source ancestor
        id: source
        env:
          AUTHORIZATION: ${{ github.event.comment.body }}
        run: |
          set -euo pipefail
          read -r COMMAND SELECTED_SHA EXTRA <<< "$AUTHORIZATION"
          [[ "$COMMAND" == "/td613-ash-aia3-observe" ]] || { echo 'Unexpected command.' >&2; exit 1; }
          [[ -z "${EXTRA:-}" && "$SELECTED_SHA" =~ ^[0-9a-f]{40}$ ]] || { echo 'Exact 40-character source SHA required.' >&2; exit 1; }
          git cat-file -e "$SELECTED_SHA^{commit}"
          git merge-base --is-ancestor "$SELECTED_SHA" HEAD
          echo "selected_sha=$SELECTED_SHA" >> "$GITHUB_OUTPUT"
      - run: npm ci --ignore-scripts
      - name: Install production browser observers
        run: |
          npm install --no-save --package-lock=false playwright@1.53.2
          npx playwright install --with-deps chromium firefox webkit
      - name: Observe AIA3 production journey in all engines
        run: |
          set -euo pipefail
          for browser in chromium firefox webkit; do
            TD613_BROWSER="$browser" \
            TD613_SOURCE_PACKET_COMMIT="${{ steps.source.outputs.selected_sha }}" \
            TD613_PRODUCTION_OBSERVATION='true' \
            TD613_ARTIFACT_DIR="artifacts/ash-aia3-production/$browser" \
            node scripts/ash-keep-aia3-task-journey-v2.mjs
          done
      - name: Verify bounded receipts
        run: |
          node --input-type=module <<'NODE'
          import fs from 'node:fs';
          for (const browser of ['chromium','firefox','webkit']) {
            const receipt = JSON.parse(fs.readFileSync(`artifacts/ash-aia3-production/${browser}/ash-aia3-task-continuity.json`, 'utf8'));
            if (receipt.status !== 'PASS') throw new Error(`${browser} AIA3 production journey held.`);
            if (receipt.authority.counts_as_human_evidence !== false || receipt.authority.authorizes_child_study !== false || receipt.authority.authorizes_release !== false || receipt.authority.closes_program !== false) throw new Error(`${browser} observer widened authority.`);
          }
          NODE
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ash-aia3-production-observation-evidence
          path: artifacts/ash-aia3-production/
          if-no-files-found: warn
          retention-days: 45
      - name: Seal read-only observation
        if: success()
        run: |
          gh api "repos/$GITHUB_REPOSITORY/issues/$RELEASE_GATE_ISSUE/comments" -f body="$(cat <<EOF_COMMENT
          𝌋 Ash Keep AIA3 production observation passed.

          \`\`\`text
          source_packet_commit = ${{ steps.source.outputs.selected_sha }}
          deployment_count = 0
          chromium_desktop_mobile = PASS
          firefox_desktop_mobile = PASS
          webkit_desktop_mobile = PASS
          canonical_fixed_ingress = PASS
          compact_post_case_guide = PASS
          local_document_journey = PASS
          lifecycle_semantic_nonmutation = PASS
          cache_storage = EVICTED
          service_workers = EVICTED
          indexeddb_cases_preserved = true
          counts_as_human_evidence = false
          child_study_authorized = false
          release_authorized = false
          human_closure_required = true
          \`\`\`
          Sealed ⟐
          EOF_COMMENT
          )"
      - name: Record held observation
        if: failure()
        run: |
          gh api "repos/$GITHUB_REPOSITORY/issues/$RELEASE_GATE_ISSUE/comments" -f body="𝌋 Ash Keep AIA3 production observation held. Source: ${{ steps.source.outputs.selected_sha || 'unresolved' }}. Workflow: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID. No deployment or retry authority was created. ⟐"
