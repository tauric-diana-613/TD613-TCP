name: Ash Keep Choir Test

on:
  pull_request:
    paths:
      - "app/engine/ash-keep-moire.js"
      - "app/engine/ash-keep-reader-adapters.js"
      - "app/engine/ash-keep-reader-disagreement.js"
      - "app/engine/ash-keep-benign-controls.js"
      - "app/engine/ash-keep-choir-calibration*.js"
      - "app/engine/ash-keep-higher-order-interference.js"
      - "app/engine/ash-keep-ordered-route-sequence.js"
      - "app/engine/ash-keep-temporal-disclosure.js"
      - "app/dome-world/schemas/aperture-moire-rebuild-*.schema.json"
      - "app/dome-world/schemas/aperture-reader-*.schema.json"
      - "app/dome-world/schemas/aperture-matched-benign-control-*.schema.json"
      - "app/dome-world/schemas/aperture-choir-calibration-*.schema.json"
      - "app/dome-world/schemas/aperture-higher-order-interference-v01.schema.json"
      - "app/dome-world/schemas/aperture-ordered-route-sequence-v01.schema.json"
      - "app/dome-world/schemas/aperture-temporal-disclosure-v01.schema.json"
      - "tests/ash-keep-moire*.test.mjs"
      - "tests/ash-keep-reader-adapter*.test.mjs"
      - "tests/ash-keep-reader-disagreement*.test.mjs"
      - "tests/ash-keep-benign-controls*.test.mjs"
      - "tests/ash-keep-choir-calibration*.test.mjs"
      - "tests/choir-calibration/*.test.mjs"
      - "tests/fixtures/choir-calibration-fixture.mjs"
      - "scripts/publish-ash-keep-observer-status.mjs"
      - "docs/ASH_KEEP_CHOIR_TEST.md"
      - "docs/ASH_KEEP_READER_ADAPTER_REGISTRY.md"
      - "docs/ASH_KEEP_READER_DISAGREEMENT.md"
      - "docs/ASH_KEEP_MATCHED_BENIGN_CONTROLS.md"
      - "docs/ASH_KEEP_CHOIR_CALIBRATION_BINDING.md"
      - "docs/ASH_KEEP_STRETCH6_CLOSURE_RECEIPT.md"
      - "docs/ASH_KEEP_STRETCH7_CLOSURE_RECEIPT.md"
      - "docs/ASH_KEEP_STRETCH8_CLOSURE_RECEIPT.md"
      - "docs/ASH_KEEP_BUILDOUT_LEDGER.md"
      - "ROADMAP.md"
      - ".github/workflows/ash-keep-choir-test.yml"
  push:
    branches: [main]
    paths:
      - "app/engine/ash-keep-moire.js"
      - "app/engine/ash-keep-reader-adapters.js"
      - "app/engine/ash-keep-reader-disagreement.js"
      - "app/engine/ash-keep-benign-controls.js"
      - "app/engine/ash-keep-choir-calibration*.js"
      - "app/engine/ash-keep-higher-order-interference.js"
      - "app/engine/ash-keep-ordered-route-sequence.js"
      - "app/engine/ash-keep-temporal-disclosure.js"
      - "app/dome-world/schemas/aperture-moire-rebuild-*.schema.json"
      - "app/dome-world/schemas/aperture-reader-*.schema.json"
      - "app/dome-world/schemas/aperture-matched-benign-control-*.schema.json"
      - "app/dome-world/schemas/aperture-choir-calibration-*.schema.json"
      - "app/dome-world/schemas/aperture-higher-order-interference-v01.schema.json"
      - "app/dome-world/schemas/aperture-ordered-route-sequence-v01.schema.json"
      - "app/dome-world/schemas/aperture-temporal-disclosure-v01.schema.json"
      - "tests/ash-keep-moire*.test.mjs"
      - "tests/ash-keep-reader-adapter*.test.mjs"
      - "tests/ash-keep-reader-disagreement*.test.mjs"
      - "tests/ash-keep-benign-controls*.test.mjs"
      - "tests/ash-keep-choir-calibration*.test.mjs"
      - "tests/choir-calibration/*.test.mjs"
      - "tests/fixtures/choir-calibration-fixture.mjs"
      - "scripts/publish-ash-keep-observer-status.mjs"
      - "docs/ASH_KEEP_CHOIR_TEST.md"
      - "docs/ASH_KEEP_READER_ADAPTER_REGISTRY.md"
      - "docs/ASH_KEEP_READER_DISAGREEMENT.md"
      - "docs/ASH_KEEP_MATCHED_BENIGN_CONTROLS.md"
      - "docs/ASH_KEEP_CHOIR_CALIBRATION_BINDING.md"
      - "docs/ASH_KEEP_STRETCH6_CLOSURE_RECEIPT.md"
      - "docs/ASH_KEEP_STRETCH7_CLOSURE_RECEIPT.md"
      - "docs/ASH_KEEP_STRETCH8_CLOSURE_RECEIPT.md"
      - "docs/ASH_KEEP_BUILDOUT_LEDGER.md"
      - "ROADMAP.md"
      - ".github/workflows/ash-keep-choir-test.yml"
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

jobs:
  choir-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TD613_OBSERVED_COMMIT: ${{ github.sha }}
      TD613_OBSERVER_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      TD613_OBSERVER_STATUS_CONTEXT: Ash Choir Calibration Validation
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Publish Choir validation pending status
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TD613_OBSERVER_STATUS_STATE: pending
          TD613_OBSERVER_STATUS_DESCRIPTION: Ash Choir calibration validation is running
          TD613_OBSERVER_STATUS_RECEIPT_PATH: artifacts/choir-calibration-validation/observer-status-pending.json
        run: node scripts/publish-ash-keep-observer-status.mjs
      - run: npm ci
      - name: Validate Choir schemas
        run: node tests/ash-keep-moire-schemas.test.mjs
      - name: Validate Choir bounded pairwise core
        run: node tests/ash-keep-moire.test.mjs
      - name: Stress Choir observation states and canonical invariants
        run: node tests/ash-keep-moire-stress.test.mjs
      - name: Validate Reader adapter provenance schemas
        run: node tests/ash-keep-reader-adapter-schemas.test.mjs
      - name: Validate Reader adapter provenance registry
        run: node tests/ash-keep-reader-adapters.test.mjs
      - name: Harden Reader adapter canonicalization and fixture classes
        run: node tests/ash-keep-reader-adapter-hardening.test.mjs
      - name: Validate Reader disagreement schemas
        run: node tests/ash-keep-reader-disagreement-schemas.test.mjs
      - name: Validate provenance-gated Reader disagreement
        run: node tests/ash-keep-reader-disagreement.test.mjs
      - name: Validate matched benign control schemas
        run: node tests/ash-keep-benign-controls-schemas.test.mjs
      - name: Validate matched benign adjacent-document controls
        shell: bash
        run: |
          set -o pipefail
          node tests/ash-keep-benign-controls.test.mjs 2>&1 | tee matched-control-validation.log
      - name: Validate Choir calibration binding schemas
        run: node tests/ash-keep-choir-calibration-schemas.test.mjs
      - name: Validate receipt-bound Choir calibration
        shell: bash
        run: |
          set -o pipefail
          node tests/ash-keep-choir-calibration.test.mjs 2>&1 | tee choir-calibration-validation.log
      - name: Validate ordered route-sequence recovery
        run: node tests/choir-calibration/ordered-route-sequence.test.mjs
      - name: Validate temporal and delayed-disclosure assays
        run: node tests/choir-calibration/temporal-disclosure.test.mjs
      - name: Publish Choir validation success status
        if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TD613_OBSERVER_STATUS_STATE: success
          TD613_OBSERVER_STATUS_DESCRIPTION: Ash Choir calibration and temporal receipts passed
          TD613_OBSERVER_STATUS_RECEIPT_PATH: artifacts/choir-calibration-validation/observer-status-success.json
        run: node scripts/publish-ash-keep-observer-status.mjs
      - name: Publish Choir validation failure status
        if: failure() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TD613_OBSERVER_STATUS_STATE: failure
          TD613_OBSERVER_STATUS_DESCRIPTION: Ash Choir calibration validation held for repair
          TD613_OBSERVER_STATUS_RECEIPT_PATH: artifacts/choir-calibration-validation/observer-status-failure.json
        run: node scripts/publish-ash-keep-observer-status.mjs
      - name: Preserve Choir calibration validation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: choir-calibration-validation-evidence
          path: |
            choir-calibration-validation.log
            scripts/publish-ash-keep-observer-status.mjs
            artifacts/choir-calibration-validation/
          if-no-files-found: error
          retention-days: 30
      - name: Reconcile terminal Choir validation failure status
        if: failure() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TD613_OBSERVER_STATUS_STATE: failure
          TD613_OBSERVER_STATUS_DESCRIPTION: Ash Choir validation or evidence preservation failed
          TD613_OBSERVER_STATUS_RECEIPT_PATH: artifacts/choir-calibration-validation/observer-status-failure-reconciled.json
        run: node scripts/publish-ash-keep-observer-status.mjs
      - name: Preserve matched control failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: matched-control-failure-log
          path: matched-control-validation.log
          if-no-files-found: ignore
