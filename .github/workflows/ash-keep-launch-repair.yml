name: Ash Keep launch membrane repair

on:
  push:
    branches:
      - agent/ash-threshold-desktop-scroll
    paths:
      - .github/workflows/ash-keep-launch-repair.yml

permissions:
  contents: write

jobs:
  repair:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/ash-threshold-desktop-scroll

      - name: Repair launch membrane
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          html_path = Path('app/dome-world/ash-keep.html')
          js_path = Path('app/dome-world/ash-keep.js')
          test_path = Path('tests/ash-keep-launch-membrane.test.mjs')
          workflow_path = Path('.github/workflows/ash-keep-launch-repair.yml')

          def replace_once(text, old, new, label):
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{label}: expected exactly one marker, found {count}')
              return text.replace(old, new, 1)

          html = html_path.read_text(encoding='utf-8')
          html = replace_once(
              html,
              '.back{display:inline-grid;place-items:center;width:34px;height:34px;color:var(--paper);border:1px solid var(--line);text-decoration:none;font-size:1.2rem}',
              '.back{display:inline-grid;place-items:center;width:34px;height:34px;color:var(--paper);border:1px solid var(--line);background:transparent;text-decoration:none;font-size:1.2rem;cursor:pointer}.case-entry{width:auto;min-width:54px;padding:0 9px;font:700 .62rem var(--mono);text-transform:uppercase}',
              'header control styles'
          )
          html = replace_once(
              html,
              '.launch{position:fixed;inset:0;z-index:80;display:grid;place-items:center;padding:22px;background:rgba(1,5,4,.92);backdrop-filter:blur(14px)}.launch.hidden{display:none}.launch-panel{width:min(760px,100%);padding:28px;border:1px solid var(--line2);background:#04130f;clip-path:polygon(20px 0,100% 0,100% calc(100% - 20px),calc(100% - 20px) 100%,0 100%,0 20px)}.launch-glyphs{color:var(--mint);font:600 .72rem var(--mono)}.launch h2{margin:14px 0 8px;font:500 clamp(2rem,8vw,4.5rem)/.95 var(--serif)}.launch p{max-width:620px;color:var(--muted);line-height:1.6}.launch .field-grid{margin-top:18px}',
              '.launch{position:fixed;inset:0;z-index:80;display:grid;place-items:center;padding:22px;background:rgba(1,5,4,.92);backdrop-filter:blur(14px)}.launch.hidden{display:none}.launch-panel{width:min(760px,100%);padding:28px;border:1px solid var(--line2);background:#04130f;clip-path:polygon(20px 0,100% 0,100% calc(100% - 20px),calc(100% - 20px) 100%,0 100%,0 20px)}.launch.booting .launch-panel{width:min(360px,100%)}.launch.booting .launch-panel>*{display:none}.launch.booting .launch-panel::after{content:"Opening local custody…";display:block;padding:8px;color:var(--mint);font:700 .72rem var(--mono);letter-spacing:.1em;text-align:center;text-transform:uppercase}.launch-top{display:flex;align-items:center;justify-content:space-between;gap:12px}.launch-close{min-height:34px;padding:6px 10px;border:1px solid var(--line);background:transparent;color:var(--muted);font:700 .62rem var(--mono);text-transform:uppercase;cursor:pointer}.launch-glyphs{color:var(--mint);font:600 .72rem var(--mono)}.launch h2{margin:14px 0 8px;font:500 clamp(2rem,8vw,4.5rem)/.95 var(--serif)}.launch p{max-width:620px;color:var(--muted);line-height:1.6}.launch .field-grid{margin-top:18px}body.launch-open{overflow:hidden}',
              'launch styles'
          )
          html = replace_once(
              html,
              '<div class="mast-state"><span class="status-chip" id="storageState">Local custody</span><a class="back" href="/dome-world/index.html#ash" aria-label="Back to Dome-World">‹</a></div>',
              '<div class="mast-state"><span class="status-chip" id="storageState">Local custody</span><button class="back case-entry" id="openLaunch" type="button" aria-controls="launch" aria-expanded="false" aria-label="Open case entry" title="Open case entry">Case</button><a class="back" href="/dome-world/index.html#ash" aria-label="Back to Dome-World">‹</a></div>',
              'case entry control'
          )
          html = replace_once(
              html,
              '<div class="launch" id="launch"><section class="launch-panel"><div class="launch-glyphs">米 · 上 · 下 · hõt · cōl · 𝄐 · ⟐</div><h2>Ash Keep</h2><p>Keep the private shape of a case coherent while testing what a purpose-shaped fragment could make recoverable through a declared route.</p>',
              '<div class="launch booting" id="launch" role="dialog" aria-modal="true" aria-labelledby="launchTitle" aria-describedby="launchDescription" aria-hidden="false"><section class="launch-panel"><div class="launch-top"><div class="launch-glyphs">米 · 上 · 下 · hõt · cōl · 𝄐 · ⟐</div><button class="launch-close" id="closeLaunch" type="button" hidden>Return to case</button></div><h2 id="launchTitle">Ash Keep</h2><p id="launchDescription">Keep the private shape of a case coherent while testing what a purpose-shaped fragment could make recoverable through a declared route.</p>',
              'launch dialog markup'
          )
          html_path.write_text(html, encoding='utf-8')

          js = js_path.read_text(encoding='utf-8')
          js = replace_once(
              js,
              "  canvasSize: { width: 0, height: 0, dpr: 0 }\n};\n\nfunction openDb() {",
              "  canvasSize: { width: 0, height: 0, dpr: 0 }\n};\n\nfunction setLaunchOpen(open, { returnable = Boolean(state.caseMap) } = {}) {\n  const launch = $('launch');\n  const close = $('closeLaunch');\n  launch.classList.remove('booting');\n  launch.classList.toggle('hidden', !open);\n  launch.setAttribute('aria-hidden', String(!open));\n  $('openLaunch').setAttribute('aria-expanded', String(open));\n  close.hidden = !returnable;\n  document.body.classList.toggle('launch-open', open);\n  if (open) requestAnimationFrame(() => $('newTitle').focus({ preventScroll: true }));\n  else if (launch.contains(document.activeElement)) $('openLaunch').focus({ preventScroll: true });\n}\n\nfunction openDb() {",
              'launch state helper'
          )
          hidden_marker = "  $('launch').classList.add('hidden');"
          if js.count(hidden_marker) != 2:
              raise SystemExit(f'launch hide markers: expected 2, found {js.count(hidden_marker)}')
          js = js.replace(hidden_marker, '  setLaunchOpen(false);')
          js = replace_once(
              js,
              "  $('launch').classList.remove('hidden');",
              "  setLaunchOpen(true, { returnable: false });",
              'first-case launch open'
          )
          js = replace_once(
              js,
              "  $('startDemo').addEventListener('click', () => act(() => createCase({ demo: true })));\n  $('newCase').addEventListener('click', () => act(() => createCase()));",
              "  $('startDemo').addEventListener('click', () => act(() => createCase({ demo: true })));\n  $('newCase').addEventListener('click', () => act(() => createCase()));\n  $('openLaunch').addEventListener('click', () => setLaunchOpen(true));\n  $('closeLaunch').addEventListener('click', () => { if (state.caseMap) setLaunchOpen(false); });",
              'launch controls'
          )
          js = replace_once(
              js,
              "  document.addEventListener('visibilitychange', () => { state.mapVisible = state.workspace === 'map' && !document.hidden; if (state.mapVisible) startScheduler(); else stopScheduler(); });",
              "  document.addEventListener('visibilitychange', () => { state.mapVisible = state.workspace === 'map' && !document.hidden; if (state.mapVisible) startScheduler(); else stopScheduler(); });\n  document.addEventListener('keydown', event => {\n    if (event.key === 'Escape' && state.caseMap && !$('launch').classList.contains('hidden')) setLaunchOpen(false);\n  });",
              'escape return path'
          )
          js = replace_once(
              js,
              "boot().catch(error => { $('storageState').textContent = 'Local custody error'; console.error(error); });",
              "boot().catch(error => { setLaunchOpen(true, { returnable: false }); $('storageState').textContent = 'Local custody error'; console.error(error); });",
              'boot error recovery'
          )
          js_path.write_text(js, encoding='utf-8')

          test_path.write_text("""import test from 'node:test';
          import assert from 'node:assert/strict';
          import { readFile } from 'node:fs/promises';

          const html = await readFile(new URL('../app/dome-world/ash-keep.html', import.meta.url), 'utf8');
          const js = await readFile(new URL('../app/dome-world/ash-keep.js', import.meta.url), 'utf8');

          test('Ash Keep case-entry membrane waits for boot and remains returnable', () => {
            assert.match(html, /class="launch booting" id="launch"/);
            assert.match(html, /id="openLaunch"/);
            assert.match(html, /id="closeLaunch"/);
            assert.match(html, /Return to case/);
            assert.match(js, /function setLaunchOpen\(/);
            assert.match(js, /setLaunchOpen\(true, \{ returnable: false \}\)/);
            assert.match(js, /openLaunch.*setLaunchOpen\(true\)/s);
            assert.doesNotMatch(js, /\$\('launch'\)\.classList\.(?:add|remove)\('hidden'\)/);
          });
          """, encoding='utf-8')

          workflow_path.unlink()
          PY

      - name: Validate launch membrane
        run: |
          node --check app/dome-world/ash-keep.js
          node --test tests/ash-keep-launch-membrane.test.mjs

      - name: Commit repair
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix Ash Keep case-entry membrane"
          git push origin HEAD:agent/ash-threshold-desktop-scroll
