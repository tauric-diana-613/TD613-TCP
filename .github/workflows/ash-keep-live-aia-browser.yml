name: Apply Ash parser-stop cache gate through trusted lane

on:
  pull_request:
    paths:
      - 'scripts/apply-ash-parser-stop-gate.mjs'
      - '.github/workflows/ash-keep-live-aia-browser.yml'

permissions:
  contents: write

concurrency:
  group: ash-parser-stop-gate
  cancel-in-progress: false

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'agent/ash-aia3-eviction-final4'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/ash-aia3-eviction-final4
          fetch-depth: 2
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Apply guarded parser-stop gate
        run: node scripts/apply-ash-parser-stop-gate.mjs
      - name: Validate parser stop and exact legacy bypass
        run: |
          node --check api/dome-world-shell.js
          node tests/ash-aia3-mass-eviction.test.mjs
          node tests/product-architecture/shell.test.mjs
          node --check scripts/prepare-ash-premium-closure-fixture.mjs
          node --check scripts/ash-keep-aia3-task-journey-v3.mjs
      - name: Remove patch script and restore read-only witness
        run: |
          rm -f scripts/apply-ash-parser-stop-gate.mjs
          git checkout HEAD^ -- .github/workflows/ash-keep-live-aia-browser.yml
      - name: Commit durable parser gate
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'fix: stop stale Ash module requests during eviction'
          git push origin HEAD:agent/ash-aia3-eviction-final4
