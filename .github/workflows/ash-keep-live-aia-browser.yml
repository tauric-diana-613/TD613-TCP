name: Apply Ash module-admission barrier through trusted lane

on:
  pull_request:
    paths:
      - 'scripts/apply-ash-module-admission-barrier.mjs'
      - '.github/workflows/ash-module-admission-barrier-apply.yml'
      - '.github/workflows/ash-keep-live-aia-browser.yml'

permissions:
  contents: write

concurrency:
  group: ash-module-admission-barrier-trusted
  cancel-in-progress: false

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'agent/ash-aia3-eviction-final3'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/ash-aia3-eviction-final3
          fetch-depth: 2
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Apply guarded admission barrier
        run: node scripts/apply-ash-module-admission-barrier.mjs
      - name: Validate admission, WebKit race, and legacy rollback contracts
        run: |
          node --check api/dome-world-shell.js
          node tests/product-architecture/shell.test.mjs
          node tests/ash-custody-workspace-bridge.test.mjs
          node tests/ash-live-ingress-demos-cache.test.mjs
          node tests/ash-aia3-mass-eviction.test.mjs
          node --check scripts/prepare-ash-premium-closure-fixture.mjs
          node --check scripts/ash-keep-aia3-task-journey-v3.mjs
      - name: Remove patch machinery and restore read-only witness
        run: |
          rm -f scripts/apply-ash-module-admission-barrier.mjs .github/workflows/ash-module-admission-barrier-apply.yml
          git checkout HEAD^ -- .github/workflows/ash-keep-live-aia-browser.yml
      - name: Commit durable barrier
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'fix: admit Ash modules only after cache preflight'
          git push origin HEAD:agent/ash-aia3-eviction-final3
