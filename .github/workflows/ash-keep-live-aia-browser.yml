name: Ash Keep AIA3 mass-eviction browser witness

on:
  pull_request:
    paths:
      - 'api/dome-world-shell.js'
      - 'app/engine/ash-live-aia.js'
      - 'app/dome-world/ash-keep-aia.js'
      - 'app/dome-world/ash-keep-aia.css'
      - 'app/dome-world/ash-keep-aia3*.css'
      - 'app/dome-world/ash-aia3-composition.js'
      - 'app/dome-world/ash-cache-eviction-aia3.js'
      - 'app/dome-world/ash-keep-aia-workspace-bridge.js'
      - 'app/dome-world/ash-lifecycle.js'
      - 'scripts/ash-keep-local-closure-server.mjs'
      - 'scripts/ash-keep-aia3-task-journey-v3.mjs'
      - 'tests/ash-aia3-mass-eviction.test.mjs'
      - 'tests/ash-keep-live-aia-surface.test.mjs'
      - '.github/workflows/ash-keep-live-aia-browser.yml'
  push:
    branches: [main]
    paths:
      - 'api/dome-world-shell.js'
      - 'app/engine/ash-live-aia.js'
      - 'app/dome-world/ash-keep-aia.js'
      - 'app/dome-world/ash-keep-aia.css'
      - 'app/dome-world/ash-keep-aia3*.css'
      - 'app/dome-world/ash-aia3-composition.js'
      - 'app/dome-world/ash-cache-eviction-aia3.js'
      - 'app/dome-world/ash-keep-aia-workspace-bridge.js'
      - 'app/dome-world/ash-lifecycle.js'
      - 'scripts/ash-keep-local-closure-server.mjs'
      - 'scripts/ash-keep-aia3-task-journey-v3.mjs'
      - 'tests/ash-aia3-mass-eviction.test.mjs'
      - 'tests/ash-keep-live-aia-surface.test.mjs'
      - '.github/workflows/ash-keep-live-aia-browser.yml'
  workflow_dispatch:
    inputs:
      base_url:
        description: Optional deployed base URL for a read-only AIA3 observation
        required: false
        default: ''
        type: string
      source_packet_commit:
        description: Exact source packet commit being observed
        required: false
        default: ''
        type: string

permissions:
  contents: write

concurrency:
  group: ash-aia3-mass-eviction-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  apply-followup:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.ref == 'agent/ash-aia3-eviction-release'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/ash-aia3-eviction-release
          fetch-depth: 2
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Apply guarded compatibility patch
        run: node scripts/apply-ash-aia3-eviction-followup.mjs
      - name: Validate exact compatibility repair
        run: |
          node --check api/dome-world-shell.js
          node --check scripts/ash-keep-aia3-task-journey-v3.mjs
          node tests/ash-aia3-mass-eviction.test.mjs
          node tests/ash-custody-workspace-bridge.test.mjs
          node tests/dome-world-lab-marrowline-link.test.mjs
          node tests/ash-live-ingress-demos-cache.test.mjs
          node tests/product-architecture/shell.test.mjs
      - name: Remove one-use machinery and restore permanent workflow
        run: |
          rm -f scripts/apply-ash-aia3-eviction-followup.mjs .github/workflows/ash-aia3-eviction-followup.yml
          git checkout HEAD^ -- .github/workflows/ash-keep-live-aia-browser.yml
      - name: Commit canonical follow-up
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'fix: preserve legacy rollback and eviction receipts'
          git push origin HEAD:agent/ash-aia3-eviction-release

  browser-witness:
    needs: apply-followup
    if: always() && (needs.apply-followup.result == 'success' || needs.apply-followup.result == 'skipped')
    name: ${{ matrix.browser }} fresh, stale, desktop, and mobile AIA3 journey
    runs-on: ubuntu-latest
    timeout-minutes: 55
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Validate case-preserving mass eviction
        run: node tests/ash-aia3-mass-eviction.test.mjs
      - name: Validate AIA3 surface and presentation boundaries
        run: node --test tests/ash-keep-live-aia-surface.test.mjs
      - name: Validate browser witness and shell syntax
        run: |
          node --check scripts/ash-keep-aia3-task-journey-v3.mjs
          node --check scripts/ash-keep-local-closure-server.mjs
          node --check api/dome-world-shell.js
      - name: Install browser witness runtime
        run: |
          npm install --no-save --package-lock=false playwright@1.53.2
          npx playwright install --with-deps ${{ matrix.browser }}
      - name: Start bounded local Ash Keep runtime
        if: ${{ inputs.base_url == '' }}
        run: |
          mkdir -p artifacts
          node scripts/ash-keep-local-closure-server.mjs 6130 > artifacts/ash-aia3-local-server.log 2>&1 &
          echo $! > artifacts/ash-aia3-local-server.pid
          for attempt in $(seq 1 40); do
            if curl -fsS --max-time 2 http://127.0.0.1:6130/__ash_keep_closure/readiness > artifacts/ash-aia3-local-readiness.json; then
              cat artifacts/ash-aia3-local-readiness.json
              exit 0
            fi
            sleep 1
          done
          cat artifacts/ash-aia3-local-server.log || true
          exit 1
      - name: Exercise fresh ingress, retired AIA2 eviction, exact work, and case preservation
        env:
          TD613_BROWSER: ${{ matrix.browser }}
          TD613_BASE_URL: ${{ inputs.base_url || 'http://127.0.0.1:6130' }}
          TD613_SOURCE_PACKET_COMMIT: ${{ inputs.source_packet_commit || github.sha }}
          TD613_PRODUCTION_OBSERVATION: ${{ inputs.base_url != '' }}
          TD613_ARTIFACT_DIR: artifacts/ash-aia3-${{ matrix.browser }}
        run: node scripts/ash-keep-aia3-task-journey-v3.mjs
      - name: Stop bounded local runtime
        if: ${{ always() && inputs.base_url == '' }}
        run: |
          test -f artifacts/ash-aia3-local-server.pid && kill "$(cat artifacts/ash-aia3-local-server.pid)" || true
      - name: Preserve browser evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ash-aia3-${{ matrix.browser }}-mass-eviction-evidence
          path: |
            artifacts/ash-aia3-${{ matrix.browser }}/
            artifacts/ash-aia3-local-server.log
            artifacts/ash-aia3-local-readiness.json
          if-no-files-found: warn
          retention-days: 45
