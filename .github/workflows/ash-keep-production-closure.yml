name: Ash Keep Production Closure

on:
  pull_request:
    paths:
      - "api/dome-world-shell.js"
      - "app/dome-world/ash-keep*.html"
      - "app/dome-world/ash-keep*.js"
      - "app/dome-world/ash-aia3-*.js"
      - "app/dome-world/ash-keep-aia3*.css"
      - "app/dome-world/ash-cache-eviction-aia3.js"
      - "app/dome-world/ash-convergence.js"
      - "app/dome-world/schemas/ash-*.schema.json"
      - "app/dome-world/ash-keep-worker.js"
      - "app/dome-world/ash-lifecycle.js"
      - "app/dome-world/ash-threshold.html"
      - "app/engine/ash-keep-*.js"
      - "app/engine/ash-lifecycle.js"
      - "app/engine/ash-constitutional-convergence.js"
      - "docs/ASH_KEEP_BUILDOUT_LEDGER.md"
      - "ROADMAP.md"
      - "scripts/ash-keep-*.mjs"
      - "scripts/ash-lifecycle-*.mjs"
      - "scripts/ash-constitutional-*.mjs"
      - "scripts/assert-ash-keep-release-posture.mjs"
      - "tests/ash-keep-*.test.mjs"
      - "tests/ash-lifecycle-*.test.mjs"
      - "tests/ash-constitutional-*.test.mjs"
      - "tests/product-architecture/*.test.mjs"
      - ".github/workflows/ash-keep-production-closure.yml"
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      base_url:
        required: false
        default: ""
        type: string
      confirm_deployed_probe:
        required: false
        default: "HOLD"
        type: string

permissions:
  contents: read
  statuses: write

jobs:
  local-closure-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Validate closure source syntax
        run: |
          node --check scripts/ash-keep-production-probe.mjs
          node --check scripts/ash-lifecycle-production-probe.mjs
          node --check scripts/ash-constitutional-convergence-probe.mjs
          node --check scripts/run-ash-constitutional-convergence-probe.mjs
          node --check scripts/run-ash-keep-production-probe.mjs
          node --check scripts/publish-ash-keep-observer-status.mjs
          node --check scripts/assert-ash-keep-release-posture.mjs
          node --check scripts/ash-keep-local-closure-server.mjs
          node --check api/dome-world-shell.js
      - name: Production closure contracts
        run: |
          node tests/ash-keep-production-closure-contract.test.mjs
          node tests/ash-lifecycle-production-contract.test.mjs
      - name: Release promotion gate
        run: node tests/ash-keep-production-promotion-gate.test.mjs
      - name: Current release posture
        run: node scripts/assert-ash-keep-release-posture.mjs
      - name: Rebuild maintained Aperture download
        run: npm run aperture:export-downloads
      - name: Ash Keep package regression
        run: npm run test:ash-keep
      - name: Exact lifecycle regression
        run: node tests/ash-lifecycle.test.mjs
      - name: Custody-bound draft regression
        run: node tests/ash-draft-lifecycle-binding.test.mjs
      - name: Product architecture — shell
        run: node tests/product-architecture/shell.test.mjs
      - name: Product architecture — lifecycle
        run: node tests/product-architecture/lifecycle.test.mjs
      - name: Product architecture — ledger
        run: node tests/product-architecture/ledger.test.mjs
      - name: Product architecture — Aperture closure
        run: node tests/aperture-composition/closure.test.mjs
      - name: Install Chromium probe runtime
        run: |
          npm install --no-save --package-lock=false playwright@1.53.2
          npx playwright install --with-deps chromium
      - name: Start bounded local Ash Keep runtime
        run: |
          set -euo pipefail
          mkdir -p artifacts
          node scripts/ash-keep-local-closure-server.mjs 6130 > artifacts/ash-keep-local-server.log 2>&1 &
          echo $! > artifacts/ash-keep-local-server.pid
          for attempt in $(seq 1 30); do
            if curl -fsS --max-time 2 http://127.0.0.1:6130/__ash_keep_closure/readiness > artifacts/ash-keep-local-readiness.json; then cat artifacts/ash-keep-local-readiness.json; exit 0; fi
            sleep 1
          done
          cat artifacts/ash-keep-local-server.log || true
          exit 1
      - name: Run bounded local core closure observation
        env:
          TD613_BASE_URL: http://127.0.0.1:6130
          TD613_ARTIFACT_DIR: artifacts/ash-keep-production-closure
          TD613_PROBE_RUNTIME_DIR: artifacts/ash-keep-probe-runtime
        run: node scripts/run-ash-keep-production-probe.mjs
      - name: Run constitutional convergence preview
        env:
          TD613_BASE_URL: http://127.0.0.1:6130
          TD613_ARTIFACT_DIR: artifacts/ash-constitutional-convergence
        run: node scripts/run-ash-constitutional-convergence-probe.mjs
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ash-keep-production-closure-evidence
          path: |
            artifacts/ash-keep-local-server.log
            artifacts/ash-keep-local-readiness.json
            artifacts/ash-keep-probe-runtime/
            artifacts/ash-keep-production-closure/
            artifacts/ash-constitutional-convergence/
          if-no-files-found: warn
          retention-days: 14
      - if: always()
        run: test -f artifacts/ash-keep-local-server.pid && kill "$(cat artifacts/ash-keep-local-server.pid)" || true
