name: Ash Legal UX epoch convergence

on:
  push:
    branches: [agent/ash-legal-demo-navigation-animation]

permissions:
  contents: write

concurrency:
  group: ash-legal-epoch-converge
  cancel-in-progress: false

jobs:
  converge:
    if: ${{ !contains(github.event.head_commit.message, '[epoch-converged]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/ash-legal-demo-navigation-animation
          fetch-depth: 0
      - name: Converge shell, eviction, loader law, and remove this one-use workflow
        run: |
          python - <<'PY'
          from pathlib import Path

          asset_old = '20260720-aia3-mass-eviction-v2'
          asset_new = '20260721-legal-demo-ux-v1'
          cache_old = 'td613.ash.cache-flush/2026-07-20-aia3-mass-eviction-v2'
          cache_new = 'td613.ash.cache-flush/2026-07-21-legal-demo-ux-v1'

          replacements = {
            'api/dome-world-shell.js': [
              (cache_old, cache_new),
              (asset_old, asset_new),
              ('content="aia3-mass-eviction-v2"', 'content="legal-demo-ux-v1"'),
              ('td613.dome-world.shell/v1.5-aia3-mass-eviction', 'td613.dome-world.shell/v1.6-legal-demo-ux'),
              ('td613.ash-keep.shell/v0.4-aia3-mass-eviction', 'td613.ash-keep.shell/v0.5-legal-demo-ux'),
              ('td613.ash.cache-transition/v0.4-aia3-mass-eviction', 'td613.ash.cache-transition/v0.5-legal-demo-ux')
            ],
            'app/dome-world/ash-cache-eviction-aia3.js': [
              (cache_old, cache_new),
              (asset_old, asset_new)
            ],
            'tests/ash-keep-live-aia-surface.test.mjs': [
              (cache_old, cache_new),
              (asset_old, asset_new)
            ]
          }

          for filename, pairs in replacements.items():
            path = Path(filename)
            text = path.read_text()
            original = text
            for old, new in pairs:
              text = text.replace(old, new)
            if text == original:
              raise SystemExit(f'No governed epoch change applied to {filename}')
            path.write_text(text)

          Path('.github/workflows/ash-legal-epoch-converge.yml').unlink()
          PY
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add api/dome-world-shell.js app/dome-world/ash-cache-eviction-aia3.js tests/ash-keep-live-aia-surface.test.mjs .github/workflows/ash-legal-epoch-converge.yml
          git commit -m 'fix(ash): converge Legal UX delivery epoch [epoch-converged]'
          git push origin HEAD:agent/ash-legal-demo-navigation-animation
