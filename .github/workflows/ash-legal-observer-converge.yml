name: Ash Legal observer convergence

on:
  push:
    branches: [agent/ash-legal-demo-navigation-animation]

permissions:
  contents: write

concurrency:
  group: ash-legal-observer-converge
  cancel-in-progress: false

jobs:
  patch:
    if: ${{ !contains(github.event.head_commit.message, '[observer-converged]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/ash-legal-demo-navigation-animation
          fetch-depth: 0
      - name: Align Legal and stale-client observers with governed composition
        run: |
          python - <<'PY'
          from pathlib import Path

          legal = Path('scripts/ash-legal-ux-browser-probe.mjs')
          text = legal.read_text()
          old = """  await page.goto(`${base}/dome-world/ash-keep.html?ash_epoch=20260721-legal-demo-ux-v1`, { waitUntil: 'commit' }).catch(() => null);
  await page.waitForFunction(() => document.documentElement.dataset.ashCompositionStable?.includes('stable-navigation-motion') && window.__td613AshLegalDemo?.version && window.__td613AshUiUxRescue?.version, null, { timeout: 60_000 });"""
          new = """  await page.goto(`${base}/dome-world/ash-keep.html?presentation=aia&profile=legal&nonce=${Date.now()}`, { waitUntil: 'domcontentloaded' }).catch(() => null);
  await page.waitForFunction(epoch => document.documentElement.dataset.ashCompositionStable?.includes('stable-navigation-motion') && window.__td613AshLegalDemo?.version && window.__td613AshUiUxRescue?.version && location.search.includes(`ash_epoch=${epoch}`), '20260721-legal-demo-ux-v1', { timeout: 60_000 });"""
          if old not in text: raise SystemExit('Legal fresh-route observer block not found')
          legal.write_text(text.replace(old, new))

          stale = Path('scripts/ash-keep-aia3-task-journey-v3.mjs')
          text = stale.read_text()
          old = """  await page.waitForFunction(({ expectedCase, epoch }) => window.__td613AshKeep?.current?.().case_id === expectedCase && localStorage.getItem('td613.ash-keep.current-case') === expectedCase && window.__td613AshAia3Composition?.current?.().session_open === true && window.__td613AshAia3Composition?.current?.().membrane_ready === true && document.documentElement.dataset.ashAia3Ready === 'true' && location.search.includes(`ash_epoch=${epoch}`), { expectedCase:caseId, epoch:EPOCH });"""
          new = """  await page.waitForFunction(({ expectedCase, epoch }) => {
    const visible = node => {
      if (!node) return false;
      const style = getComputedStyle(node), rect = node.getBoundingClientRect();
      return style.display !== 'none' && style.visibility !== 'hidden' && Number(style.opacity) > 0 && rect.width > 0 && rect.height > 0;
    };
    const current = window.__td613AshLiveAIA?.current?.() || null;
    const composition = window.__td613AshAia3Composition?.current?.() || null;
    return window.__td613AshKeep?.current?.().case_id === expectedCase
      && localStorage.getItem('td613.ash-keep.current-case') === expectedCase
      && composition?.session_open === true
      && composition?.membrane_ready === true
      && Boolean(current?.lifecycle_state)
      && visible(document.querySelector('#ashAiaMembrane'))
      && Boolean(document.documentElement.dataset.ashCompositionStable)
      && document.documentElement.dataset.ashAia3Ready === 'true'
      && location.search.includes(`ash_epoch=${epoch}`);
  }, { expectedCase:caseId, epoch:EPOCH });"""
          if old not in text: raise SystemExit('Stale-client convergence observer block not found')
          stale.write_text(text.replace(old, new))

          Path('.github/workflows/ash-legal-observer-converge.yml').unlink()
          PY
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add scripts/ash-legal-ux-browser-probe.mjs scripts/ash-keep-aia3-task-journey-v3.mjs .github/workflows/ash-legal-observer-converge.yml
          git commit -m 'test(ash): converge Legal and stale-client observers [observer-converged]'
          git push origin HEAD:agent/ash-legal-demo-navigation-animation
