name: Ash Legal Demo and UX Rescue

on:
  pull_request:
    paths:
      - 'scripts/ash-keep-aia3-task-journey-v3.mjs'
      - 'tests/ash-aia3-mass-eviction.test.mjs'
      - '.github/workflows/ash-legal-ux.yml'

permissions:
  contents: write

concurrency:
  group: ash-bounded-browser-teardown-patch
  cancel-in-progress: true

jobs:
  bounded-browser-teardown-patch:
    if: github.event.pull_request.head.ref == 'agent/ash-legal-demo-navigation-animation' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/ash-legal-demo-navigation-animation
          fetch-depth: 0
      - name: Bound browser teardown after evidence is written
        run: |
          python - <<'PY'
          from pathlib import Path
          script = Path('scripts/ash-keep-aia3-task-journey-v3.mjs')
          text = script.read_text()
          old = """} finally {
            await browser.close();
            report.completed_at = new Date().toISOString();
            await fs.writeFile(path.join(outputDir, 'ash-aia3-task-continuity.json'), `${JSON.stringify(report, null, 2)}\\n`, 'utf8');
          }
          if (terminal) throw terminal;
          console.log(JSON.stringify({ status:report.status, browser:browserName, profiles:Object.keys(report.profiles) }, null, 2));"""
          new = """} finally {
            report.completed_at = new Date().toISOString();
            let browserClose = 'CLOSED';
            try {
              await Promise.race([
                browser.close(),
                new Promise((_, reject) => setTimeout(() => reject(new Error('Browser close did not finish within 15 seconds.')), 15000))
              ]);
            } catch (error) {
              browserClose = 'FORCED_PROCESS_EXIT';
              report.browser_close_hold = error.message;
            }
            report.browser_close = browserClose;
            await fs.writeFile(path.join(outputDir, 'ash-aia3-task-continuity.json'), `${JSON.stringify(report, null, 2)}\\n`, 'utf8');
          }
          if (terminal) {
            console.error(terminal);
            process.exit(1);
          }
          console.log(JSON.stringify({ status:report.status, browser:browserName, profiles:Object.keys(report.profiles), browser_close:report.browser_close }, null, 2));
          process.exit(0);"""
          if new in text:
              pass
          elif old in text:
              text = text.replace(old, new, 1)
          else:
              raise SystemExit('Expected AIA3 browser teardown block was not found.')
          script.write_text(text)

          test = Path('tests/ash-aia3-mass-eviction.test.mjs')
          test_text = test.read_text()
          anchor = "test('retired worker fixture controls the next navigation without claiming the active page', () => {"
          if 'browser teardown is bounded after the evidence receipt is written' not in test_text:
              addition = """test('browser teardown is bounded after the evidence receipt is written', () => {
            assert.match(journeySource, /Browser close did not finish within 15 seconds/);
            assert.match(journeySource, /report\\.browser_close = browserClose/);
            assert.match(journeySource, /await fs\\.writeFile[\\s\\S]*process\\.exit\\(0\\)/);
            assert.doesNotMatch(journeySource, /finally \\{\\n  await browser\\.close\\(\\);/);
          });

          """
              if anchor not in test_text:
                  raise SystemExit('Expected retired-worker fixture contract anchor was not found.')
              test_text = test_text.replace(anchor, addition + anchor, 1)
          test.write_text(test_text)
          PY
          node --check scripts/ash-keep-aia3-task-journey-v3.mjs
          node tests/ash-aia3-mass-eviction.test.mjs
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add scripts/ash-keep-aia3-task-journey-v3.mjs tests/ash-aia3-mass-eviction.test.mjs
          git commit -m 'test(ash): bound browser teardown after stale-client evidence'
          git push origin HEAD:agent/ash-legal-demo-navigation-animation
