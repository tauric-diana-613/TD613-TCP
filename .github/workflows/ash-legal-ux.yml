name: Ash Legal Demo and UX Rescue

on:
  pull_request:
    paths:
      - 'scripts/ash-keep-aia3-task-journey-v3.mjs'
      - 'tests/ash-aia3-mass-eviction.test.mjs'
      - '.github/workflows/ash-legal-ux.yml'

permissions:
  contents: write

concurrency:
  group: ash-browser-phase-deadline-patch
  cancel-in-progress: true

jobs:
  browser-phase-deadline-patch:
    if: github.event.pull_request.head.ref == 'agent/ash-legal-demo-navigation-animation' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/ash-legal-demo-navigation-animation
          fetch-depth: 0
      - name: Bound every browser journey phase from the Node runner
        run: |
          python - <<'PY'
          from pathlib import Path
          script = Path('scripts/ash-keep-aia3-task-journey-v3.mjs')
          text = script.read_text()
          old = """let terminal = null;
          const browser = await browserType.launch({ headless:true });
          try {
            await runFresh(browser, { name:'desktop', viewport:{ width:1440, height:900 }, mobile:false }, report);
            await runFresh(browser, { name:'mobile', viewport:{ width:390, height:844 }, mobile:browserName === 'webkit' }, report);
            if (!productionObservation) await runStale(browser, report);
            assert(report.console_errors.length === 0 && report.page_errors.length === 0 && report.http_errors.length === 0 && report.external_requests.length === 0 && report.non_read_requests.length === 0, `Observer recorded errors: ${JSON.stringify(report)}`);
            report.status = 'PASS';
          } catch (error) {"""
          new = """let terminal = null;
          const browser = await browserType.launch({ headless:true });
          const runPhase = async (label, operation, timeoutMs = 180000) => {
            report.phase = label;
            return Promise.race([
              operation(),
              new Promise((_, reject) => setTimeout(() => reject(new Error(`${label} exceeded ${timeoutMs}ms.`)), timeoutMs))
            ]);
          };
          try {
            await runPhase('desktop fresh journey', () => runFresh(browser, { name:'desktop', viewport:{ width:1440, height:900 }, mobile:false }, report));
            await runPhase('mobile fresh journey', () => runFresh(browser, { name:'mobile', viewport:{ width:390, height:844 }, mobile:browserName === 'webkit' }, report));
            if (!productionObservation) await runPhase('stale-client recovery journey', () => runStale(browser, report));
            assert(report.console_errors.length === 0 && report.page_errors.length === 0 && report.http_errors.length === 0 && report.external_requests.length === 0 && report.non_read_requests.length === 0, `Observer recorded errors: ${JSON.stringify(report)}`);
            report.phase = 'complete';
            report.status = 'PASS';
          } catch (error) {"""
          if new in text:
              pass
          elif old in text:
              text = text.replace(old, new, 1)
          else:
              raise SystemExit('Expected AIA3 browser phase block was not found.')
          script.write_text(text)

          test = Path('tests/ash-aia3-mass-eviction.test.mjs')
          test_text = test.read_text()
          anchor = "test('browser teardown is bounded after the evidence receipt is written', () => {"
          if 'every browser journey phase has a Node-level deadline' not in test_text:
              addition = """test('every browser journey phase has a Node-level deadline', () => {
            assert.match(journeySource, /const runPhase = async/);
            assert.match(journeySource, /timeoutMs = 180000/);
            assert.match(journeySource, /desktop fresh journey/);
            assert.match(journeySource, /mobile fresh journey/);
            assert.match(journeySource, /stale-client recovery journey/);
            assert.match(journeySource, /report\\.phase = label/);
          });

          """
              if anchor not in test_text:
                  raise SystemExit('Expected bounded teardown contract anchor was not found.')
              test_text = test_text.replace(anchor, addition + anchor, 1)
          test.write_text(test_text)
          PY
          node --check scripts/ash-keep-aia3-task-journey-v3.mjs
          node tests/ash-aia3-mass-eviction.test.mjs
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add scripts/ash-keep-aia3-task-journey-v3.mjs tests/ash-aia3-mass-eviction.test.mjs
          git commit -m 'test(ash): bound every browser journey phase'
          git push origin HEAD:agent/ash-legal-demo-navigation-animation
