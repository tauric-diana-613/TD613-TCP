name: Ash Legal Demo and UX Rescue

on:
  pull_request:
    paths:
      - 'app/safe-harbor/ash-keep-recovery.html'
      - 'api/dome-world-shell.js'
      - 'tests/ash-aia3-mass-eviction.test.mjs'
      - '.github/workflows/ash-legal-ux.yml'

permissions:
  contents: write

concurrency:
  group: ash-cross-scope-recovery-trusted-patch
  cancel-in-progress: true

jobs:
  cross-scope-recovery-patch:
    if: github.event.pull_request.head.ref == 'agent/ash-legal-demo-navigation-animation' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/ash-legal-demo-navigation-animation
          fetch-depth: 0
      - name: Route controlled stale clients outside the retired worker scope
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          shell = Path('api/dome-world-shell.js')
          text = shell.read_text()

          def replace_once(pattern, replacement, label, marker):
              global text
              if marker in text:
                  return
              text, count = re.subn(pattern, replacement, text, count=1)
              if count != 1:
                  raise SystemExit(f'Expected shell structure missing: {label}')

          replace_once(
              r"(    const sessionKey='td613\.ash\.session\.epoch';\n)(    const publish=)",
              r"\1    const recoveryBridge='/safe-harbor/ash-keep-recovery.html';\n\2",
              'recovery bridge declaration',
              "const recoveryBridge='/safe-harbor/ash-keep-recovery.html'"
          )
          replace_once(
              r"(      )const cleared=\[\];const workers=\[\];let http=\{attempted:false,observed:false\};",
              r"\1const controllerPresent=Boolean(navigator.serviceWorker?.controller);\n\1const cleared=[];const workers=[];let http={attempted:false,observed:false};",
              'controller observation',
              'const controllerPresent=Boolean(navigator.serviceWorker?.controller)'
          )
          replace_once(
              r"active_session_reset:false,\n(        )local_case_pointer_preserved:",
              r"active_session_reset:false,\n\1controller_present_before_eviction:controllerPresent,cross_scope_recovery_required:controllerPresent,\n\1local_case_pointer_preserved:",
              'receipt controller fields',
              'cross_scope_recovery_required:controllerPresent'
          )
          replace_once(
              r"(      publish\(receipt\);\n)(      const current=new URL\(location\.href\);)",
              r"\1      if(controllerPresent&&location.pathname.startsWith('/dome-world/')){\n        const bridge=new URL(recoveryBridge,location.href);\n        bridge.searchParams.set('return',location.pathname+location.search+location.hash);\n        bridge.searchParams.set('epoch',assetEpoch);\n        location.replace(bridge.pathname+bridge.search);\n        return new Promise(()=>{});\n      }\n\2",
              'cross-scope redirect',
              "location.replace(bridge.pathname+bridge.search)"
          )
          shell.write_text(text)

          test = Path('tests/ash-aia3-mass-eviction.test.mjs')
          test_text = test.read_text()
          if 'const recoverySource' not in test_text:
              test_text = test_text.replace(
                  "const compositionSource = fs.readFileSync('app/dome-world/ash-aia3-composition.js', 'utf8');",
                  "const compositionSource = fs.readFileSync('app/dome-world/ash-aia3-composition.js', 'utf8');\nconst recoverySource = fs.readFileSync('app/safe-harbor/ash-keep-recovery.html', 'utf8');"
              )
          if 'controlled stale clients leave the retired Dome-World scope' not in test_text:
              addition = """
          test('controlled stale clients leave the retired Dome-World scope before returning to Ash', () => {
            assert.match(shellSource, /const recoveryBridge='\\/safe-harbor\\/ash-keep-recovery\\.html'/);
            assert.match(shellSource, /controllerPresent=Boolean\\(navigator\\.serviceWorker\\?\\.controller\\)/);
            assert.match(shellSource, /cross_scope_recovery_required:controllerPresent/);
            assert.match(shellSource, /location\\.replace\\(bridge\\.pathname\\+bridge\\.search\\)/);
            assert.match(recoverySource, /source_scope:'\\/dome-world\\/'/);
            assert.match(recoverySource, /bridge_scope:'\\/safe-harbor\\/'/);
            assert.match(recoverySource, /indexeddb_preserved:true/);
            assert.match(recoverySource, /case_data_preserved:true/);
            assert.match(recoverySource, /ash_recovered','cross-scope'/);
          });

          """
              anchor = '\nclass MemoryStorage {'
              if anchor not in test_text:
                  raise SystemExit('Expected MemoryStorage contract anchor missing.')
              test_text = test_text.replace(anchor, addition + anchor, 1)
          test.write_text(test_text)
          PY
          node --check api/dome-world-shell.js
          node tests/ash-aia3-mass-eviction.test.mjs
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add api/dome-world-shell.js tests/ash-aia3-mass-eviction.test.mjs app/safe-harbor/ash-keep-recovery.html
          git commit -m 'fix(ash): escape retired worker scope before recovery'
          git push origin HEAD:agent/ash-legal-demo-navigation-animation
