name: One-use Ash readiness route repair

on:
  push:
    branches:
      - agent/ash-keep-live-child-legible-aia
    paths:
      - '.github/workflows/ash-lifecycle-integration.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/ash-keep-live-child-legible-aia
          fetch-depth: 0
      - name: Preserve explicit presentation during readiness cleanup
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('app/dome-world/ash-keep.html')
          text = path.read_text()
          old = "<script>if(sessionStorage.getItem('td613:ash-threshold:readiness:v0.1')&&location.search!=='?arrival=cleared')history.replaceState(null,'',location.pathname+'?arrival=cleared')</script>"
          new = "<script>if(sessionStorage.getItem('td613:ash-threshold:readiness:v0.1')){const url=new URL(location.href);if(url.searchParams.get('arrival')!=='cleared'){url.searchParams.set('arrival','cleared');history.replaceState(null,'',url.pathname+url.search+url.hash)}}</script>"
          count = text.count(old)
          if count != 1:
              raise SystemExit(f'expected one destructive readiness-query seam, observed {count}')
          path.write_text(text.replace(old, new))
          PY
      - name: Restore workflow and publish exact product repair
        run: |
          git show origin/main:.github/workflows/ash-lifecycle-integration.yml > .github/workflows/ash-lifecycle-integration.yml
          grep -F "url.searchParams.set('arrival','cleared')" app/dome-world/ash-keep.html
          grep -F "url.pathname+url.search+url.hash" app/dome-world/ash-keep.html
          git config user.name 'td613-housekeeping'
          git config user.email 'td613-housekeeping@users.noreply.github.com'
          git add app/dome-world/ash-keep.html .github/workflows/ash-lifecycle-integration.yml
          git commit -m 'Preserve Ash presentation route during readiness cleanup'
          git push origin HEAD:agent/ash-keep-live-child-legible-aia
