name: One-use registry route repair

on:
  push:
    branches:
      - agent/ash-keep-live-child-legible-aia
    paths:
      - '.github/workflows/ash-lifecycle-integration.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/ash-keep-live-child-legible-aia
          fetch-depth: 0
      - name: Declare registry specialist route
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('scripts/ash-map-object-registry-probe.mjs')
          text = path.read_text()
          old = "const keepUrl = `${base}/dome-world/ash-keep.html`;"
          new = "const keepUrl = `${base}/dome-world/ash-keep.html?presentation=legacy`;"
          count = text.count(old)
          if count != 1:
              raise SystemExit(f'expected one undeclared registry presentation route, observed {count}')
          path.write_text(text.replace(old, new))
          PY
      - name: Restore workflow and publish registry repair
        run: |
          git show origin/main:.github/workflows/ash-lifecycle-integration.yml > .github/workflows/ash-lifecycle-integration.yml
          grep -F 'ash-keep.html?presentation=legacy' scripts/ash-map-object-registry-probe.mjs
          git config user.name 'td613-housekeeping'
          git config user.email 'td613-housekeeping@users.noreply.github.com'
          git add scripts/ash-map-object-registry-probe.mjs .github/workflows/ash-lifecycle-integration.yml
          git commit -m 'Declare legacy route in registry observer'
          git push origin HEAD:agent/ash-keep-live-child-legible-aia
