# One-use observer aftercare; self-restores from main.
name: One-use Custodian Return observer repair

on:
  push:
    branches:
      - agent/custodian-return-aia-observer-aftercare
    paths:
      - '.github/workflows/ash-lifecycle-integration.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/custodian-return-aia-observer-aftercare
          fetch-depth: 0
      - name: Declare specialist route and core workspace owner
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('scripts/ash-custodian-return-production-probe.mjs')
          text = path.read_text()

          old_url = "await page.goto(`${baseUrl}/dome-world/ash-keep.html?arrival=cleared`, { waitUntil: 'domcontentloaded', timeout: 90000 });"
          new_url = "await page.goto(`${baseUrl}/dome-world/ash-keep.html?arrival=cleared&presentation=legacy`, { waitUntil: 'domcontentloaded', timeout: 90000 });"
          if text.count(old_url) != 1:
              raise SystemExit(f'expected one undeclared Return route, observed {text.count(old_url)}')
          text = text.replace(old_url, new_url)

          old_open = """const open = window.__td613AshPremiumUI?.open
      || window.__td613OpenAshWorkspace
      || window.__td613AshKeep?.openWorkspace;"""
          new_open = """const open = window.__td613AshKeep?.openWorkspace
      || window.__td613AshPremiumUI?.open
      || window.__td613OpenAshWorkspace;"""
          if text.count(old_open) != 2:
              raise SystemExit(f'expected two AIA-wrapped Return opener seams, observed {text.count(old_open)}')
          text = text.replace(old_open, new_open)

          old_diag = """navigation_readiness: {
    wait_until: 'domcontentloaded',"""
          new_diag = """navigation_readiness: {
    wait_until: 'domcontentloaded',
    presentation_route: 'legacy',
    workspace_open_owner: 'core-first',"""
          if text.count(old_diag) != 1:
              raise SystemExit(f'expected one Return navigation diagnostic seam, observed {text.count(old_diag)}')
          text = text.replace(old_diag, new_diag)

          path.write_text(text)
          PY
      - name: Restore workflow and publish observer aftercare
        run: |
          git show origin/main:.github/workflows/ash-lifecycle-integration.yml > .github/workflows/ash-lifecycle-integration.yml
          grep -F 'arrival=cleared&presentation=legacy' scripts/ash-custodian-return-production-probe.mjs
          test "$(grep -c 'const open = window.__td613AshKeep?.openWorkspace' scripts/ash-custodian-return-production-probe.mjs)" = '2'
          grep -F "presentation_route: 'legacy'" scripts/ash-custodian-return-production-probe.mjs
          git config user.name 'td613-housekeeping'
          git config user.email 'td613-housekeeping@users.noreply.github.com'
          git add scripts/ash-custodian-return-production-probe.mjs .github/workflows/ash-lifecycle-integration.yml
          git commit -m 'Declare legacy route in Custodian Return observer'
          git push origin HEAD:agent/custodian-return-aia-observer-aftercare
