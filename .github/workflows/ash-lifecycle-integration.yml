name: One-use Ash delivery parity repair

on:
  push:
    branches:
      - agent/ash-keep-live-child-legible-aia
    paths:
      - '.github/workflows/ash-lifecycle-integration.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/ash-keep-live-child-legible-aia
          fetch-depth: 0
      - name: Preserve explicit presentation in static delivery twin
        run: |
          python - <<'PY'
          from pathlib import Path

          canonical = Path('app/dome-world/ash-keep.html').read_text()
          delivery_path = Path('app/dome-world/ash-keep-source.html')
          delivery = delivery_path.read_text()
          old = "<script>if(sessionStorage.getItem('td613:ash-threshold:readiness:v0.1')&&location.search!=='?arrival=cleared')history.replaceState(null,'',location.pathname+'?arrival=cleared')</script>"
          new = "<script>if(sessionStorage.getItem('td613:ash-threshold:readiness:v0.1')){const url=new URL(location.href);if(url.searchParams.get('arrival')!=='cleared'){url.searchParams.set('arrival','cleared');history.replaceState(null,'',url.pathname+url.search+url.hash)}}</script>"
          count = delivery.count(old)
          if count != 1:
              raise SystemExit(f'expected one stale delivery readiness seam, observed {count}')
          delivery = delivery.replace(old, new)
          if delivery != canonical:
              raise SystemExit('static delivery twin remains non-identical after readiness repair')
          delivery_path.write_text(delivery)
          PY
      - name: Restore workflow and publish parity repair
        run: |
          git show origin/main:.github/workflows/ash-lifecycle-integration.yml > .github/workflows/ash-lifecycle-integration.yml
          cmp app/dome-world/ash-keep.html app/dome-world/ash-keep-source.html
          git config user.name 'td613-housekeeping'
          git config user.email 'td613-housekeeping@users.noreply.github.com'
          git add app/dome-world/ash-keep-source.html .github/workflows/ash-lifecycle-integration.yml
          git commit -m 'Restore Ash static delivery parity'
          git push origin HEAD:agent/ash-keep-live-child-legible-aia
