name: One-use user-flight route repair

on:
  push:
    branches:
      - agent/ash-keep-live-child-legible-aia
    paths:
      - '.github/workflows/ash-lifecycle-integration.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/ash-keep-live-child-legible-aia
          fetch-depth: 0
      - name: Declare specialist route after threshold observation
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('scripts/ash-user-test-flight.mjs')
          text = path.read_text()
          old_url = "const keepUrl = `${base}/dome-world/ash-keep.html`;"
          new_url = "const keepUrl = `${base}/dome-world/ash-keep.html?presentation=legacy`;"
          old_boot = """  await page.goto(throughThreshold ? thresholdUrl : keepUrl, { waitUntil: 'networkidle' });
  await page.waitForURL(/\\/dome-world\\/ash-keep\\.html/, { timeout: 60000 });
  await page.waitForFunction(() => Boolean(window.__td613AshKeep?.version)"""
          new_boot = """  await page.goto(throughThreshold ? thresholdUrl : keepUrl, { waitUntil: 'networkidle' });
  await page.waitForURL(/\\/dome-world\\/ash-keep\\.html/, { timeout: 60000 });
  if (throughThreshold && new URL(page.url()).searchParams.get('presentation') !== 'legacy') {
    await page.goto(keepUrl, { waitUntil: 'networkidle' });
  }
  await page.waitForFunction(() => Boolean(window.__td613AshKeep?.version)"""
          if text.count(old_url) != 1:
              raise SystemExit(f'expected one undeclared user-flight Keep route, observed {text.count(old_url)}')
          if text.count(old_boot) != 1:
              raise SystemExit(f'expected one threshold-to-specialist transition seam, observed {text.count(old_boot)}')
          path.write_text(text.replace(old_url, new_url).replace(old_boot, new_boot))
          PY
      - name: Restore workflow and publish user-flight repair
        run: |
          git show origin/main:.github/workflows/ash-lifecycle-integration.yml > .github/workflows/ash-lifecycle-integration.yml
          grep -F 'ash-keep.html?presentation=legacy' scripts/ash-user-test-flight.mjs
          grep -F "throughThreshold && new URL(page.url()).searchParams.get('presentation') !== 'legacy'" scripts/ash-user-test-flight.mjs
          git config user.name 'td613-housekeeping'
          git config user.email 'td613-housekeeping@users.noreply.github.com'
          git add scripts/ash-user-test-flight.mjs .github/workflows/ash-lifecycle-integration.yml
          git commit -m 'Declare legacy route in full user-flight observer'
          git push origin HEAD:agent/ash-keep-live-child-legible-aia
