name: Ash Live Ingress Demos Cache

on:
  pull_request:
    paths:
      - 'app/dome-world/ash-ingress-layout-hydration.js'
      - 'app/dome-world/ash-cache-flush.js'
      - 'app/dome-world/ash-lifecycle.js'
      - 'app/dome-world/ash-workspace-bridge.js'
      - 'app/dome-world/ash-profile-demo-hydration.js'
      - 'app/dome-world/ash-investigation-demo-hydration.js'
      - 'app/dome-world/ash-investigation-method-docket-composition.js'
      - 'app/dome-world/ash-research-demo-hydration.js'
      - 'app/dome-world/ash-research-demo-control-state.js'
      - 'app/dome-world/ash-apeq-paia-*'
      - 'api/dome-world-shell.js'
      - 'scripts/ash-live-release-browser-probe.mjs'
      - 'tests/ash-live-ingress-demos-cache.test.mjs'
      - '.github/workflows/ash-live-ingress-demos-cache.yml'
  push:
    branches: [main]
    paths:
      - 'app/dome-world/ash-ingress-layout-hydration.js'
      - 'app/dome-world/ash-cache-flush.js'
      - 'app/dome-world/ash-lifecycle.js'
      - 'app/dome-world/ash-workspace-bridge.js'
      - 'app/dome-world/ash-profile-demo-hydration.js'
      - 'app/dome-world/ash-investigation-demo-hydration.js'
      - 'app/dome-world/ash-investigation-method-docket-composition.js'
      - 'app/dome-world/ash-research-demo-hydration.js'
      - 'app/dome-world/ash-research-demo-control-state.js'
      - 'app/dome-world/ash-apeq-paia-*'
      - 'api/dome-world-shell.js'
      - 'scripts/ash-live-release-browser-probe.mjs'
      - 'tests/ash-live-ingress-demos-cache.test.mjs'
      - '.github/workflows/ash-live-ingress-demos-cache.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ash-live-ingress-demos-cache-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  contracts:
    name: Live release contracts
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Verify live ingress, cache, and profile contracts
        run: node tests/ash-live-ingress-demos-cache.test.mjs
      - name: Verify syntax
        run: |
          node --check api/dome-world-shell.js
          node --check app/dome-world/ash-ingress-layout-hydration.js
          node --check app/dome-world/ash-cache-flush.js
          node --check app/dome-world/ash-lifecycle.js
          node --check app/dome-world/ash-workspace-bridge.js
          node --check app/dome-world/ash-profile-demo-hydration.js
          node --check app/dome-world/ash-investigation-demo-hydration.js
          node --check app/dome-world/ash-investigation-method-docket-composition.js
          node --check app/dome-world/ash-research-demo-hydration.js
          node --check app/dome-world/ash-research-demo-control-state.js
          node --check app/dome-world/ash-apeq-paia-method-kernel.js
          node --check app/dome-world/ash-apeq-paia-profile-specs.js
          node --check app/dome-world/ash-apeq-paia-profile-demos.js
          node --check scripts/ash-live-release-browser-probe.mjs
      - name: Preserve function covenant
        run: node tests/product-architecture/ledger.test.mjs

  browser-matrix:
    name: ${{ matrix.browser }} · live ingress and profile release
    runs-on: ubuntu-latest
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Install browser runtime
        run: |
          npm install --no-save --package-lock=false playwright@1.54.1
          npx playwright install --with-deps ${{ matrix.browser }}
      - name: Start bounded Ash runtime
        run: |
          node scripts/ash-keep-local-closure-server.mjs 6130 > /tmp/ash-live-release.log 2>&1 &
          echo $! > /tmp/ash-live-release.pid
          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:6130/dome-world/ash-keep.html >/dev/null; then exit 0; fi
            sleep 1
          done
          cat /tmp/ash-live-release.log || true
          exit 1
      - name: Fly live release
        env:
          TD613_BASE_URL: http://127.0.0.1:6130
          TD613_BROWSER: ${{ matrix.browser }}
          TD613_ARTIFACT_DIR: artifacts/ash-live-release/${{ matrix.browser }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$TD613_ARTIFACT_DIR"
          node scripts/ash-live-release-browser-probe.mjs 2>&1 | tee "$TD613_ARTIFACT_DIR/${TD613_BROWSER}-probe.log"
      - name: Stop bounded Ash runtime
        if: always()
        run: kill "$(cat /tmp/ash-live-release.pid)" 2>/dev/null || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ash-live-release-${{ matrix.browser }}-evidence
          path: |
            artifacts/ash-live-release/${{ matrix.browser }}
            /tmp/ash-live-release.log
          if-no-files-found: error
          retention-days: 30
