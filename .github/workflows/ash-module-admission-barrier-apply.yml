name: Apply Ash module-admission barrier

on:
  push:
    branches: [agent/ash-aia3-eviction-final3]
    paths:
      - 'scripts/apply-ash-module-admission-barrier.mjs'
      - '.github/workflows/ash-module-admission-barrier-apply.yml'

permissions:
  contents: write

concurrency:
  group: ash-module-admission-barrier
  cancel-in-progress: false

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/ash-aia3-eviction-final3
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Apply guarded barrier patch
        run: node scripts/apply-ash-module-admission-barrier.mjs
      - name: Validate exact admission and rollback laws
        run: |
          node --check api/dome-world-shell.js
          node tests/product-architecture/shell.test.mjs
          node tests/ash-custody-workspace-bridge.test.mjs
          node tests/ash-live-ingress-demos-cache.test.mjs
          node tests/ash-aia3-mass-eviction.test.mjs
          node --check scripts/prepare-ash-premium-closure-fixture.mjs
          node --check scripts/ash-keep-aia3-task-journey-v3.mjs
      - name: Remove one-use machinery
        run: rm scripts/apply-ash-module-admission-barrier.mjs .github/workflows/ash-module-admission-barrier-apply.yml
      - name: Commit canonical barrier
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'fix: admit Ash modules only after cache preflight'
          git push origin HEAD:agent/ash-aia3-eviction-final3
