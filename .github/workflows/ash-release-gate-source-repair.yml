name: Ash Release Gate Source Repair

on:
  pull_request:
    paths:
      - "app/dome-world/ash-lifecycle.js"
      - "scripts/prepare-ash-release-gate-fix.mjs"
      - ".github/workflows/ash-release-gate-source-repair.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ash-release-gate-source-repair-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Prepare exact source repair
        id: repair
        shell: bash
        run: |
          node scripts/prepare-ash-release-gate-fix.mjs
          if git diff --quiet -- app/dome-world/ash-lifecycle.js; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Verify patched source syntax
        run: node --check app/dome-world/ash-lifecycle.js
      - name: Verify idempotent gate marker
        run: |
          grep -F "const shouldDisable = !(nativeReady && ui.lifecycle.gates.local_release);" app/dome-world/ash-lifecycle.js
          grep -F "if (button.disabled !== shouldDisable) button.disabled = shouldDisable;" app/dome-world/ash-lifecycle.js
      - name: Upload patched lifecycle source
        uses: actions/upload-artifact@v4
        with:
          name: ash-release-gate-patched-source
          path: app/dome-world/ash-lifecycle.js
          if-no-files-found: error
          retention-days: 1
      - name: Commit exact source repair
        if: steps.repair.outputs.changed == 'true'
        uses: actions/github-script@v7
        env:
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref || github.ref_name }}
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require('node:fs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const path = 'app/dome-world/ash-lifecycle.js';
            const branch = process.env.HEAD_BRANCH;
            const current = await github.rest.repos.getContent({ owner, repo, path, ref: branch });
            await github.rest.repos.createOrUpdateFileContents({
              owner,
              repo,
              path,
              branch,
              sha: current.data.sha,
              message: 'Make Ash release gate observer-idempotent',
              content: fs.readFileSync(path).toString('base64')
            });
