name: Ash Research Hydration and Ingress

on:
  pull_request:
    paths:
      - 'app/dome-world/ash-*'
      - 'api/dome-world-shell.js'
      - 'scripts/ash-research-*'
      - 'scripts/ash-profile-demo-browser-probe.mjs'
      - 'tests/ash-research-*'
      - 'tests/ash-ingress-cache-*'
      - 'docs/ASH_KEEP_RESEARCH_HYDRATION_INGRESS_AUDIT_2026-07-17.md'
      - '.github/workflows/ash-research-hydration-ingress.yml'
  push:
    branches: [main]
    paths:
      - 'app/dome-world/ash-*'
      - 'api/dome-world-shell.js'
      - 'scripts/ash-research-*'
      - 'scripts/ash-profile-demo-browser-probe.mjs'
      - 'tests/ash-research-*'
      - 'tests/ash-ingress-cache-*'
      - 'docs/ASH_KEEP_RESEARCH_HYDRATION_INGRESS_AUDIT_2026-07-17.md'
      - '.github/workflows/ash-research-hydration-ingress.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ash-research-hydration-ingress-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  contracts:
    name: Research method, ingress, and cache contracts
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Verify Research qualification hydration
        run: node tests/ash-research-demo-hydration.test.mjs
      - name: Verify ingress and cache transition
        run: node tests/ash-ingress-cache-eviction.test.mjs
      - name: Preserve prior profile demos and UI
        run: |
          node tests/ash-profile-demos.test.mjs
          node tests/ash-premium-ui.test.mjs
          node tests/ash-keep-ui.test.mjs
      - name: Verify syntax
        run: |
          node --check api/dome-world-shell.js
          node --check app/dome-world/ash-ingress-layout-hydration.js
          node --check app/dome-world/ash-research-demo-hydration.js
          node --check app/dome-world/ash-cache-flush.js
          node --check scripts/ash-research-ingress-browser-probe.mjs
          node --check scripts/ash-profile-demo-browser-probe.mjs
      - name: Preserve function covenant
        run: node tests/product-architecture/ledger.test.mjs

  browser-matrix:
    name: ${{ matrix.browser }} · desktop ingress and Research hydration
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Install browser runtime
        run: |
          npm install --no-save --package-lock=false playwright@1.54.1
          npx playwright install --with-deps ${{ matrix.browser }}
      - name: Start bounded Ash runtime
        run: |
          node scripts/ash-keep-local-closure-server.mjs 6130 > /tmp/ash-research-ingress.log 2>&1 &
          echo $! > /tmp/ash-research-ingress.pid
          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:6130/dome-world/ash-keep.html >/dev/null; then exit 0; fi
            sleep 1
          done
          cat /tmp/ash-research-ingress.log || true
          exit 1
      - name: Fly ingress membrane and Research method
        env:
          TD613_BASE_URL: http://127.0.0.1:6130
          TD613_BROWSER: ${{ matrix.browser }}
          TD613_ARTIFACT_DIR: artifacts/ash-research-ingress/${{ matrix.browser }}
        run: node scripts/ash-research-ingress-browser-probe.mjs
      - name: Stop bounded Ash runtime
        if: always()
        run: kill "$(cat /tmp/ash-research-ingress.pid)" 2>/dev/null || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ash-research-ingress-${{ matrix.browser }}-evidence
          path: |
            artifacts/ash-research-ingress/${{ matrix.browser }}
            /tmp/ash-research-ingress.log
          if-no-files-found: error
          retention-days: 30
