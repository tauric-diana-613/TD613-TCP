name: Ash Research relation correction

on:
  push:
    branches: [agent/ash-legal-demo-navigation-animation]
    paths:
      - '.github/workflows/ash-research-relationship-revert.yml'
      - 'tests/ash-research-ux-rehydration.test.mjs'

permissions:
  contents: write

concurrency:
  group: ash-research-relation-correction
  cancel-in-progress: false

jobs:
  correct:
    if: ${{ !contains(github.event.head_commit.message, '[research-relations-corrected]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/ash-legal-demo-navigation-animation
          fetch-depth: 0
      - name: Restore 58 local plus 54 cross relations and remove helper
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('app/dome-world/ash-research-demo-hydration.js')
          text = path.read_text()
          old = 'for (let index = 0; index < 56; index += 1) {'
          new = 'for (let index = 0; index < 54; index += 1) {'
          if text.count(old) != 1:
              raise SystemExit(f'Expected one overfilled Research cross-link loop, found {text.count(old)}')
          path.write_text(text.replace(old, new))
          Path('.github/workflows/ash-research-relationship-revert.yml').unlink()
          PY
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add app/dome-world/ash-research-demo-hydration.js .github/workflows/ash-research-relationship-revert.yml
          git commit -m 'fix(ash): restore 112-relation Research structure [research-relations-corrected]'
          git push origin HEAD:agent/ash-legal-demo-navigation-animation
