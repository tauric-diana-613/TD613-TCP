name: Ash Research Project Rehydration

on:
  pull_request:
    paths:
      - 'app/dome-world/ash-research-demo-hydration.js'
      - 'app/dome-world/ash-research-demo-control-state.js'
      - 'app/dome-world/ash-aia3-composition.js'
      - 'app/dome-world/ash-lifecycle.js'
      - 'app/dome-world/ash-profile-demo-hydration.js'
      - 'app/dome-world/ash-premium-ui.js'
      - 'app/dome-world/ash-workspace-bridge.js'
      - 'tests/ash-research-ux-rehydration.test.mjs'
      - 'scripts/ash-research-ux-browser-probe.mjs'
      - '.github/workflows/ash-research-ux.yml'
  push:
    branches: [main, agent/ash-legal-demo-navigation-animation]
    paths:
      - 'app/dome-world/ash-research-demo-hydration.js'
      - 'app/dome-world/ash-research-demo-control-state.js'
      - 'app/dome-world/ash-aia3-composition.js'
      - 'app/dome-world/ash-lifecycle.js'
      - 'app/dome-world/ash-profile-demo-hydration.js'
      - 'app/dome-world/ash-premium-ui.js'
      - 'app/dome-world/ash-workspace-bridge.js'
      - 'tests/ash-research-ux-rehydration.test.mjs'
      - 'scripts/ash-research-ux-browser-probe.mjs'
      - 'tests/.ash-final-rehydration-trigger'
      - '.github/workflows/ash-research-ux.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ash-research-ux-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  final-rehydration-patch:
    if: github.event_name == 'push' && github.ref_name == 'agent/ash-legal-demo-navigation-animation'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/ash-legal-demo-navigation-animation
          fetch-depth: 4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Verify one-use trigger
        run: test -f tests/.ash-final-rehydration-trigger
      - name: Patch Research readiness and Premium observer
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          research = Path('app/dome-world/ash-research-demo-hydration.js')
          text = research.read_text()
          old = """async function waitForAsh() {
            await waitFor(() => host.__td613AshKeep?.refresh
              && host.__td613AshPremiumUI?.refresh
              && host.__td613AshAia3Composition?.current
              && byId('workspace-home')
              && byId('workspace-work')
              && byId('workspace-custody'), 'Research project hydration readiness timed out.');
          }"""
          new = """async function waitForAsh() {
            await waitFor(() => host.__td613AshKeep?.refresh
              && host.__td613AshPremiumUI?.refresh
              && host.__td613AshAia3Composition?.current
              && byId('workspace-home')
              && byId('workspace-work'), 'Research project core hydration readiness timed out.');
            doc.documentElement.dataset.ashResearchCustodyPosture = byId('workspace-custody')
              ? 'PRESENT_AT_CORE_HYDRATION'
              : 'AUDIT_AFTER_CASE_HYDRATION';
          }"""
          if text.count(old) != 1:
              raise SystemExit(f'Research readiness seam count: {text.count(old)}')
          research.write_text(text.replace(old, new))

          premium = Path('scripts/ash-premium-ui-browser-probe.mjs')
          text = premium.read_text()
          marker = "async function clearLocalAsh(page) {"
          helper = """async function waitVisibleWorkspace(page, name) {
            await page.waitForFunction(value => {
              const panel = document.getElementById(`workspace-${value}`);
              const style = panel ? getComputedStyle(panel) : null;
              const rect = panel?.getBoundingClientRect();
              return document.documentElement.dataset.ashPremiumWorkspace === value
                && panel?.classList.contains('active')
                && style?.display !== 'none'
                && style?.visibility !== 'hidden'
                && Number(style?.opacity) > 0
                && style?.pointerEvents !== 'none'
                && rect?.width > 0
                && rect?.height > 0;
            }, name, { timeout: 60_000 });
          }

          async function clearLocalAsh(page) {"""
          if text.count(marker) != 1:
              raise SystemExit(f'Premium helper insertion seam count: {text.count(marker)}')
          text = text.replace(marker, helper)
          old_signature = "async function hydrateProfile(page, profile, expectedTitle) {"
          if text.count(old_signature) != 1:
              raise SystemExit(f'Premium signature seam count: {text.count(old_signature)}')
          text = text.replace(old_signature, "async function hydrateProfile(page, profile, expectedTitle, entryWorkspace) {")
          old_hydrate = """  await page.waitForFunction(({ profile: value, title }) =>
            document.documentElement.dataset.ashDemoProfile === value
              && document.getElementById('caseTitle')?.textContent?.includes(title)
              && document.getElementById('apeqPaiaMethodDocket'),
          { profile, title: expectedTitle }, { timeout: 60_000 });
            await page.evaluate(() => window.__td613AshPremiumUI.open('home'));
            await page.waitForFunction(title =>
              document.documentElement.dataset.ashPremiumWorkspace === 'home'
                && document.getElementById('premiumCaseLabel')?.textContent?.includes(title),
            expectedTitle, { timeout: 60_000 });"""
          new_hydrate = """  await page.waitForFunction(({ profile: value, title, entry }) => {
            const caseId = localStorage.getItem('td613.ash-keep.current-case');
            const convergence = window.__td613AshDemoEntryConvergence?.current?.() || null;
            return Boolean(caseId)
              && document.documentElement.dataset.ashDemoProfile === value
              && document.getElementById('caseTitle')?.textContent?.includes(title)
              && document.documentElement.dataset.ashDemoEntryReady === `${value}:${entry}`
              && document.documentElement.dataset.ashDemoEntryCase === caseId
              && document.documentElement.dataset.ashDemoEntryHydrating !== 'true'
              && !document.documentElement.dataset.ashDemoEntryHold
              && convergence?.profile === value
              && convergence?.workspace === entry
              && convergence?.posture === 'READY'
              && convergence?.phase === 'VISIBLE';
          }, { profile, title: expectedTitle, entry: entryWorkspace }, { timeout: 60_000 });
            await page.evaluate(() => (window.__td613AshUiUxRescue?.open || window.__td613AshPremiumUI.open)('home'));
            await waitVisibleWorkspace(page, 'home');
            await page.waitForFunction(title => document.getElementById('premiumCaseLabel')?.textContent?.includes(title), expectedTitle, { timeout: 60_000 });"""
          if text.count(old_hydrate) != 1:
              raise SystemExit(f'Premium hydrate seam count: {text.count(old_hydrate)}')
          text = text.replace(old_hydrate, new_hydrate)
          replacements = {
            """    await page.locator('[data-premium-workspace=\"work\"]').click();
              assert(await page.locator('#workspace-work').isVisible(), 'Work destination did not open');""": """    await page.locator('[data-premium-workspace=\"work\"]').click();
              await waitVisibleWorkspace(page, 'work');""",
            """    await page.locator('[data-premium-workspace=\"choir\"]').click();
              assert(await page.locator('#workspace-choir').isVisible(), 'Choir destination did not open');""": """    await page.locator('[data-premium-workspace=\"choir\"]').click();
              await waitVisibleWorkspace(page, 'choir');""",
            """    await page.locator('[data-premium-workspace=\"capsule\"]').click();
              assert(await page.locator('#workspace-capsule').isVisible(), 'Capsule destination did not open');""": """    await page.locator('[data-premium-workspace=\"capsule\"]').click();
              await waitVisibleWorkspace(page, 'capsule');""",
            """    await page.evaluate(() => window.__td613AshPremiumUI.open('draft'));
              await page.waitForFunction(() => document.documentElement.dataset.ashPremiumWorkspace === 'draft');""": """    await page.evaluate(() => (window.__td613AshUiUxRescue?.open || window.__td613AshPremiumUI.open)('draft'));
              await waitVisibleWorkspace(page, 'draft');"""
          }
          for old, new in replacements.items():
              if text.count(old) != 1:
                  raise SystemExit(f'Premium destination seam count {text.count(old)} for {old[:60]!r}')
              text = text.replace(old, new)
          text = text.replace("schema: 'td613.ash.premium-ui-browser-flight/v0.2-apeq-paia'", "schema: 'td613.ash.premium-ui-browser-flight/v0.3-entry-converged-destinations'")
          text = text.replace("flightProfile(context, 'political_campaign', 'Harbor City Mayoral Campaign')", "flightProfile(context, 'political_campaign', 'Harbor City Mayoral Campaign', 'map')")
          text = text.replace("flightProfile(context, 'fundraiser', 'Northstar Arts Benefit')", "flightProfile(context, 'fundraiser', 'Northstar Arts Benefit', 'work')")
          premium.write_text(text)
          PY
          node --check app/dome-world/ash-research-demo-hydration.js
          node --check scripts/ash-premium-ui-browser-probe.mjs
      - name: Restore workflow and remove temporary files
        run: |
          git show HEAD^^:.github/workflows/ash-research-ux.yml > .github/workflows/ash-research-ux.yml
          rm -f .github/workflows/ash-final-rehydration-patch.yml tests/.ash-final-rehydration-trigger
      - name: Commit durable reconciliation
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add app/dome-world/ash-research-demo-hydration.js scripts/ash-premium-ui-browser-probe.mjs .github/workflows/ash-research-ux.yml .github/workflows/ash-final-rehydration-patch.yml tests/.ash-final-rehydration-trigger
          git commit -m 'fix(ash): decouple Research core hydration and converge Premium flight'
          git push origin HEAD:agent/ash-legal-demo-navigation-animation

  static-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Verify Research and readiness syntax
        run: |
          mkdir -p artifacts/ash-research-static
          {
            node --check app/dome-world/ash-research-demo-hydration.js
            node --check app/dome-world/ash-research-demo-control-state.js
            node --check app/dome-world/ash-aia3-composition.js
            node --check app/dome-world/ash-lifecycle.js
            node --check app/dome-world/ash-profile-demo-hydration.js
            node --check scripts/ash-research-ux-browser-probe.mjs
          } > artifacts/ash-research-static/syntax.log 2>&1 || {
            cat artifacts/ash-research-static/syntax.log
            exit 1
          }
      - name: Verify Research fixture, surface ledger, and boundaries
        run: |
          node tests/ash-research-ux-rehydration.test.mjs > artifacts/ash-research-static/contract.log 2>&1 || {
            cat artifacts/ash-research-static/contract.log
            exit 1
          }
          cat artifacts/ash-research-static/contract.log
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ash-research-static-diagnostics
          path: artifacts/ash-research-static/
          if-no-files-found: error
          retention-days: 30

  browser-witness:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm install --no-save --package-lock=false playwright@1.53.2
      - run: npx playwright install --with-deps ${{ matrix.browser }}
      - name: Start bounded local Ash runtime
        run: |
          node scripts/ash-keep-local-closure-server.mjs > artifacts-ash-research-server.log 2>&1 &
          echo $! > ash-research-server.pid
          for attempt in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:6130/dome-world/ash-keep.html >/dev/null; then exit 0; fi
            sleep 1
          done
          cat artifacts-ash-research-server.log
          exit 1
      - name: Exercise Research hydration, interface ledger, navigation, dormancy, and mobile geometry
        env:
          TD613_BROWSER: ${{ matrix.browser }}
          TD613_BASE_URL: http://127.0.0.1:6130
          TD613_ARTIFACT_DIR: artifacts/ash-research-ux-${{ matrix.browser }}
        run: node scripts/ash-research-ux-browser-probe.mjs
      - name: Stop bounded local runtime
        if: always()
        run: |
          if [ -f ash-research-server.pid ]; then kill $(cat ash-research-server.pid) || true; fi
          cat artifacts-ash-research-server.log || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ash-research-ux-${{ matrix.browser }}-evidence
          path: artifacts/ash-research-ux-${{ matrix.browser }}/
          if-no-files-found: error
          retention-days: 30
