name: Ash Research Legacy Composition Patch

on:
  pull_request:
    paths:
      - 'tests/.ash-research-legacy-composition-trigger'
      - '.github/workflows/ash-research-ux.yml'

permissions:
  contents: write

concurrency:
  group: ash-research-legacy-composition-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/ash-legal-demo-navigation-animation
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Verify one-use trigger
        run: test -f tests/.ash-research-legacy-composition-trigger
      - name: Patch presentation-aware Research composition binding
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          path = Path('app/dome-world/ash-research-demo-hydration.js')
          source = path.read_text()
          pattern = r"async function waitForOpenComposition\(caseId\) \{[\s\S]*?Research project opened before its lifecycle and visible AIA composition converged\.\'\);\n\}"
          replacement = """async function waitForOpenComposition(caseId) {
            await waitFor(() => {
              const currentCaseId = host.__td613AshKeep?.current?.().case_id || null;
              const pointer = host.localStorage?.getItem?.(POINTER_KEY) || null;
              const premiumReady = Boolean(host.__td613AshPremiumUI?.refresh
                && byId('premiumPrimaryDock')
                && byId('premiumContextBar')
                && byId('workspace-home')
                && byId('workspace-work'));
              if (currentCaseId !== caseId || pointer !== caseId || !premiumReady) return false;
              const composition = host.__td613AshAia3Composition?.current?.() || null;
              if (!composition) return true;
              return composition.session_open === true
                && composition.membrane_ready === true
                && composition.hold == null
                && Boolean(composition.lifecycle_state)
                && composition.route_count >= 4
                && composition.task_count >= 4;
            }, 'Research project opened before its current presentation foundation converged.');
            doc.documentElement.dataset.ashResearchCompositionPosture = host.__td613AshAia3Composition?.current?.()
              ? 'AIA3_LIFECYCLE_BOUND'
              : 'LEGACY_PREMIUM_BOUND';
          }"""
          output, count = re.subn(pattern, replacement, source, count=1)
          print(f'Research open-composition replacement count: {count}')
          if count != 1:
              raise SystemExit(f'Research open-composition replacement count: {count}')
          path.write_text(output)
          PY
          node --check app/dome-world/ash-research-demo-hydration.js
      - name: Commit durable Research change only
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add app/dome-world/ash-research-demo-hydration.js
          git commit -m 'fix(ash): bind Research to the active presentation foundation'
          git push origin HEAD:agent/ash-legal-demo-navigation-animation
