name: Ash Safe Harbor Ingress

on:
  pull_request:
    paths:
      - "app/engine/ash-safe-harbor-ingress.js"
      - "app/engine/ash-safe-harbor-ingress-loader.js"
      - "app/engine/ash-keep-drafts*.js"
      - "app/safe-harbor/app/safe-harbor-ash-ingress.js"
      - "app/safe-harbor/app/safe-harbor-housekeeping*.js"
      - "app/dome-world/ash-safe-harbor-ingress.js"
      - "app/dome-world/ash-keep.js"
      - "app/dome-world/schemas/ash-safe-harbor-ingress-v01.schema.json"
      - "tests/ash-safe-harbor-ingress*.test.mjs"
      - "docs/ASH_KEEP_STRETCH9_CLOSURE_RECEIPT.md"
      - "docs/ASH_KEEP_BUILDOUT_LEDGER.md"
      - "ROADMAP.md"
      - ".github/workflows/ash-safe-harbor-ingress.yml"
  push:
    branches: [main]
    paths:
      - "app/engine/ash-safe-harbor-ingress.js"
      - "app/engine/ash-safe-harbor-ingress-loader.js"
      - "app/engine/ash-keep-drafts*.js"
      - "app/safe-harbor/app/safe-harbor-ash-ingress.js"
      - "app/safe-harbor/app/safe-harbor-housekeeping*.js"
      - "app/dome-world/ash-safe-harbor-ingress.js"
      - "app/dome-world/ash-keep.js"
      - "app/dome-world/schemas/ash-safe-harbor-ingress-v01.schema.json"
      - "tests/ash-safe-harbor-ingress*.test.mjs"
      - "docs/ASH_KEEP_STRETCH9_CLOSURE_RECEIPT.md"
      - "docs/ASH_KEEP_BUILDOUT_LEDGER.md"
      - "ROADMAP.md"
      - ".github/workflows/ash-safe-harbor-ingress.yml"
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

jobs:
  validate-ingress:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TD613_OBSERVED_COMMIT: ${{ github.sha }}
      TD613_OBSERVER_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      TD613_OBSERVER_STATUS_CONTEXT: Ash Safe Harbor Ingress Validation
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Publish ingress validation pending status
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TD613_OBSERVER_STATUS_STATE: pending
          TD613_OBSERVER_STATUS_DESCRIPTION: Safe Harbor to Ash ingress validation is running
          TD613_OBSERVER_STATUS_RECEIPT_PATH: artifacts/ash-safe-harbor-ingress/observer-status-pending.json
        run: node scripts/publish-ash-keep-observer-status.mjs
      - run: npm ci
      - name: Validate ingress schema and custody contracts
        shell: bash
        run: |
          set -o pipefail
          node tests/ash-safe-harbor-ingress.test.mjs 2>&1 | tee ash-safe-harbor-ingress.log
      - name: Validate browser loaders and data minimization
        run: node tests/ash-safe-harbor-ingress-browser.test.mjs
      - name: Preserve current Safe Harbor contracts
        run: npm run test:safe-harbor:current
      - name: Preserve Ash Keep core
        run: node tests/ash-keep-core.test.mjs
      - name: Preserve Ash Keep continuity
        run: node tests/ash-keep-continuity.test.mjs
      - name: Preserve Ash Keep Hush boundary
        run: node tests/ash-keep-hush-api.test.mjs
      - name: Rebuild maintained Aperture download artifact
        run: npm run aperture:export-downloads
      - name: Preserve Ash Keep UI contract
        shell: bash
        run: |
          set -o pipefail
          node tests/ash-keep-ui.test.mjs 2>&1 | tee ash-keep-ui.log
      - name: Preserve lifecycle engine
        run: node tests/ash-lifecycle.test.mjs
      - name: Preserve Draft lifecycle binding
        run: node tests/ash-draft-lifecycle-binding.test.mjs
      - name: Preserve Ash product architecture
        run: node tests/ash-product-architecture.test.mjs
      - name: Enforce Vercel function hygiene
        run: node tests/vercel-deploy-hygiene.test.mjs
      - name: Publish ingress validation success status
        if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TD613_OBSERVER_STATUS_STATE: success
          TD613_OBSERVER_STATUS_DESCRIPTION: Safe Harbor to Ash reference ingress passed
          TD613_OBSERVER_STATUS_RECEIPT_PATH: artifacts/ash-safe-harbor-ingress/observer-status-success.json
        run: node scripts/publish-ash-keep-observer-status.mjs
      - name: Publish ingress validation failure status
        if: failure() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TD613_OBSERVER_STATUS_STATE: failure
          TD613_OBSERVER_STATUS_DESCRIPTION: Safe Harbor ingress held for repair
          TD613_OBSERVER_STATUS_RECEIPT_PATH: artifacts/ash-safe-harbor-ingress/observer-status-failure.json
        run: node scripts/publish-ash-keep-observer-status.mjs
      - name: Preserve ingress validation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ash-safe-harbor-ingress-validation-evidence
          path: |
            ash-safe-harbor-ingress.log
            ash-keep-ui.log
            app/dome-world/schemas/ash-safe-harbor-ingress-v01.schema.json
            artifacts/ash-safe-harbor-ingress/
          if-no-files-found: warn
          retention-days: 30
