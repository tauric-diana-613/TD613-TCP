name: Ash User Test Flight

on:
  pull_request:
    paths:
      - 'app/dome-world/ash-*'
      - 'app/dome-world/fixtures/ash-keep-demo-*'
      - 'app/engine/ash-*'
      - 'scripts/ash-user-test-flight.mjs'
      - 'scripts/run-ash-user-test-flight.mjs'
      - 'scripts/ash-profile-demo-browser-probe.mjs'
      - 'scripts/ash-premium-ui-browser-probe.mjs'
      - 'tests/ash-user-test-flight*'
      - 'tests/ash-profile-demos.test.mjs'
      - 'tests/ash-premium-ui.test.mjs'
      - 'tests/ash-capsule-recovery-entry.test.mjs'
      - 'tests/ash-keep-ui.test.mjs'
      - '.github/workflows/ash-user-test-flight.yml'
  push:
    branches: [main]
    paths:
      - 'app/dome-world/ash-*'
      - 'app/dome-world/fixtures/ash-keep-demo-*'
      - 'app/engine/ash-*'
      - 'scripts/ash-user-test-flight.mjs'
      - 'scripts/run-ash-user-test-flight.mjs'
      - 'scripts/ash-profile-demo-browser-probe.mjs'
      - 'scripts/ash-premium-ui-browser-probe.mjs'
      - 'tests/ash-user-test-flight*'
      - 'tests/ash-profile-demos.test.mjs'
      - 'tests/ash-premium-ui.test.mjs'
      - 'tests/ash-capsule-recovery-entry.test.mjs'
      - 'tests/ash-keep-ui.test.mjs'
      - '.github/workflows/ash-user-test-flight.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ash-user-test-flight-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  local-candidate:
    name: Ash User Flight · Local Candidate
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install repository dependencies
        run: npm ci
      - name: Verify profile and premium UI contracts
        run: |
          node tests/ash-profile-demos.test.mjs
          node tests/ash-premium-ui.test.mjs
      - name: Verify Capsule recovery survives launch recomposition
        run: node tests/ash-capsule-recovery-entry.test.mjs
      - name: Install browser runtime
        run: |
          npm install --no-save --package-lock=false playwright@1.54.1
          npx playwright install --with-deps chromium
      - name: Start bounded Ash candidate runtime
        run: |
          node scripts/ash-keep-local-closure-server.mjs 6130 > /tmp/ash-user-flight-local.log 2>&1 &
          echo $! > /tmp/ash-user-flight-local.pid
          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:6130/dome-world/ash-threshold.html >/dev/null; then exit 0; fi
            sleep 1
          done
          cat /tmp/ash-user-flight-local.log || true
          exit 1
      - name: Fly Political Campaign and Fundraiser demos
        env:
          TD613_BASE_URL: http://127.0.0.1:6130
          TD613_ARTIFACT_DIR: artifacts/ash-user-flight-local/profile-demos
        run: node scripts/ash-profile-demo-browser-probe.mjs
      - name: Fly premium Command Deck, Choir, and Capsule
        env:
          TD613_BASE_URL: http://127.0.0.1:6130
          TD613_ARTIFACT_DIR: artifacts/ash-user-flight-local/premium-ui
        run: node scripts/ash-premium-ui-browser-probe.mjs
      - name: Fly the local candidate
        env:
          TD613_BASE_URL: http://127.0.0.1:6130
          TD613_ARTIFACT_DIR: artifacts/ash-user-flight-local
          TD613_SYNTHETIC_CUSTODY: '1'
        shell: bash
        run: |
          mkdir -p artifacts/ash-user-flight-local
          set +e
          node scripts/run-ash-user-test-flight.mjs 2>&1 | tee artifacts/ash-user-flight-local/runner-output.log
          status=${PIPESTATUS[0]}
          set -e
          exit "$status"
      - name: Stop bounded Ash candidate runtime
        if: always()
        run: kill "$(cat /tmp/ash-user-flight-local.pid)" 2>/dev/null || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ash-user-flight-local-evidence
          path: |
            artifacts/ash-user-flight-local
            /tmp/ash-user-flight-local.log
          if-no-files-found: error
          retention-days: 30

  deployed-current:
    name: Ash User Flight · Deployed Current
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install repository dependencies
        run: npm ci
      - name: Verify profile and premium UI contracts
        run: |
          node tests/ash-profile-demos.test.mjs
          node tests/ash-premium-ui.test.mjs
      - name: Verify Capsule recovery survives launch recomposition
        run: node tests/ash-capsule-recovery-entry.test.mjs
      - name: Install browser runtime
        run: |
          npm install --no-save --package-lock=false playwright@1.54.1
          npx playwright install --with-deps chromium
      - name: Wait for deployed Ash
        env:
          TD613_EVENT_NAME: ${{ github.event_name }}
        run: |
          for attempt in $(seq 1 60); do
            if [ "$TD613_EVENT_NAME" = "push" ]; then
              profile="$(curl -fsS https://td613.com/dome-world/ash-profile-demo-hydration.js || true)"
              premium="$(curl -fsS https://td613.com/dome-world/ash-premium-ui.js || true)"
              if printf '%s' "$profile" | grep -q 'v0.2-campaign-fundraiser' \
                && printf '%s' "$premium" | grep -q 'v0.1-command-instrument'; then exit 0; fi
            elif curl -fsS https://td613.com/dome-world/ash-threshold.html | grep -q 'Ash Keep'; then
              exit 0
            fi
            sleep 2
          done
          exit 1
      - name: Fly deployed Political Campaign and Fundraiser demos
        if: github.event_name == 'push'
        env:
          TD613_BASE_URL: https://td613.com
          TD613_ARTIFACT_DIR: artifacts/ash-user-flight-deployed/profile-demos
        run: node scripts/ash-profile-demo-browser-probe.mjs
      - name: Fly deployed premium Command Deck, Choir, and Capsule
        if: github.event_name == 'push'
        env:
          TD613_BASE_URL: https://td613.com
          TD613_ARTIFACT_DIR: artifacts/ash-user-flight-deployed/premium-ui
        run: node scripts/ash-premium-ui-browser-probe.mjs
      - name: Fly the deployed current release
        continue-on-error: ${{ github.event_name == 'pull_request' }}
        env:
          TD613_BASE_URL: https://td613.com
          TD613_ARTIFACT_DIR: artifacts/ash-user-flight-deployed
          TD613_SYNTHETIC_CUSTODY: '0'
        run: node scripts/run-ash-user-test-flight.mjs
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ash-user-flight-deployed-evidence
          path: artifacts/ash-user-flight-deployed
          if-no-files-found: error
          retention-days: 30
