name: Audit calibration

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  calibrate:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm install
      - name: Run calibration
        run: |
          npm run test:calibration 2>&1 | tee calibration-output.txt
      - name: Upload calibration output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: calibration-output
          path: calibration-output.txt
          retention-days: 30
