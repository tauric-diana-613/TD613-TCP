name: Coalesce Ash Case List Refresh

# One-time self-removing final-cut repair.
on:
  push:
    branches:
      - hotfix/ash-live-ingress-demos-cache
    paths:
      - scripts/coalesce-ash-case-list-refresh.mjs
      - .github/workflows/coalesce-ash-case-list-refresh.yml

permissions:
  contents: write

concurrency:
  group: coalesce-ash-case-list-refresh
  cancel-in-progress: false

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: hotfix/ash-live-ingress-demos-cache
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Coalesce Case List population
        run: node scripts/coalesce-ash-case-list-refresh.mjs
      - name: Verify Case List and closure contracts
        run: |
          node --check app/dome-world/ash-case-controls.js
          node tests/ash-keep-ui.test.mjs
          node tests/ash-keep-production-closure-contract.test.mjs
          node tests/vercel-deploy-hygiene.test.mjs
      - name: Commit deterministic Case List refresh
        run: |
          git config user.name "td613-convergence-witness"
          git config user.email "actions@users.noreply.github.com"
          git add app/dome-world/ash-case-controls.js tests/ash-keep-ui.test.mjs scripts/coalesce-ash-case-list-refresh.mjs .github/workflows/coalesce-ash-case-list-refresh.yml
          git commit -m "Coalesce Ash Case List refreshes"
          git push origin HEAD:hotfix/ash-live-ingress-demos-cache
