name: Dome-World Phase 1 Hardening

on:
  pull_request:
    paths:
      - "api/dome-world-engine-guard.py"
      - "api/ash-local-commitment-guard.py"
      - "app/dome-world/ash/local-commitment-v071.js"
      - "vercel.json"
      - "tests/dome-world-phase1-hardening.test.mjs"
      - "packages/dome_world_exact/tests/test_phase1_guarded_routes.py"
      - ".github/workflows/dome-world-phase1-hardening.yml"
  push:
    branches: [main]
    paths:
      - "api/dome-world-engine-guard.py"
      - "api/ash-local-commitment-guard.py"
      - "app/dome-world/ash/local-commitment-v071.js"
      - "vercel.json"
      - "tests/dome-world-phase1-hardening.test.mjs"
      - "packages/dome_world_exact/tests/test_phase1_guarded_routes.py"
      - ".github/workflows/dome-world-phase1-hardening.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  hardening:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: npm ci
      - run: python -m pip install --disable-pip-version-check pytest sympy
      - name: Compile guarded endpoints
        run: python -m py_compile api/dome-world-engine-guard.py api/ash-local-commitment-guard.py
      - name: Validate guarded route and generation contracts
        run: node tests/dome-world-phase1-hardening.test.mjs
      - name: Validate guarded endpoint behavior
        run: python -m pytest packages/dome_world_exact/tests/test_phase1_guarded_routes.py -q
      - name: Re-run Phase 1 browser contract
        run: node tests/dome-world-ash-custody.test.mjs
      - name: Re-run Phase 1 API integration
        run: python -m pytest packages/dome_world_exact/tests/test_api_integration.py -q
      - name: Re-run Vercel deployment hygiene
        run: node tests/vercel-deploy-hygiene.test.mjs
