name: Dome-World Phase 4

on:
  pull_request:
    paths:
      - "api/dome-world-engine-guard.py"
      - "packages/dome_world_exact/reciprocal_bridge.py"
      - "packages/dome_world_exact/flowcore_context.py"
      - "packages/dome_world_exact/tests/test_reciprocal_bridge_v01.py"
      - "app/engine/aperture-v3-reciprocal-bridge.js"
      - "app/aperture/index.html"
      - "app/aperture/release.*"
      - "app/dome-world/reciprocal-bridge.html"
      - "app/dome-world/schemas/aperture-*.json"
      - "app/dome-world/schemas/flowcore-*.json"
      - "app/dome-world/docs/PHASE_4_*.md"
      - "scripts/phase4-reciprocal-bridge-deployment-probe.mjs"
      - "scripts/phase4-reciprocal-bridge-browser-probe.mjs"
      - "scripts/phase4-local-integration-server.py"
      - "tests/aperture-phase4-bridge.test.mjs"
      - "tests/phase4-deployment-probe.test.mjs"
      - "tests/phase4-release-sync.test.mjs"
      - "vercel.json"
      - ".github/workflows/dome-world-phase4.yml"
  workflow_dispatch:

permissions:
  contents: read
  issues: read

jobs:
  phase4:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install JavaScript dependencies
        run: npm ci
      - name: Install Python test dependencies
        run: python -m pip install --disable-pip-version-check pytest sympy
      - name: Compile Phase IV Python surfaces
        run: python -m py_compile api/dome-world-engine-guard.py packages/dome_world_exact/reciprocal_bridge.py packages/dome_world_exact/flowcore_context.py scripts/phase4-local-integration-server.py
      - name: Validate Phase IV server bridge
        run: python -m pytest packages/dome_world_exact/tests/test_reciprocal_bridge_v01.py -q
      - name: Preserve Phase III context instrumentation
        run: python -m pytest packages/dome_world_exact/tests/test_flowcore_context.py packages/dome_world_exact/tests/test_flowcore_context_api.py -q
      - name: Validate browser audit and replay
        run: node tests/aperture-phase4-bridge.test.mjs
      - name: Validate deployment probe contract
        run: node tests/phase4-deployment-probe.test.mjs
      - name: Validate maintained release suite
        run: npm run test:release
      - name: Validate Phase IV release synchronization
        run: node tests/phase4-release-sync.test.mjs
      - name: Validate Vercel route and function hygiene
        run: node tests/vercel-deploy-hygiene.test.mjs

      - name: Resolve Vercel preview alias
        if: github.event_name == 'pull_request'
        id: preview
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          preview_url=""
          for attempt in $(seq 1 30); do
            payload="$(gh api "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" || true)"
            preview_url="$(printf '%s' "$payload" | jq -r '[.[] | select(.user.login == "vercel[bot]") | .body | capture("\\[Preview\\]\\((?<url>https://[^)]+\\.vercel\\.app)\\)").url] | last // empty' 2>/dev/null || true)"
            if [ -n "$preview_url" ]; then
              break
            fi
            sleep 5
          done
          if [ -z "$preview_url" ]; then
            echo "Unable to resolve Vercel preview alias from the PR receipt." >&2
            exit 1
          fi
          echo "preview_url=$preview_url" >> "$GITHUB_OUTPUT"
          echo "Resolved Phase IV preview: $preview_url"

      - name: Classify preview access boundary
        if: github.event_name == 'pull_request'
        id: preview_access
        env:
          PREVIEW_URL: ${{ steps.preview.outputs.preview_url }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          set -euo pipefail
          mkdir -p artifacts
          header_args=()
          if [ -n "${VERCEL_AUTOMATION_BYPASS_SECRET:-}" ]; then
            header_args+=( -H "x-vercel-protection-bypass: ${VERCEL_AUTOMATION_BYPASS_SECRET}" )
            header_args+=( -H "x-vercel-set-bypass-cookie: true" )
          fi
          status="$(curl -sS --max-time 20 -D artifacts/phase4-preview-headers.txt -o artifacts/phase4-preview-body.txt -w '%{http_code}' "${header_args[@]}" "${PREVIEW_URL}/api/aperture-bridge" || true)"
          content_type="$(awk 'BEGIN{IGNORECASE=1} /^content-type:/{gsub("\r",""); value=$0} END{sub(/^[^:]+:[[:space:]]*/,"",value); print value}' artifacts/phase4-preview-headers.txt)"
          if [ "$status" = "200" ] && printf '%s' "$content_type" | grep -qi 'application/json'; then
            state="JSON_REACHABLE"
          else
            state="PROTECTED_OR_NON_JSON"
          fi
          jq -n \
            --arg schema "td613.phase4.preview-access/v0.1" \
            --arg url "$PREVIEW_URL" \
            --arg state "$state" \
            --arg status "$status" \
            --arg content_type "$content_type" \
            --argjson bypass_configured "$([ -n "${VERCEL_AUTOMATION_BYPASS_SECRET:-}" ] && echo true || echo false)" \
            '{schema:$schema,url:$url,state:$state,http_status:$status,content_type:$content_type,bypass_configured:$bypass_configured,claim:"deployment-access-receipt-not-runtime-verdict"}' \
            > artifacts/phase4-preview-access.json
          cat artifacts/phase4-preview-access.json
          echo "state=$state" >> "$GITHUB_OUTPUT"

      - name: Start bounded Phase IV integration runtime
        id: integration_runtime
        run: |
          set -euo pipefail
          mkdir -p artifacts
          python scripts/phase4-local-integration-server.py --port 6134 > artifacts/phase4-integration-server.log 2>&1 &
          echo $! > artifacts/phase4-integration-server.pid
          for attempt in $(seq 1 30); do
            if curl -fsS --max-time 2 http://127.0.0.1:6134/api/aperture-bridge > artifacts/phase4-integration-readiness.json; then
              cat artifacts/phase4-integration-readiness.json
              echo "base_url=http://127.0.0.1:6134" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            sleep 1
          done
          cat artifacts/phase4-integration-server.log || true
          exit 1

      - name: Run bounded Phase IV runtime probe
        id: live_probe
        continue-on-error: true
        env:
          TD613_BASE_URL: ${{ steps.integration_runtime.outputs.base_url }}
          TD613_FETCH_TIMEOUT_MS: 12000
        run: node scripts/phase4-reciprocal-bridge-deployment-probe.mjs > artifacts/phase4-live-probe.json 2> artifacts/phase4-live-probe.err

      - name: Install Chromium probe runtime
        if: steps.live_probe.outcome == 'success'
        run: |
          npm install --no-save --package-lock=false playwright@1.53.2
          npx playwright install --with-deps chromium

      - name: Demonstrate Phase IV lab on desktop and mobile
        if: steps.live_probe.outcome == 'success'
        id: browser_probe
        continue-on-error: true
        env:
          TD613_BASE_URL: ${{ steps.integration_runtime.outputs.base_url }}
          TD613_ARTIFACT_DIR: artifacts/phase4-browser
        run: node scripts/phase4-reciprocal-bridge-browser-probe.mjs

      - name: Preserve Phase IV demonstration receipts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase4-reciprocal-receipt-demonstration
          path: |
            artifacts/phase4-preview-access.json
            artifacts/phase4-preview-headers.txt
            artifacts/phase4-preview-body.txt
            artifacts/phase4-integration-server.log
            artifacts/phase4-integration-readiness.json
            artifacts/phase4-live-probe.json
            artifacts/phase4-live-probe.err
            artifacts/phase4-browser/
          if-no-files-found: warn
          retention-days: 7

      - name: Enforce Phase IV runtime demonstration
        if: steps.live_probe.outcome == 'failure' || steps.browser_probe.outcome == 'failure'
        run: |
          echo "Phase IV runtime demonstration held."
          cat artifacts/phase4-integration-server.log 2>/dev/null || true
          cat artifacts/phase4-live-probe.err 2>/dev/null || true
          cat artifacts/phase4-browser/phase4-browser-demonstration.json 2>/dev/null || true
          exit 1

      - name: Stop bounded integration runtime
        if: always()
        run: |
          if [ -f artifacts/phase4-integration-server.pid ]; then
            kill "$(cat artifacts/phase4-integration-server.pid)" 2>/dev/null || true
          fi
