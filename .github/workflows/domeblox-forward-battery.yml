name: DomeBlox Forward Battery

on:
  pull_request:
    paths:
      - 'app/dome-world/domeblox/**'
      - 'tests/domeblox-static.test.mjs'
      - 'tests/domeblox-live-browser.spec.mjs'
      - 'docs/DOMEBLOX_REPOSITORY_INTEGRATION.md'
      - 'DOMEBLOX_REPO_PAYLOAD_MANIFEST.json'
      - '.github/workflows/domeblox-forward-battery.yml'
  push:
    branches: [main]
    paths:
      - 'app/dome-world/domeblox/**'
      - 'tests/domeblox-static.test.mjs'
      - 'docs/DOMEBLOX_REPOSITORY_INTEGRATION.md'
      - 'DOMEBLOX_REPO_PAYLOAD_MANIFEST.json'

permissions:
  contents: read

jobs:
  static-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Run DomeBlox contract and live observation
        id: observation
        shell: bash
        run: |
          set +e
          node tests/domeblox-static.test.mjs > domeblox-live-observation.log 2>&1
          status=$?
          printf '%s\n' "$status" > domeblox-live-observation.exit-code
          cat domeblox-live-observation.log
          exit 0
      - name: Upload DomeBlox observation receipt
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: domeblox-live-observation-receipt
          path: |
            domeblox-live-observation.log
            domeblox-live-observation.exit-code
          if-no-files-found: error
          retention-days: 7
      - name: Enforce DomeBlox observation result
        shell: bash
        run: |
          status="$(cat domeblox-live-observation.exit-code)"
          if [ "$status" != "0" ]; then
            echo "DomeBlox observation failed with exit code $status"
            exit "$status"
          fi
      - name: Install Playwright observation runtime
        run: |
          npm install --no-save --ignore-scripts @playwright/test@1.55.0
          npx playwright install --with-deps chromium
      - name: Run live Chromium interaction
        run: npx playwright test tests/domeblox-live-browser.spec.mjs --reporter=line
      - name: Upload live Chromium receipt
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: domeblox-live-chromium-receipt
          path: domeblox-browser-observation/
          if-no-files-found: warn
          retention-days: 7
      - name: Confirm deployment and serverless boundaries
        run: |
          node --input-type=module <<'NODE'
          import fs from 'node:fs';
          const manifest = JSON.parse(fs.readFileSync('DOMEBLOX_REPO_PAYLOAD_MANIFEST.json', 'utf8'));
          if (manifest.serverless_delta !== 0) throw new Error('DomeBlox serverless delta changed');
          if (manifest.deployment_lock_mutated !== false) throw new Error('DomeBlox changed deployment lock');
          if (manifest.route !== '/dome-world/domeblox/') throw new Error('Unexpected DomeBlox route');
          NODE
