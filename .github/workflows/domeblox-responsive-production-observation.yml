name: DomeBlox Responsive Production Observation

on:
  pull_request:
    paths:
      - 'tests/domeblox-responsive-production-observation.spec.mjs'
      - '.github/workflows/domeblox-responsive-production-observation.yml'

permissions:
  contents: read

jobs:
  observe-production:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install Chromium observation runtime
        run: |
          npm install --no-save --ignore-scripts @playwright/test@1.55.0
          npx playwright install --with-deps chromium
      - name: Observe deployed desktop and mobile layouts
        run: npx playwright test tests/domeblox-responsive-production-observation.spec.mjs --reporter=line
      - name: Upload deployed observation receipt
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: domeblox-responsive-production-observation
          path: domeblox-responsive-production-observation/
          if-no-files-found: error
          retention-days: 7
