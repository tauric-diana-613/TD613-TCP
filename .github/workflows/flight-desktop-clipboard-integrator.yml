name: Flight desktop clipboard integrator

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: flight-desktop-clipboard-integrator
  cancel-in-progress: false

jobs:
  integrate-test-and-clean:
    if: github.event.pull_request.head.ref == 'flight-desktop-clipboard-linebreak-phrase'
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - name: Check out exact Flight repair head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply bounded Flight repair
        run: node scripts/apply-flight-desktop-clipboard-repair.mjs

      - name: Validate Flight desktop and mobile contracts
        id: validation
        run: |
          set -o pipefail
          {
            node tests/td613-flight-desktop-clipboard.test.mjs
            node tests/td613-flight-mobile-layout.test.mjs
            node tests/td613-flight-date-refresh.test.mjs
            npm run test:safe-harbor:gen3:wave-b
            npm run test:safe-harbor:current
            node tests/vercel-deploy-hygiene.test.mjs
          } 2>&1 | tee /tmp/flight-desktop-clipboard-validation.log

      - name: Preserve Flight validation failure log
        if: failure() && steps.validation.conclusion == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: flight-desktop-clipboard-validation-failure
          path: /tmp/flight-desktop-clipboard-validation.log
          if-no-files-found: error
          retention-days: 7

      - name: Verify Flight path and authority hygiene
        run: |
          set -euo pipefail
          node --input-type=module <<'NODE'
          import fs from 'node:fs';
          import { execFileSync } from 'node:child_process';
          execFileSync('git', ['fetch', 'origin', 'main'], { stdio: 'inherit' });
          const files = execFileSync('git', ['diff', '--name-only', 'origin/main...HEAD'], { encoding: 'utf8' })
            .trim().split(/\r?\n/u).filter(Boolean);
          const allowed = new Set([
            'app/safe-harbor/td613-flight.html',
            'app/safe-harbor/td613-flight-clipboard-fidelity.js',
            'tests/td613-flight-desktop-clipboard.test.mjs',
            'tests/tcp-smoke.test.mjs',
            'scripts/apply-flight-desktop-clipboard-repair.mjs',
            'package.json'
          ]);
          const unexpected = files.filter((file) => !allowed.has(file));
          if (unexpected.length) throw new Error(`Flight repair changed unauthorized paths:\n${unexpected.join('\n')}`);
          const aia = files.filter((file) => /(?:^|\/)(?:ash|flowcore|flow-core|dome-world)(?:\/|-)/iu.test(file));
          if (aia.length) throw new Error(`Flight repair touched active AIA or Flow-Core surfaces:\n${aia.join('\n')}`);
          const concrete = /TD613-SH-9B07D8B-[0-9A-F]{8}/gu;
          const violations = [];
          for (const file of files) {
            if (!fs.existsSync(file) || !/\.(?:html|js|mjs|json)$/u.test(file)) continue;
            for (const value of fs.readFileSync(file, 'utf8').match(concrete) || []) violations.push(`${file}: ${value}`);
          }
          if (violations.length) throw new Error(`Flight repair exposed a concrete SHI:\n${violations.join('\n')}`);
          const vercel = JSON.parse(fs.readFileSync('vercel.json', 'utf8'));
          if (vercel.git?.deploymentEnabled !== false) throw new Error('Git-triggered Vercel deployment lock is not closed.');
          const serverless = files.filter((file) => /^(?:api|functions|netlify\/functions|vercel\/functions)\//u.test(file));
          if (serverless.length) throw new Error(`Flight repair added serverless surfaces:\n${serverless.join('\n')}`);
          console.log(`Flight path and authority hygiene passed across ${files.length} changed paths.`);
          NODE
          node --check app/safe-harbor/td613-flight-clipboard-fidelity.js
          node --check scripts/apply-flight-desktop-clipboard-repair.mjs
          git diff --check

      - name: Remove temporary Flight patcher and commit tested repair
        run: |
          set -euo pipefail
          rm scripts/apply-flight-desktop-clipboard-repair.mjs
          git config user.name 'td613-flight-bot'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --check
          git commit -m 'Preserve Flight desktop clipboard line breaks'
          git push origin HEAD:"${{ github.event.pull_request.head.ref }}"
