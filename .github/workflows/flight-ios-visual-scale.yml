name: Flight Retire Failed iOS Visual Scale Shim

on:
  push:
    branches:
      - main
    paths:
      - scripts/patch-td613-flight-ios-visual-scale.mjs
      - .github/workflows/flight-ios-visual-scale.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: flight-ios-visual-scale-${{ github.ref }}
  cancel-in-progress: true

jobs:
  apply:
    name: Remove failed PR87 visual-scale shim
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Remove failed visual-scale input shim
        run: node scripts/patch-td613-flight-ios-visual-scale.mjs

      - name: Verify failed shim is absent
        run: |
          ! grep -q 'PR87_SENTINEL TD613 Flight iOS visual-scale input shim' app/safe-harbor/td613-flight.html
          ! grep -q -- '--flight-ios-visual-scale' app/safe-harbor/td613-flight.html
          ! grep -q 'transform: scale(.5625)' app/safe-harbor/td613-flight.html
          ! grep -q 'TD613_FLIGHT_IOS_INPUT_GUARD' app/safe-harbor/td613-flight.html
          ! grep -q 'scrollIntoView' app/safe-harbor/td613-flight.html

      - name: Commit restored Flight HTML
        run: |
          if git diff --quiet -- app/safe-harbor/td613-flight.html scripts/patch-td613-flight-mobile-pr85-final.mjs; then
            echo 'Failed visual-scale shim already absent.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add app/safe-harbor/td613-flight.html scripts/patch-td613-flight-mobile-pr85-final.mjs
          git commit -m 'revert(flight): remove failed iOS visual-scale shim from Flight page [skip ci]'
          git push

      - name: Shim removal summary
        if: always()
        run: |
          {
            echo '## Flight visual-scale shim retired'
            echo ''
            echo '- Removes the failed PR87 visual-scale block.'
            echo '- Leaves PR85 mobile layout intact.'
            echo '- No replacement scaling, no scrollIntoView, no global input override.'
          } >> "$GITHUB_STEP_SUMMARY"
