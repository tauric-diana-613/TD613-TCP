name: Flight Focus Stability Micro Patch

on:
  push:
    branches:
      - main
    paths:
      - scripts/patch-td613-flight-ios-visual-scale.mjs
      - .github/workflows/flight-ios-visual-scale.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: flight-focus-stability-${{ github.ref }}
  cancel-in-progress: true

jobs:
  apply:
    name: Apply PR88 focus stability micro patch
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Apply focus-stability micro patch
        run: node scripts/patch-td613-flight-ios-visual-scale.mjs

      - name: Verify PR88 and absence of failed shims
        run: |
          grep -q 'PR88_SENTINEL TD613 Flight focus stability micro patch' app/safe-harbor/td613-flight.html
          ! grep -q 'PR87_SENTINEL TD613 Flight iOS visual-scale input shim' app/safe-harbor/td613-flight.html
          ! grep -q -- '--flight-ios-visual-scale' app/safe-harbor/td613-flight.html
          ! grep -q 'transform: scale(.5625)' app/safe-harbor/td613-flight.html
          ! grep -q 'function prepNoZoom' app/safe-harbor/td613-flight.html
          ! grep -q 'data-td613-prev-font' app/safe-harbor/td613-flight.html
          ! grep -q 'TD613_FLIGHT_IOS_INPUT_GUARD' app/safe-harbor/td613-flight.html
          ! grep -q 'scrollIntoView' app/safe-harbor/td613-flight.html

      - name: Commit patched Flight HTML
        run: |
          if git diff --quiet -- app/safe-harbor/td613-flight.html scripts/patch-td613-flight-mobile-pr85-final.mjs; then
            echo 'PR88 focus-stability patch already applied.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add app/safe-harbor/td613-flight.html scripts/patch-td613-flight-mobile-pr85-final.mjs
          git commit -m 'fix(flight): apply focus-stable textarea micro patch'
          git push

      - name: PR88 summary
        if: always()
        run: |
          {
            echo '## Flight PR88 focus stability micro patch'
            echo ''
            echo '- Removes the touch/focus font-size mutation that caused the visible text pop.'
            echo '- Restores textarea width/height to PR85 dimensions.'
            echo '- Compacts the payload stepper only.'
            echo '- No transform scaling, no global input override, no scrollIntoView.'
            echo '- Commit intentionally avoids skip-ci so GitHub Pages can update.'
          } >> "$GITHUB_STEP_SUMMARY"
