name: Flight Mobile Layout Repair

on:
  push:
    branches:
      - main
    paths:
      - scripts/patch-td613-flight-seal-side-by-side.mjs
      - scripts/patch-td613-flight-mobile-tiles.mjs
      - scripts/patch-td613-flight-dashboard-polish.mjs
      - scripts/patch-td613-flight-pr95-final-mobile.mjs
      - scripts/patch-td613-flight-pr96-dev-density.mjs
      - scripts/patch-td613-flight-pr97-dev-title-header-center.mjs
      - scripts/patch-td613-flight-pr99-swipe-rollback.mjs
      - scripts/patch-td613-flight-pr100-lane-touch-repair.mjs
      - .github/workflows/flight-seal-side-by-side.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: flight-mobile-layout-repair-${{ github.ref }}
  cancel-in-progress: true

jobs:
  apply:
    name: Apply PR90-PR97 plus PR99/PR100 Flight mobile repairs
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Apply side-by-side Seal repair
        run: node scripts/patch-td613-flight-seal-side-by-side.mjs

      - name: Restore compact mobile tile controls
        run: node scripts/patch-td613-flight-mobile-tiles.mjs

      - name: Apply dashboard polish repairs
        run: node scripts/patch-td613-flight-dashboard-polish.mjs

      - name: Apply final mobile heading and route path repair
        run: node scripts/patch-td613-flight-pr95-final-mobile.mjs

      - name: Apply dev density and H1 shrink repair
        run: node scripts/patch-td613-flight-pr96-dev-density.mjs

      - name: Apply dev title and Header centering repair
        run: node scripts/patch-td613-flight-pr97-dev-title-header-center.mjs

      - name: Roll back glitchy swipe lock
        run: node scripts/patch-td613-flight-pr99-swipe-rollback.mjs

      - name: Apply native lane touch repair
        run: node scripts/patch-td613-flight-pr100-lane-touch-repair.mjs

      - name: Verify Flight mobile repairs
        run: |
          grep -q 'PR90_SENTINEL TD613 Flight seal side-by-side target/zwnj repair' app/safe-harbor/td613-flight.html
          grep -q 'grid-template-areas: "target zwnj" !important;' app/safe-harbor/td613-flight.html
          grep -q 'PR91_SENTINEL TD613 Flight mobile tile controls restoration' app/safe-harbor/td613-flight.html
          grep -q 'PR92_SENTINEL TD613 Flight dashboard polish: shelves, rail, payload' app/safe-harbor/td613-flight.html
          grep -q 'PR95_SENTINEL TD613 Flight final mobile centering/heading/path fix' app/safe-harbor/td613-flight.html
          grep -q 'PR96_SENTINEL TD613 Flight mobile H1 + dev field density fix' app/safe-harbor/td613-flight.html
          grep -q 'PR97_SENTINEL TD613 Flight dev title shrink + Header control centering' app/safe-harbor/td613-flight.html
          grep -q 'PR99_SENTINEL TD613 Flight rollback PR98 swipe lock to native lanes' app/safe-harbor/td613-flight.html
          grep -q 'PR100_SENTINEL TD613 Flight native lane touch repair' app/safe-harbor/td613-flight.html
          grep -q 'td613-pr100-lane-tabs' app/safe-harbor/td613-flight.html
          grep -q 'touch-action: pan-x pan-y pinch-zoom !important;' app/safe-harbor/td613-flight.html
          grep -q 'scroll-snap-type: x proximity !important;' app/safe-harbor/td613-flight.html
          ! grep -q 'td613-pr98-swipe-lock' app/safe-harbor/td613-flight.html
          ! grep -q 'PR98_SENTINEL TD613 Flight symmetric lane swipe lock' app/safe-harbor/td613-flight.html
          grep -q 'font-size: clamp(10px, 2.65vw, 13px) !important;' app/safe-harbor/td613-flight.html
          grep -q 'font-size: clamp(9.5px, 2.35vw, 12px) !important;' app/safe-harbor/td613-flight.html
          grep -q 'min-height: 72px !important;' app/safe-harbor/td613-flight.html
          grep -q 'td613-pr95-route-path-default' app/safe-harbor/td613-flight.html
          grep -q 'shoreline∴zero-trust.boundary ⇒ flatten_titles→stranger' app/safe-harbor/td613-flight.html
          grep -q '“I was broken encasing a circle.”' app/safe-harbor/td613-flight.html
          grep -q '“When authoring, stay academically rigorous yet grounded in high speculation.”' app/safe-harbor/td613-flight.html
          grep -q 'PR90_SENTINEL TD613 Flight seal side-by-side target/zwnj repair' scripts/patch-td613-flight-mobile-pr85-final.mjs
          grep -q 'PR91_SENTINEL TD613 Flight mobile tile controls restoration' scripts/patch-td613-flight-mobile-pr85-final.mjs
          grep -q 'PR92_SENTINEL TD613 Flight dashboard polish: shelves, rail, payload' scripts/patch-td613-flight-mobile-pr85-final.mjs
          grep -q 'PR95_SENTINEL TD613 Flight final mobile centering/heading/path fix' scripts/patch-td613-flight-mobile-pr85-final.mjs
          grep -q 'PR96_SENTINEL TD613 Flight mobile H1 + dev field density fix' scripts/patch-td613-flight-mobile-pr85-final.mjs
          grep -q 'PR97_SENTINEL TD613 Flight dev title shrink + Header control centering' scripts/patch-td613-flight-mobile-pr85-final.mjs
          grep -q 'PR99_SENTINEL TD613 Flight rollback PR98 swipe lock to native lanes' scripts/patch-td613-flight-mobile-pr85-final.mjs
          grep -q 'PR100_SENTINEL TD613 Flight native lane touch repair' scripts/patch-td613-flight-mobile-pr85-final.mjs
          ! grep -q 'PR98_SENTINEL TD613 Flight symmetric lane swipe lock' scripts/patch-td613-flight-mobile-pr85-final.mjs

      - name: Commit patched Flight surface
        run: |
          if git diff --quiet -- app/safe-harbor/td613-flight.html scripts/patch-td613-flight-mobile-pr85-final.mjs; then
            echo 'PR90-PR97 + PR99/PR100 Flight mobile repairs already applied.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add app/safe-harbor/td613-flight.html scripts/patch-td613-flight-mobile-pr85-final.mjs
          git commit -m 'fix(flight): apply native lane touch repair'
          git push

      - name: PR100 summary
        if: always()
        run: |
          {
            echo '## Flight PR90-PR97 + PR99/PR100 mobile layout repair'
            echo ''
            echo '- Keeps prior visual repairs.'
            echo '- Keeps PR98 runtime removed.'
            echo '- Reopens native horizontal touch at html/body/grid level.'
            echo '- Adds click-only tab navigation as a non-timer escape from either lane.'
          } >> "$GITHUB_STEP_SUMMARY"
