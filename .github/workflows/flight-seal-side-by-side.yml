name: Flight Mobile Layout Repair

on:
  push:
    branches:
      - main
    paths:
      - scripts/patch-td613-flight-seal-side-by-side.mjs
      - scripts/patch-td613-flight-mobile-tiles.mjs
      - .github/workflows/flight-seal-side-by-side.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: flight-mobile-layout-repair-${{ github.ref }}
  cancel-in-progress: true

jobs:
  apply:
    name: Apply PR90/PR91 Flight mobile layout repairs
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Apply side-by-side Seal repair
        run: node scripts/patch-td613-flight-seal-side-by-side.mjs

      - name: Restore compact mobile tile controls
        run: node scripts/patch-td613-flight-mobile-tiles.mjs

      - name: Verify Flight mobile repairs
        run: |
          grep -q 'PR90_SENTINEL TD613 Flight seal side-by-side target/zwnj repair' app/safe-harbor/td613-flight.html
          grep -q 'grid-template-areas: "target zwnj" !important;' app/safe-harbor/td613-flight.html
          grep -q 'PR91_SENTINEL TD613 Flight mobile tile controls restoration' app/safe-harbor/td613-flight.html
          grep -q 'font-size: 7px !important;' app/safe-harbor/td613-flight.html
          grep -q 'width: 9px !important;' app/safe-harbor/td613-flight.html
          grep -q 'grid-column: auto !important;' app/safe-harbor/td613-flight.html
          grep -q 'PR90_SENTINEL TD613 Flight seal side-by-side target/zwnj repair' scripts/patch-td613-flight-mobile-pr85-final.mjs
          grep -q 'PR91_SENTINEL TD613 Flight mobile tile controls restoration' scripts/patch-td613-flight-mobile-pr85-final.mjs

      - name: Commit patched Flight surface
        run: |
          if git diff --quiet -- app/safe-harbor/td613-flight.html scripts/patch-td613-flight-mobile-pr85-final.mjs; then
            echo 'PR90/PR91 Flight mobile layout repairs already applied.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add app/safe-harbor/td613-flight.html scripts/patch-td613-flight-mobile-pr85-final.mjs
          git commit -m 'fix(flight): apply compact mobile tile and seal layout repairs'
          git push

      - name: PR91 summary
        if: always()
        run: |
          {
            echo '## Flight PR90/PR91 mobile layout repair'
            echo ''
            echo '- Keeps Target Word and ZWNJ Behavior side-by-side.'
            echo '- Restores prompt controls as two-column tiles.'
            echo '- Compacts section notes, tile font, custom inputs, and checkbox scale.'
            echo '- Commits patched HTML so GitHub Pages and Vercel serve the same surface.'
          } >> "$GITHUB_STEP_SUMMARY"
