name: Flight Sync Vercel to Pages Surface

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/flight-sync-vercel-to-pages.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: flight-sync-vercel-to-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync:
    name: Apply existing PR85 Flight mobile surface
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Apply existing TD613 Flight PR85 final repair
        run: node scripts/patch-td613-flight-mobile-pr85-final.mjs

      - name: Verify Flight surface markers
        run: |
          grep -q 'PR85_FINAL_SENTINEL TD613 Flight mobile repair' app/safe-harbor/td613-flight.html
          grep -q 'SAFE HARBOR ISSUE' app/safe-harbor/td613-flight.html
          grep -q 'td613-flight-pr85-final-script' app/safe-harbor/td613-flight.html

      - name: Commit Flight surface sync
        run: |
          if git diff --quiet -- app/safe-harbor/td613-flight.html; then
            echo 'Flight HTML already matches PR85 final surface.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add app/safe-harbor/td613-flight.html
          git commit -m 'fix(flight): sync Vercel surface to PR85 final Flight layout [skip ci]'
          git push

      - name: Sync summary
        if: always()
        run: |
          {
            echo '## Flight Surface Sync'
            echo ''
            echo '- Applies the existing PR85 final TD613 Flight mobile repair script.'
            echo '- Does not apply the rejected PR86 16px global input guard.'
            echo '- Goal: make Vercel serve the same Flight surface as the GitHub Pages version.'
          } >> "$GITHUB_STEP_SUMMARY"
