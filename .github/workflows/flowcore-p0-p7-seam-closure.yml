name: Flow-Core P0-P7 Seam Closure

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'app/dome-world/docs/FLOWCORE_PEDAGOGUE_P*_IMPLEMENTATION_RECEIPT_V0_1.md'
      - 'app/dome-world/docs/FLOWCORE_P0_P7_SEAM_CLOSURE_LEDGER_V0_1.md'
      - 'app/dome-world/fixtures/pedagogue/baselines/**'
      - 'tests/flowcore-p0-p7-seam-closure.test.mjs'
      - '.github/workflows/flowcore-p0-p7-seam-closure.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  closure-contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - name: Run P0-P7 seam closure contracts
        run: node --test tests/flowcore-p0-p7-seam-closure.test.mjs
      - name: Re-run Flow-Core P1-P7 contracts
        run: |
          node --test tests/flowcore-pedagogue-core.test.mjs
          node --test tests/flowcore-pedagogue-aia.test.mjs
          node --test tests/flowcore-pedagogue-visual.test.mjs
          node --test tests/information-dome-scenes.test.mjs
          node --test tests/flowcore-route-burden.test.mjs
          node --test tests/ash-pedagogue-custody-route.test.mjs
          node --test tests/flowcore-station-propagation.test.mjs
      - name: Assert closure packet changes no runtime or serverless law
        shell: bash
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          if [[ -z "$BASE_SHA" ]]; then
            BASE_SHA="$(git rev-parse origin/main)"
          fi
          CHANGED="$(git diff --name-only "$BASE_SHA" "${{ github.sha }}")"
          if grep -Eq '^(api/|vercel\.json$|app/engine/ash-lifecycle\.js|app/dome-world/ash/canonical-json\.js|app/engine/flowcore-pedagogue-core\.js)' <<< "$CHANGED"; then
            echo 'P0-P7 seam closure may not mutate runtime, canonical, custody, or serverless law.'
            exit 1
          fi
          if grep -Eq 'p0-p7-receipt-reconcile-once|p6-case-map-delta-repair|p7-duplicate-rejection-repair' <<< "$CHANGED"; then
            echo 'Temporary repair workflow residue detected.'
            exit 1
          fi
