name: Flow-Core Pedagogue P10 Promotion Contracts

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'app/engine/flowcore-production-promotion.js'
      - 'app/dome-world/data/flowcore-promotion-config-v01.js'
      - 'app/dome-world/flowcore-promotion-dashboard*'
      - 'app/dome-world/fixtures/pedagogue/flowcore-promotion-evidence.json'
      - 'app/dome-world/schemas/flowcore-promotion-v01.schema.json'
      - 'app/dome-world/docs/FLOWCORE_PEDAGOGUE_P10_IMPLEMENTATION_RECEIPT_V0_1.md'
      - 'app/dome-world/docs/FLOWCORE_PEDAGOGUE_ROLLBACK_PROCEDURE_V0_1.md'
      - 'app/dome-world/docs/FLOWCORE_PEDAGOGUE_PROGRAM_INDEX_V0_1.md'
      - 'tests/flowcore-production-promotion.test.mjs'
      - '.github/workflows/flowcore-pedagogue-p10.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  promotion-contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - name: Run stitched P0-P7 baseline contracts
        run: node --test tests/flowcore-p0-p7-seam-closure.test.mjs
      - name: Run inherited P1-P9 contracts
        run: |
          node --test tests/flowcore-pedagogue-core.test.mjs
          node --test tests/flowcore-pedagogue-aia.test.mjs
          node --test tests/flowcore-pedagogue-visual.test.mjs
          node --test tests/information-dome-scenes.test.mjs
          node --test tests/flowcore-route-burden.test.mjs
          node --test tests/ash-pedagogue-custody-route.test.mjs
          node --test tests/flowcore-station-propagation.test.mjs
          node --test tests/flowcore-physical-scene.test.mjs
          node --test tests/flowcore-empirical-validation.test.mjs
      - name: Run P10 promotion contracts
        run: node --test tests/flowcore-production-promotion.test.mjs
      - name: Assert P10 protected files and infrastructure are unchanged
        shell: bash
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          if [[ -z "$BASE_SHA" ]]; then
            BASE_SHA="$(git rev-parse origin/main)"
          fi
          CHANGED="$(git diff --name-only "$BASE_SHA" "${{ github.sha }}")"
          if grep -Eq '^(api/|vercel\.json$|app/engine/ash-lifecycle\.js|app/dome-world/ash/canonical-json\.js|app/engine/flowcore-pedagogue-core\.js)' <<< "$CHANGED"; then
            echo 'P10 may not mutate serverless, Ash, canonical, or pedagogue core law.'
            exit 1
          fi
      - name: Re-run promotion and rollback firewalls
        run: node --test --test-name-pattern='current evidence compiles|rollback preserves|rollback rejects|rejects missing artifacts|runtime state requires|production state additionally|merge or deployment flags' tests/flowcore-production-promotion.test.mjs
