name: Flow-Core Replay Production Witness Once

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/flowcore-replay-production-witness-once.yml'
      - 'scripts/flowcore-runtime-browser-probe.mjs'
      - 'scripts/flowcore-release-content-probe.mjs'
      - 'tests/flowcore-runtime-browser-probe.test.mjs'

permissions:
  contents: read

env:
  TD613_BASE_URL: https://td613.com
  TD613_SOURCE_PACKET_COMMIT: a127e26f3621924be808918830c0ec196e8b2856

jobs:
  exact-source:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - name: Verify observer contracts
        run: node --test tests/flowcore-runtime-browser-probe.test.mjs tests/flowcore-production-observation.test.mjs
      - name: Observe deployed source parity
        env:
          TD613_ARTIFACT_DIR: artifacts/flowcore-replay-source
          TD613_PROBE_ATTEMPTS: '3'
          TD613_PROBE_DELAY_MS: '2000'
        run: node scripts/flowcore-release-content-probe.mjs
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flowcore-replay-source-evidence
          path: artifacts/flowcore-replay-source/
          if-no-files-found: warn
          retention-days: 45

  browser:
    name: ${{ matrix.browser }} Replay production witness
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - name: Verify observer contracts
        run: node --test tests/flowcore-runtime-browser-probe.test.mjs
      - name: Install bounded browser runtime
        run: |
          npm install --no-save --package-lock=false playwright@1.53.2
          npx playwright install --with-deps ${{ matrix.browser }}
      - name: Observe deployed Flow-Core with Replay synchronization
        env:
          TD613_FLOWCORE_ROUTE_PREFIX: dome-world
          TD613_BROWSERS: ${{ matrix.browser }}
          TD613_PRODUCTION_OBSERVATION: 'true'
          TD613_ARTIFACT_DIR: artifacts/flowcore-replay-${{ matrix.browser }}
        run: node scripts/flowcore-runtime-browser-probe.mjs
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flowcore-replay-${{ matrix.browser }}-evidence
          path: artifacts/flowcore-replay-${{ matrix.browser }}/
          if-no-files-found: warn
          retention-days: 45
