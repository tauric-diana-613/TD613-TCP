name: Hush Phase 13

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'app/data/hush-phase13-mask-fidelity-profiles.js'
      - 'app/engine/hush-phase13-profile-fidelity-gate.js'
      - 'scripts/run-hush-phase13-fidelity-audit.mjs'
      - 'tests/hush-phase13-*.test.mjs'
      - 'docs/hush/PHASE_13_*.md'
      - 'package.json'
      - '.github/workflows/hush-phase13.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  phase13:
    name: Hush Phase 13 fidelity gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - name: Phase 13 profile fidelity
        run: node tests/hush-phase13-profile-fidelity-gate.test.mjs
      - name: Phase 13 smoothness penalty
        run: node tests/hush-phase13-synthetic-perfection-penalty.test.mjs
      - name: Phase 13 native variance
        run: node tests/hush-phase13-mask-native-variance.test.mjs
      - name: Phase 13 selector rerank
        run: node tests/hush-phase13-selector-rerank.test.mjs
      - name: Phase 13 layout fidelity
        run: node tests/hush-phase13-linebreak-profile-fidelity.test.mjs
      - name: Phase 13 nonclaims
        run: node tests/hush-phase13-nonclaims.test.mjs
      - name: Phase 13 audit runner
        run: node tests/hush-phase13-audit-runner.test.mjs
      - name: Phase 13 audit command
        run: node scripts/run-hush-phase13-fidelity-audit.mjs
