name: Apply Ledger Aftercare Classification Once

on:
  pull_request:
    paths:
      - ".github/workflows/ledger-aftercare-classification-once.yml"

permissions:
  contents: write

jobs:
  repair-ledger:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: Correct pre-law deployment classification
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('docs/ASH_KEEP_BUILDOUT_LEDGER.md')
          text = path.read_text()
          old = 'Vercel release witness: SUCCESS'
          new = 'Vercel automatic aftercare status: SUCCESS (not a strategic release witness)'
          if old not in text:
              raise SystemExit('expected ledger token absent')
          path.write_text(text.replace(old, new, 1))
          PY
          rm .github/workflows/ledger-aftercare-classification-once.yml
      - name: Commit repair and remove one-shot workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/ASH_KEEP_BUILDOUT_LEDGER.md .github/workflows/ledger-aftercare-classification-once.yml
          git commit -m "Classify pre-law Vercel deployment as aftercare"
          git push origin HEAD:${GITHUB_HEAD_REF}
