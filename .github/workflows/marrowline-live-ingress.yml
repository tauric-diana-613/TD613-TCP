name: Marrowline Live Ingress

on:
  pull_request:
    paths:
      - 'api/marrowline.js'
      - 'app/engine/td613-aperture.js'
      - 'app/dome-world/marrowline*'
      - 'tests/dome-world-marrowline-station.test.mjs'
      - 'tests/marrowline-live-api.test.mjs'
      - 'vercel.json'
      - '.github/workflows/marrowline-live-ingress.yml'
  push:
    branches: [main]
    paths:
      - 'api/marrowline.js'
      - 'app/engine/td613-aperture.js'
      - 'app/dome-world/marrowline*'
      - 'tests/dome-world-marrowline-station.test.mjs'
      - 'tests/marrowline-live-api.test.mjs'
      - 'vercel.json'

permissions:
  contents: read

jobs:
  live-ingress:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Test canonical Aperture Marrowline
        run: node tests/td613-aperture.test.mjs
      - name: Test Dome-World Marrowline station
        run: node tests/dome-world-marrowline-station.test.mjs
      - name: Test live ingress endpoint
        run: node tests/marrowline-live-api.test.mjs
