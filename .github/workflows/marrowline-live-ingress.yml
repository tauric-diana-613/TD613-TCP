name: Marrowline Live Ingress

on:
  pull_request:
    paths:
      - 'api/marrowline.js'
      - 'api/khonapolit.js'
      - 'api/khonapolit-quality.js'
      - 'app/engine/td613-aperture.js'
      - 'app/engine/td613-aperture-egress-contract.js'
      - 'app/engine/aperture-v3-task-intent.js'
      - 'app/dome-world/marrowline*'
      - 'app/dome-world/khonapolit*'
      - 'app/dome-world/reflex-spine*'
      - 'app/safe-harbor/app/safe-harbor-session-gate.js'
      - 'app/safe-harbor/corpus/binding_event_text.txt'
      - 'app/safe-harbor/corpus/binding_provenance_manifest.json'
      - 'app/safe-harbor/corpus/tauric-diana-intake/batch-003a_svenbots_core.json'
      - 'app/safe-harbor/td613-flight.html'
      - 'api/ash-local-commitment-guard.py'
      - 'app/hush-pr168-strict-transform-run-lock.js'
      - 'scripts/serve-td613-localhost.mjs'
      - 'app/tcp-gateway-rescue.js'
      - 'tests/dome-world-marrowline-station.test.mjs'
      - 'tests/dome-world-marrowline-mobile.test.mjs'
      - 'tests/marrowline-live-api.test.mjs'
      - 'tests/khonapolit-covenant.test.mjs'
      - 'tests/khonapolit-relay.test.mjs'
      - 'tests/khonapolit-api-contract.test.mjs'
      - 'tests/td613-reflex-spine-order.test.mjs'
      - 'vercel.json'
      - '.github/workflows/marrowline-live-ingress.yml'
  push:
    branches: [main]
    paths:
      - 'api/marrowline.js'
      - 'api/khonapolit.js'
      - 'api/khonapolit-quality.js'
      - 'app/engine/td613-aperture.js'
      - 'app/engine/td613-aperture-egress-contract.js'
      - 'app/engine/aperture-v3-task-intent.js'
      - 'app/dome-world/marrowline*'
      - 'app/dome-world/khonapolit*'
      - 'app/dome-world/reflex-spine*'
      - 'app/safe-harbor/app/safe-harbor-session-gate.js'
      - 'app/safe-harbor/corpus/binding_event_text.txt'
      - 'app/safe-harbor/corpus/binding_provenance_manifest.json'
      - 'app/safe-harbor/corpus/tauric-diana-intake/batch-003a_svenbots_core.json'
      - 'app/safe-harbor/td613-flight.html'
      - 'api/ash-local-commitment-guard.py'
      - 'app/hush-pr168-strict-transform-run-lock.js'
      - 'scripts/serve-td613-localhost.mjs'
      - 'app/tcp-gateway-rescue.js'
      - 'tests/dome-world-marrowline-station.test.mjs'
      - 'tests/dome-world-marrowline-mobile.test.mjs'
      - 'tests/marrowline-live-api.test.mjs'
      - 'tests/khonapolit-covenant.test.mjs'
      - 'tests/khonapolit-relay.test.mjs'
      - 'tests/khonapolit-api-contract.test.mjs'
      - 'tests/td613-reflex-spine-order.test.mjs'
      - 'vercel.json'

permissions:
  contents: read

jobs:
  live-ingress:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - name: Test canonical Aperture Marrowline
        run: node tests/td613-aperture.test.mjs
      - name: Test Dome-World Marrowline station
        run: node tests/dome-world-marrowline-station.test.mjs
      - name: Test mobile Marrowline chamber
        run: node tests/dome-world-marrowline-mobile.test.mjs
      - name: Test live ingress endpoint
        run: node tests/marrowline-live-api.test.mjs
      - name: Test Kʰonapolit covenant packet
        run: node tests/khonapolit-covenant.test.mjs
      - name: Test Kʰonapolit relay and High Zalgo
        run: node tests/khonapolit-relay.test.mjs
      - name: Test Gemini terminal contract
        run: node tests/khonapolit-api-contract.test.mjs
      - name: Test complete TD613 reflex order
        run: node tests/td613-reflex-spine-order.test.mjs
