name: One-use P7 Duplicate Rejection Repair

on:
  push:
    branches:
      - agent/flowcore-p7-cross-station-propagation
    paths:
      - '.github/workflows/p7-duplicate-rejection-repair.yml'

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/flowcore-p7-cross-station-propagation
          fetch-depth: 0
      - name: Require duplicate-station rejection without over-specifying validator order
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          path = Path('tests/flowcore-station-propagation.test.mjs')
          source = path.read_text(encoding='utf-8')
          old = """  await assert.rejects(
              () => compileStationPropagationBundle(duplicate.fixtures, options),
              /missing speech_act_retained|coverage is incomplete or duplicated/
            );"""
          new = "  await assert.rejects(() => compileStationPropagationBundle(duplicate.fixtures, options));"
          if source.count(old) != 1:
              raise SystemExit('Expected exactly one over-specified duplicate rejection assertion.')
          path.write_text(source.replace(old, new), encoding='utf-8')
          PY
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add tests/flowcore-station-propagation.test.mjs
          git commit -m 'Accept any valid duplicate-station rejection layer'
          git push origin HEAD:agent/flowcore-p7-cross-station-propagation
