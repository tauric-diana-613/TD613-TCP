name: Test and deploy static app
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm install
      - run: npm test
  deploy:
    needs: test
    if: github.event_name != 'pull_request'
    environment:
      name: github-pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply Flight Seal side-by-side repair
        run: node scripts/patch-td613-flight-seal-side-by-side.mjs
      - name: Restore mobile tile controls
        run: node scripts/patch-td613-flight-mobile-tiles.mjs
      - name: Verify Flight mobile surface
        run: |
          test -f app/safe-harbor/td613-flight.html
          grep -q 'PR85_FINAL_SENTINEL TD613 Flight mobile repair' app/safe-harbor/td613-flight.html
          grep -q 'PR88_SENTINEL TD613 Flight focus stability micro patch' app/safe-harbor/td613-flight.html
          grep -q 'PR89_SENTINEL TD613 Flight seal layout + payload micro patch' app/safe-harbor/td613-flight.html
          grep -q 'PR90_SENTINEL TD613 Flight seal side-by-side target/zwnj repair' app/safe-harbor/td613-flight.html
          grep -q 'PR91_SENTINEL TD613 Flight mobile tile controls restoration' app/safe-harbor/td613-flight.html
          grep -q 'grid-template-areas: "target zwnj" !important;' app/safe-harbor/td613-flight.html
          grep -q 'grid-template-columns: repeat(2, minmax(0, 1fr)) !important;' app/safe-harbor/td613-flight.html
          ! grep -q 'function prepNoZoom' app/safe-harbor/td613-flight.html
          ! grep -q 'data-td613-prev-font' app/safe-harbor/td613-flight.html
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./app
      - id: deployment
        uses: actions/deploy-pages@v4
