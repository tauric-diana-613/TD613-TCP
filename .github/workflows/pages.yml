name: Test and deploy static app
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm install
      - run: npm test
  deploy:
    needs: test
    if: github.event_name != 'pull_request'
    environment:
      name: github-pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: node scripts/patch-td613-flight-mobile.mjs
      - run: node scripts/patch-td613-flight-mobile-pr80.mjs
      - run: node scripts/patch-td613-flight-mobile-pr81.mjs
      - run: node scripts/patch-td613-flight-mobile-pr82.mjs
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./app
      - id: deployment
        uses: actions/deploy-pages@v4
