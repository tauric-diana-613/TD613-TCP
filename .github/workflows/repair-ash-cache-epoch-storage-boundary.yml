name: Repair Ash Cache Epoch Storage Boundary

on:
  push:
    branches:
      - hotfix/ash-live-ingress-demos-cache
    paths:
      - scripts/repair-ash-cache-epoch-storage-boundary.mjs
      - .github/workflows/repair-ash-cache-epoch-storage-boundary.yml

permissions:
  contents: write

concurrency:
  group: repair-ash-cache-epoch-storage-boundary
  cancel-in-progress: false

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: hotfix/ash-live-ingress-demos-cache
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Apply maintenance-key repair
        run: node scripts/repair-ash-cache-epoch-storage-boundary.mjs
      - name: Verify closure contracts and deployment law
        run: |
          node --check scripts/ash-keep-production-probe.mjs
          node tests/ash-keep-production-closure-contract.test.mjs
          node tests/ash-live-ingress-demos-cache.test.mjs
          node tests/vercel-deploy-hygiene.test.mjs
      - name: Commit repaired witness
        run: |
          git config user.name "td613-closure-witness"
          git config user.email "actions@users.noreply.github.com"
          git add scripts/ash-keep-production-probe.mjs tests/ash-keep-production-closure-contract.test.mjs scripts/repair-ash-cache-epoch-storage-boundary.mjs .github/workflows/repair-ash-cache-epoch-storage-boundary.yml
          git commit -m "Permit cache epoch as maintenance-only storage"
          git push origin HEAD:hotfix/ash-live-ingress-demos-cache
