name: Resolve PR123 and PR124 conflicts

on:
  push:
    branches: [ main ]
    paths:
      - .github/workflows/resolve-pr-123-124.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  resolve:
    if: github.repository == 'tauric-diana-613/TD613-TCP'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Rewrite PR branches onto current main with resolved changes
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main codex/fix-seal-panel-in-td613-flight-5b8qgi codex/fix-iphone-safari-vertical-scroll-issue-2wwmxx

          python3 <<'PY'
          from pathlib import Path
          import subprocess

          REPO = Path.cwd()
          FLIGHT = REPO / 'app/safe-harbor/td613-flight.html'
          MOBILE_TEST = REPO / 'tests/td613-flight-mobile-layout.test.mjs'

          def sh(*args):
              subprocess.run(args, check=True)

          def checkout_branch(branch):
              sh('git', 'checkout', '-B', branch, 'origin/main')

          def commit_and_push(branch, message):
              sh('git', 'add', 'app/safe-harbor/td613-flight.html', 'tests/td613-flight-mobile-layout.test.mjs')
              diff = subprocess.run(['git', 'diff', '--cached', '--quiet'])
              if diff.returncode == 0:
                  print(f'{branch}: no changes to commit')
              else:
                  sh('git', 'commit', '-m', message)
              sh('git', 'push', '--force-with-lease', 'origin', branch)

          def patch_pr123():
              branch = 'codex/fix-seal-panel-in-td613-flight-5b8qgi'
              checkout_branch(branch)
              html = FLIGHT.read_text(encoding='utf-8')
              if 'PR168_SENTINEL definitive Seal spacing panel repair' not in html:
                  pr168_css = '''

/* PR168_SENTINEL definitive Seal spacing panel repair.
   This must come after the older PR90/PR91 mobile/coarse-pointer patches because those
   patches assign section-split children by nth-child and grid-template-areas. */
.flight-lane-output .seal-card .seal-spacing-grid {
  display: grid !important;
  grid-template-columns: minmax(0, .86fr) minmax(0, 1.14fr) !important;
  grid-template-areas: "target zwnj" !important;
  align-items: stretch !important;
  gap: .46rem !important;
  margin-top: .08rem;
}

.flight-lane-output .seal-card .seal-spacing-grid > div {
  min-width: 0 !important;
  align-self: stretch !important;
  margin-top: 0 !important;
  transform: none !important;
  -webkit-transform: none !important;
}

.flight-lane-output .seal-card .seal-target-panel {
  grid-area: target !important;
}

.flight-lane-output .seal-card .seal-zwnj-panel {
  grid-area: zwnj !important;
}

.flight-lane-output .seal-card .seal-target-panel input#sealTargetWord {
  width: 100% !important;
  max-width: 100% !important;
}

@media (max-width: 520px) {
  .flight-lane-output .seal-card .seal-spacing-grid {
    grid-template-columns: 1fr !important;
    grid-template-areas: "target" "zwnj" !important;
  }
}
'''
                  anchor = '''@media (max-width: 820px) {
  .flight-lane-output .seal-card .seal-spacing-grid {
    grid-template-columns: 1fr;
  }
}
'''
                  if anchor not in html:
                      raise RuntimeError('PR123 anchor missing')
                  html = html.replace(anchor, anchor + pr168_css, 1)
                  FLIGHT.write_text(html, encoding='utf-8')

              test = MOBILE_TEST.read_text(encoding='utf-8')
              if 'PR168_SENTINEL definitive Seal spacing panel repair' not in test:
                  first = "assert(html.includes('Append lozenge + SAC'));\n"
                  additions = """assert(html.includes('PR168_SENTINEL definitive Seal spacing panel repair'));
assert(html.includes('grid-template-areas: \"target zwnj\" !important'));
assert(html.includes('.flight-lane-output .seal-card .seal-target-panel'));
assert(html.includes('.flight-lane-output .seal-card .seal-zwnj-panel'));
assert(html.indexOf('PR90_SENTINEL TD613 Flight seal side-by-side target/zwnj repair') < html.indexOf('PR168_SENTINEL definitive Seal spacing panel repair'));
assert(html.indexOf('PR91_SENTINEL TD613 Flight mobile tile controls restoration') < html.indexOf('PR168_SENTINEL definitive Seal spacing panel repair'));
"""
                  if first not in test:
                      raise RuntimeError('PR123 test anchor missing')
                  test = test.replace(first, first + additions, 1)
              if "<div class=\"seal-target-panel\">') < html.indexOf('<div class=\"seal-zwnj-panel\">" not in test:
                  second = "assert(html.indexOf('<div class=\"card output-card\">') < html.indexOf('<div class=\"card seal-card\">'));\n"
                  if second not in test:
                      raise RuntimeError('PR123 order anchor missing')
                  test = test.replace(second, second + "assert(html.indexOf('<div class=\"seal-target-panel\">') < html.indexOf('<div class=\"seal-zwnj-panel\">'));\n", 1)
              MOBILE_TEST.write_text(test, encoding='utf-8')
              commit_and_push(branch, 'Resolve PR123 against current main')

          def patch_pr124():
              branch = 'codex/fix-iphone-safari-vertical-scroll-issue-2wwmxx'
              checkout_branch(branch)
              html = FLIGHT.read_text(encoding='utf-8')

              html = html.replace(''' .card {
  content-visibility: auto;
  contain-intrinsic-size: 260px;
}
''', ''' .card {
  content-visibility: visible;
}
''', 1) if ''' .card {
  content-visibility: auto;
  contain-intrinsic-size: 260px;
}
''' in html else html

              html = html.replace('''.card {
  content-visibility: auto;
  contain-intrinsic-size: 260px;
}
''', '''.card {
  content-visibility: visible;
}
''', 1)

              if 'function preloadFlightPage()' not in html:
                  anchor = '''  function textScrollTarget(target) {
    return target && target.closest && target.closest('textarea, .output, #taskText, .code-output, .json-output');
  }
'''
                  preload = '''
  function preloadFlightPage() {
    if (!mobile()) return;
    document.querySelectorAll('.flight-lane .card, .flight-lane .output-card, .flight-lane .seal-card, .flight-lane .copy-bin-card, .flight-lane textarea, .flight-lane input, .flight-lane button').forEach(function (el) {
      if (el && el.style) {
        el.style.setProperty('content-visibility', 'visible', 'important');
      }
    });
    var prompt = q('.flight-lane-prompt');
    var output = q('.flight-lane-output');
    if (prompt) void prompt.offsetHeight;
    if (output) void output.offsetHeight;
    document.querySelectorAll('.copy-chip').forEach(function (chip) { void chip.offsetHeight; });
  }
'''
                  if anchor not in html:
                      raise RuntimeError('PR124 preload anchor missing')
                  html = html.replace(anchor, anchor + preload, 1)

              html = html.replace('''    syncTabs(laneName());
    clearTransforms();
    settleGridHeight();
''', '''    syncTabs(laneName());
    clearTransforms();
    preloadFlightPage();
    settleGridHeight();
''', 1)

              html = html.replace("""    window.addEventListener('pageshow', settleGridHeight, { passive: true });
""", """    window.addEventListener('load', function () { preloadFlightPage(); settleGridHeight(); }, { passive: true });
    window.addEventListener('pageshow', function () { preloadFlightPage(); settleGridHeight(); }, { passive: true });
""", 1)

              if "window.TD613FlightPR78Disabled = true;" not in html:
                  html = html.replace('''<script id="td613-flight-pr78-absolute-mobile-lane-script">
(function () {
''', '''<script id="td613-flight-pr78-absolute-mobile-lane-script">
window.TD613FlightPR78Disabled = true;
(function () {
  if (window.TD613FlightPR78Disabled) return;
''', 1)

              FLIGHT.write_text(html, encoding='utf-8')
              commit_and_push(branch, 'Resolve PR124 against current main')

          patch_pr123()
          patch_pr124()
          PY
