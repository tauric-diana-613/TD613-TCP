name: Safe Harbor Gen3 Stage 1 final validation

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: safe-harbor-gen3-stage1-final-validation
  cancel-in-progress: true

jobs:
  validate:
    if: github.event.pull_request.head.ref == 'safe-harbor-gen3-stage1-evidence-contract'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out exact pull-request head
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Validate Stage 1 evidence contract
        run: node tests/safe-harbor-gen3-stage1-evidence-contract.test.mjs

      - name: Validate Stage 1 report constitution
        run: node tests/safe-harbor-gen3-stage1-report-contract.test.mjs

      - name: Validate Stage 1 versioned schemas
        run: node tests/safe-harbor-gen3-stage1-schema-contract.test.mjs

      - name: Validate restore gate
        run: npm run test:safe-harbor:phase9.1c

      - name: Validate current Safe Harbor authority chain
        run: npm run test:safe-harbor:current

      - name: Confirm no temporary Stage 1 mechanism remains in the feature diff
        run: |
          test ! -e scripts/apply-safe-harbor-gen3-stage1-integration.mjs
          test ! -e .github/workflows/safe-harbor-gen3-stage1-integration.yml

      - name: Scan changed Stage 1 surfaces for concrete SHIs
        run: |
          node - <<'NODE'
          const { execFileSync } = require('node:child_process');
          const { readFileSync } = require('node:fs');
          const base = process.env.GITHUB_BASE_REF || 'main';
          execFileSync('git', ['fetch', 'origin', base, '--depth=1'], { stdio: 'inherit' });
          const files = execFileSync('git', ['diff', '--name-only', `origin/${base}...HEAD`], { encoding: 'utf8' })
            .trim().split(/\r?\n/u).filter(Boolean);
          const concrete = /TD613-SH-9B07D8B-[0-9A-F]{8}/gu;
          const synthetic = 'TD613-SH-9B07D8B-A1B2C3D4';
          const violations = [];
          for (const file of files) {
            if (!/\.(?:js|mjs|json|md|html|svg|txt)$/u.test(file)) continue;
            let text;
            try { text = readFileSync(file, 'utf8'); } catch { continue; }
            for (const match of text.match(concrete) || []) {
              if (match !== synthetic) violations.push(`${file}: ${match}`);
            }
          }
          if (violations.length) {
            console.error(violations.join('\n'));
            process.exit(1);
          }
          console.log(`Concrete SHI scan passed across ${files.length} changed files; only the unmistakably synthetic fixture is present.`);
          NODE
