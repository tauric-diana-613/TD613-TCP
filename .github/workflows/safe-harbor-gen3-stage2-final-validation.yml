name: Safe Harbor Gen3 Stage 2 final validation

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: safe-harbor-gen3-stage2-final-validation
  cancel-in-progress: true

jobs:
  validate:
    if: github.event.pull_request.head.ref == 'safe-harbor-gen3-stage2-authorship-maturity-v1'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out exact pull-request head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Validate Stage 2 recurrence engine
        run: node tests/safe-harbor-gen3-stage2-authorship-maturity.test.mjs

      - name: Validate executed null and adversarial controls
        run: node tests/safe-harbor-gen3-stage2-controls.test.mjs

      - name: Validate Stage 2 native pipeline integration
        run: node tests/safe-harbor-gen3-stage2-integration.test.mjs

      - name: Validate complete Wave A contract
        run: npm run test:safe-harbor:gen3:wave-a

      - name: Validate restore gate
        run: npm run test:safe-harbor:phase9.1c

      - name: Validate current Safe Harbor authority chain
        run: npm run test:safe-harbor:current

      - name: Confirm temporary mechanisms are absent
        run: |
          test ! -e scripts/apply-safe-harbor-gen3-stage2-integration.mjs
          test ! -e .github/workflows/safe-harbor-gen3-stage2-pr-integrator.yml

      - name: Validate diff hygiene, SHI discipline, and infrastructure boundary
        run: |
          git fetch origin main
          git diff --check origin/main...HEAD
          node - <<'NODE'
          const { execFileSync } = require('node:child_process');
          const { readFileSync } = require('node:fs');
          const files = execFileSync('git', ['diff', '--name-only', 'origin/main...HEAD'], { encoding: 'utf8' })
            .trim().split(/\r?\n/u).filter(Boolean);
          const concreteShi = /TD613-SH-9B07D8B-[0-9A-F]{8}/gu;
          const syntheticShi = 'TD613-SH-9B07D8B-A1B2C3D4';
          const runtimeRawStorageKey = /["'](?:raw_text|source_text|entrant_text|window_text|prompt_text)["']\s*:/u;
          const violations = [];
          for (const file of files) {
            if (/^(?:api|functions|app\/api|netlify\/functions)\//u.test(file)) {
              violations.push(`${file}: Stage 2 may not add a serverless surface`);
            }
            if (!/\.(?:js|mjs|json|md|html|svg|txt)$/u.test(file)) continue;
            let text;
            try { text = readFileSync(file, 'utf8'); } catch { continue; }
            for (const match of text.match(concreteShi) || []) {
              if (match !== syntheticShi) violations.push(`${file}: unexpected concrete SHI ${match}`);
            }
            if (file.startsWith('app/safe-harbor/app/safe-harbor-gen3-') && runtimeRawStorageKey.test(text)) {
              violations.push(`${file}: raw-text storage key found in Gen3 runtime`);
            }
          }
          if (violations.length) {
            console.error(violations.join('\n'));
            process.exit(1);
          }
          console.log(`Stage 2 final safety scan passed across ${files.length} changed files.`);
          NODE
