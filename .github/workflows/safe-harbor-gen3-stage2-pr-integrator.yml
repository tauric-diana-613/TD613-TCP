name: Safe Harbor Gen3 Stage 2 PR integrator

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: safe-harbor-gen3-stage2-pr-integrator
  cancel-in-progress: false

jobs:
  integrate-test-and-clean:
    if: github.event.pull_request.head.ref == 'safe-harbor-gen3-stage2-authorship-maturity-v1'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out exact Stage 2 head branch
        uses: actions/checkout@v4
        with:
          ref: safe-harbor-gen3-stage2-authorship-maturity-v1
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Apply bounded Stage 2 integration patch
        run: node scripts/apply-safe-harbor-gen3-stage2-integration.mjs

      - name: Validate Stage 2 recurrence engine
        id: recurrence
        run: |
          set -o pipefail
          node tests/safe-harbor-gen3-stage2-authorship-maturity.test.mjs 2>&1 | tee /tmp/stage2-recurrence.log

      - name: Preserve bounded Stage 2 failure tail
        if: failure() && steps.recurrence.conclusion == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: safe-harbor-gen3-stage2-recurrence-failure
          path: /tmp/stage2-recurrence.log
          if-no-files-found: error
          retention-days: 7

      - name: Validate Stage 2 native pipeline integration
        run: node tests/safe-harbor-gen3-stage2-integration.test.mjs

      - name: Validate complete Wave A contract
        run: npm run test:safe-harbor:gen3:wave-a

      - name: Validate restore gate
        run: npm run test:safe-harbor:phase9.1c

      - name: Validate current Safe Harbor authority chain
        run: npm run test:safe-harbor:current

      - name: Remove branch-local temporary mechanism
        run: rm scripts/apply-safe-harbor-gen3-stage2-integration.mjs

      - name: Commit tested integration to the Stage 2 branch
        run: |
          git config user.name "td613-safe-harbor-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            app/safe-harbor/app/safe-harbor-native-finalizer.js \
            app/safe-harbor/app/safe-harbor-packet-pipeline.js \
            app/safe-harbor/app/safe-harbor-gen3-authorship-maturity.js \
            package.json \
            scripts/apply-safe-harbor-gen3-stage2-integration.mjs
          git diff --cached --check
          git commit -m "Integrate Safe Harbor Gen3 Stage 2 maturity engine"
          git push origin HEAD:safe-harbor-gen3-stage2-authorship-maturity-v1
