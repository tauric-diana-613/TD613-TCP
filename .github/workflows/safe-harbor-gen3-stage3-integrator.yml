name: Safe Harbor Gen3 Stage 3 integrator

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: safe-harbor-gen3-stage3-integrator
  cancel-in-progress: false

jobs:
  integrate-test-and-clean:
    if: startsWith(github.event.pull_request.head.ref, 'safe-harbor-gen3-stage3-temporal-bloom-provenance')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Check out exact Stage 3 head branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Normalize temporary Stage 3 source anchors
        run: |
          node --input-type=module <<'NODE'
          import fs from 'node:fs';
          const path = 'scripts/apply-safe-harbor-gen3-stage3-integration.mjs';
          let source = fs.readFileSync(path, 'utf8');
          const oldBefore = "'          <div class=\"status-pill\" id=\"ingressProgressPill\">0 / 3 lanes</div>',";
          const oldAfter = "'          <div class=\"status-pill\" id=\"ingressProgressPill\">temporal field</div>'";
          if (!source.includes(oldBefore) || !source.includes(oldAfter)) throw new Error('Temporary progress-pill patch anchor was not found.');
          source = source.replace(oldBefore, "'<div class=\"status-pill\" id=\"ingressProgressPill\">0 / 3 lanes</div>',");
          source = source.replace(oldAfter, "'<div class=\"status-pill\" id=\"ingressProgressPill\">temporal field</div>'");
          const misalignedMeta = '\n             <div class="ingress-meta" id="ingressStepMeta">No line held yet.</div>';
          const alignedMeta = '\n            <div class="ingress-meta" id="ingressStepMeta">No line held yet.</div>';
          if (!source.includes(misalignedMeta)) throw new Error('Temporary ingress metadata seam anchor was not found.');
          source = source.replace(misalignedMeta, alignedMeta);
          fs.writeFileSync(path, source);
          NODE

      - name: Apply bounded Stage 3 implementation seams
        id: implementation_patch
        run: |
          set -o pipefail
          sed -i 's/[[:space:]]\+$//' scripts/apply-safe-harbor-gen3-stage3-integration.mjs
          node scripts/apply-safe-harbor-gen3-stage3-integration.mjs 2>&1 | tee /tmp/stage3-integration.log

      - name: Apply bounded Stage 3 documentation seams
        id: documentation_patch
        if: success()
        run: |
          set -o pipefail
          sed -i 's/[[:space:]]\+$//' scripts/apply-safe-harbor-gen3-stage3-docs.mjs
          node scripts/apply-safe-harbor-gen3-stage3-docs.mjs 2>&1 | tee /tmp/stage3-docs.log

      - name: Preserve bounded Stage 3 patch diagnostics
        if: failure() && (steps.implementation_patch.conclusion == 'failure' || steps.documentation_patch.conclusion == 'failure')
        uses: actions/upload-artifact@v4
        with:
          name: safe-harbor-gen3-stage3-patch-failure
          path: |
            /tmp/stage3-integration.log
            /tmp/stage3-docs.log
          if-no-files-found: warn
          retention-days: 7

      - name: Validate Stage 3 presentation and renderer
        id: stage3_tests
        run: |
          set -o pipefail
          npm run test:safe-harbor:gen3:stage3 2>&1 | tee /tmp/stage3-tests.log

      - name: Preserve Stage 3 test diagnostics
        if: failure() && steps.stage3_tests.conclusion == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: safe-harbor-gen3-stage3-test-failure
          path: /tmp/stage3-tests.log
          if-no-files-found: error
          retention-days: 7

      - name: Validate complete Release Wave B candidate
        run: npm run test:safe-harbor:gen3:wave-b

      - name: Revalidate Research Track R boundary
        run: npm run test:safe-harbor:gen3:track-r

      - name: Revalidate restore gate
        run: npm run test:safe-harbor:phase9.1c

      - name: Revalidate current Safe Harbor authority chain
        run: npm run test:safe-harbor:current

      - name: Validate JavaScript syntax and public accessibility contracts
        run: |
          node --check app/safe-harbor/app/safe-harbor-gen3-presentation-core.js
          node --check app/safe-harbor/app/safe-harbor-temporal-bloom.js
          node --check app/safe-harbor/app/main.js
          node --check app/safe-harbor/renderers/10_TD613_PUA_Badge_Provenance_Attestation_Renderer_v7_2_1.user.js
          node tests/safe-harbor-phase9-1-ui-export-surfaces.test.mjs
          node tests/safe-harbor-phase9-1b-ui-wiring.test.mjs

      - name: Verify credential, telemetry, serverless, and changed-path hygiene
        run: |
          set -euo pipefail
          node --input-type=module <<'NODE'
          import fs from 'node:fs';
          import { execFileSync } from 'node:child_process';
          const base = 'origin/main';
          execFileSync('git', ['fetch', 'origin', 'main'], { stdio: 'inherit' });
          const files = execFileSync('git', ['diff', '--name-only', `${base}...HEAD`], { encoding: 'utf8' }).trim().split(/\r?\n/u).filter(Boolean);
          const expected = new Set([
            'app/safe-harbor/app/main.js','app/safe-harbor/index.html',
            'app/safe-harbor/renderers/10_TD613_PUA_Badge_Provenance_Attestation_Renderer_v7_2_1.user.js','package.json',
            'docs/safe-harbor/README.md','docs/safe-harbor/gen3-implementation-ledger.md','docs/safe-harbor/gen3-stage3-validation-receipt.md',
            'app/safe-harbor/app/safe-harbor-gen3-presentation-core.js','app/safe-harbor/app/safe-harbor-temporal-bloom.js',
            'app/safe-harbor/app/safe-harbor-temporal-bloom.css','tests/safe-harbor-gen3-stage3-temporal-bloom.test.mjs',
            'tests/safe-harbor-gen3-stage3-provenance.test.mjs','tests/safe-harbor-gen3-stage3-ui-contract.test.mjs',
            'tests/safe-harbor-gen3-stage3-renderer.test.mjs','scripts/apply-safe-harbor-gen3-stage3-integration.mjs',
            'scripts/apply-safe-harbor-gen3-stage3-docs.mjs'
          ]);
          const unexpected = files.filter((file) => !expected.has(file));
          if (unexpected.length) throw new Error(`Unexpected Stage 3 changed path:\n${unexpected.join('\n')}`);
          const governed = files.filter((file) => /\.(?:js|mjs|json|md|html|css|svg)$/u.test(file) && fs.existsSync(file));
          const concrete = /TD613-SH-9B07D8B-[0-9A-F]{8}/gu;
          const synthetic = new Set(['TD613-SH-9B07D8B-A1B2C3D4', 'TD613-SH-9B07D8B-FFEEDDCC']);
          const shiViolations = [];
          for (const file of governed) for (const value of fs.readFileSync(file, 'utf8').match(concrete) || []) if (!synthetic.has(value)) shiViolations.push(`${file}: ${value}`);
          if (shiViolations.length) throw new Error(`Unexpected concrete SHI:\n${shiViolations.join('\n')}`);
          const runtimeSurfaces = [
            'app/safe-harbor/app/main.js',
            'app/safe-harbor/app/safe-harbor-gen3-presentation-core.js',
            'app/safe-harbor/app/safe-harbor-temporal-bloom.js',
            'app/safe-harbor/renderers/10_TD613_PUA_Badge_Provenance_Attestation_Renderer_v7_2_1.user.js'
          ];
          const runtimeCombined = runtimeSurfaces.map((file) => fs.readFileSync(file, 'utf8')).join('\n');
          for (const forbidden of [/keystroke_timing\s*:/u,/pause_timing\s*:/u,/cursor_trajectory\s*:/u,/covert_behavioral_biometrics\s*:/u]) if (forbidden.test(runtimeCombined)) throw new Error(`Forbidden behavioral telemetry marker present in runtime surface: ${forbidden}`);
          const serverless = files.filter((file) => /^(?:api|functions|netlify\/functions|vercel\/functions)\//u.test(file));
          if (serverless.length) throw new Error(`Stage 3 added serverless surfaces:\n${serverless.join('\n')}`);
          console.log(`Stage 3 hygiene passed across ${files.length} changed paths and ${runtimeSurfaces.length} runtime telemetry surfaces.`);
          NODE

      - name: Remove temporary Stage 3 mechanisms
        run: |
          rm scripts/apply-safe-harbor-gen3-stage3-integration.mjs
          rm scripts/apply-safe-harbor-gen3-stage3-docs.mjs

      - name: Commit tested Stage 3 implementation
        run: |
          set -euo pipefail
          git config user.name 'td613-safe-harbor-bot'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          node --input-type=module <<'NODE'
          import { execFileSync } from 'node:child_process';
          const staged = execFileSync('git', ['diff', '--cached', '--name-only'], { encoding: 'utf8' }).trim().split(/\r?\n/u).filter(Boolean);
          const allowed = staged.every((file) =>
            file === 'app/safe-harbor/app/main.js' || file === 'app/safe-harbor/index.html' ||
            file === 'app/safe-harbor/renderers/10_TD613_PUA_Badge_Provenance_Attestation_Renderer_v7_2_1.user.js' ||
            file === 'package.json' || file === 'docs/safe-harbor/README.md' ||
            file === 'docs/safe-harbor/gen3-implementation-ledger.md' || file === 'docs/safe-harbor/gen3-stage3-validation-receipt.md' ||
            file.startsWith('app/safe-harbor/app/safe-harbor-gen3-presentation-core.js') ||
            file.startsWith('app/safe-harbor/app/safe-harbor-temporal-bloom.') || file.startsWith('tests/safe-harbor-gen3-stage3-') ||
            file === 'scripts/apply-safe-harbor-gen3-stage3-integration.mjs' || file === 'scripts/apply-safe-harbor-gen3-stage3-docs.mjs'
          );
          if (!allowed) throw new Error(`Unexpected staged Stage 3 path:\n${staged.join('\n')}`);
          console.log(`Stage 3 staged-path allowlist passed for ${staged.length} paths.`);
          NODE
          git diff --cached --check
          git commit -m 'Implement Safe Harbor Gen3 Stage 3 Temporal Bloom and provenance attestation'
          git push origin HEAD:"${{ github.event.pull_request.head.ref }}"
