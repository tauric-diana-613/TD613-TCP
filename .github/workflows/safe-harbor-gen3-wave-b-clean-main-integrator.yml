name: Safe Harbor Gen3 Wave B clean-main integrator

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: safe-harbor-gen3-wave-b-clean-main-integrator
  cancel-in-progress: false

jobs:
  integrate-validate-clean:
    if: github.event.pull_request.head.ref == 'safe-harbor-gen3-wave-b-release-gate-clean-main'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Check out exact clean-main release branch
        uses: actions/checkout@v4
        with:
          ref: safe-harbor-gen3-wave-b-release-gate-clean-main
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Apply bounded Wave B seams to current-main branch
        run: node scripts/apply-safe-harbor-gen3-wave-b-release-gate.mjs

      - name: Install dependencies
        run: npm ci

      - name: Validate clean-main Wave B and inherited boundaries
        id: validation
        run: |
          set -o pipefail
          {
            npm run test:safe-harbor:gen3:wave-b
            npm run test:safe-harbor:gen3:track-r
            npm run test:safe-harbor:phase9.1c
            npm run test:safe-harbor:current
            node tests/safe-harbor-gen3-wave-b-production-probe-contract.test.mjs
            node tests/vercel-deploy-hygiene.test.mjs
            node tests/vercel-operator-release-gate.test.mjs
            node tests/vercel-relock-safety.test.mjs
            node --test tests/flowcore-p0-p10-completion.test.mjs
            node --test tests/flowcore-production-promotion.test.mjs
            node --check scripts/safe-harbor-gen3-wave-b-production-assets.mjs
            node --check scripts/safe-harbor-gen3-wave-b-production-probe.mjs
          } 2>&1 | tee /tmp/safe-harbor-wave-b-clean-main-validation.log

      - name: Preserve clean-main validation failure log
        if: failure() && steps.validation.conclusion == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: safe-harbor-gen3-wave-b-clean-main-validation-failure
          path: /tmp/safe-harbor-wave-b-clean-main-validation.log
          if-no-files-found: error
          retention-days: 7

      - name: Verify clean-main path, SHI, deployment, and serverless hygiene
        run: |
          set -euo pipefail
          node --input-type=module <<'NODE'
          import fs from 'node:fs';
          import { execFileSync } from 'node:child_process';
          execFileSync('git', ['fetch', 'origin', 'main'], { stdio: 'inherit' });
          const files = execFileSync('git', ['diff', '--name-only', 'origin/main...HEAD'], { encoding: 'utf8' })
            .trim().split(/\r?\n/u).filter(Boolean);
          const allowed = new Set([
            '.github/workflows/vercel-operator-release.yml',
            '.github/workflows/flowcore-p0-p10-final-stitch.yml',
            'scripts/safe-harbor-gen3-wave-b-production-assets.mjs',
            'scripts/safe-harbor-gen3-wave-b-production-probe.mjs',
            'tests/safe-harbor-gen3-wave-b-production-probe-contract.test.mjs',
            'tests/vercel-operator-release-gate.test.mjs',
            'docs/safe-harbor/gen3-wave-b-release-gate-receipt.md',
            'docs/safe-harbor/README.md',
            'scripts/apply-safe-harbor-gen3-wave-b-release-gate.mjs'
          ]);
          const unexpected = files.filter((file) => !allowed.has(file));
          if (unexpected.length) throw new Error(`Clean-main Wave B gate changed unauthorized paths:\n${unexpected.join('\n')}`);
          const concrete = /TD613-SH-9B07D8B-[0-9A-F]{8}/gu;
          const syntheticFixtures = new Set([
            'TD613-SH-9B07D8B-A1B2C3D4',
            'TD613-SH-9B07D8B-FFEEDDCC'
          ]);
          const violations = [];
          for (const file of files) {
            if (!fs.existsSync(file) || !/\.(?:yml|mjs|js|md|json)$/u.test(file)) continue;
            for (const value of fs.readFileSync(file, 'utf8').match(concrete) || []) {
              if (!syntheticFixtures.has(value)) violations.push(`${file}: ${value}`);
            }
          }
          if (violations.length) throw new Error(`Clean-main Wave B gate exposed an unrecognized concrete SHI:\n${violations.join('\n')}`);
          const vercel = JSON.parse(fs.readFileSync('vercel.json', 'utf8'));
          if (vercel.git?.deploymentEnabled !== false) throw new Error('Git-triggered Vercel deployment lock is not closed.');
          const release = fs.readFileSync('.github/workflows/vercel-operator-release.yml', 'utf8');
          if ((release.match(/vercel@latest deploy/gu) || []).length !== 1) throw new Error('Wave B release workflow changed the one-direct-deploy ceiling.');
          if ((release.match(/config\.git\.deploymentEnabled = true/gu) || []).length !== 1) throw new Error('Wave B release workflow changed the one-fallback-open ceiling.');
          if ((release.match(/deploymentEnabled: false/gu) || []).length !== 1) throw new Error('Wave B release workflow changed the relock ceiling.');
          const serverless = files.filter((file) => /^(?:api|functions|netlify\/functions|vercel\/functions)\//u.test(file));
          if (serverless.length) throw new Error(`Clean-main Wave B gate added serverless surfaces:\n${serverless.join('\n')}`);
          console.log(`Clean-main Wave B hygiene passed across ${files.length} changed paths.`);
          NODE

      - name: Remove clean-main patcher
        run: rm scripts/apply-safe-harbor-gen3-wave-b-release-gate.mjs

      - name: Commit tested clean-main Wave B gate
        id: writeback
        shell: bash
        run: |
          set -o pipefail
          {
            set -euo pipefail
            HEAD_REF='safe-harbor-gen3-wave-b-release-gate-clean-main'
            echo "head_ref=$HEAD_REF"
            echo "local_head=$(git rev-parse HEAD)"
            echo "remote_head=$(git ls-remote --heads origin "$HEAD_REF" | awk '{print $1}')"
            git status --short
            git config user.name 'td613-safe-harbor-bot'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git add -A
            git diff --cached --check
            git diff --cached --name-status
            git commit -m 'Authorize Safe Harbor Gen3 Release Wave B from clean main'
            echo "committed_head=$(git rev-parse HEAD)"
            git push origin HEAD:"$HEAD_REF"
          } 2>&1 | tee /tmp/safe-harbor-wave-b-clean-main-writeback.log

      - name: Preserve clean-main writeback failure log
        if: failure() && steps.writeback.conclusion == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: safe-harbor-gen3-wave-b-clean-main-writeback-failure
          path: /tmp/safe-harbor-wave-b-clean-main-writeback.log
          if-no-files-found: error
          retention-days: 7