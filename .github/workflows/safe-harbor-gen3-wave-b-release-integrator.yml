name: Safe Harbor Gen3 Wave B release integrator

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: safe-harbor-gen3-wave-b-release-integrator
  cancel-in-progress: false

jobs:
  integrate-validate-clean:
    if: startsWith(github.event.pull_request.head.ref, 'safe-harbor-gen3-wave-b-release-gate')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Check out exact Wave B release-gate branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Apply bounded Wave B release-gate seams
        run: node scripts/apply-safe-harbor-gen3-wave-b-release-gate.mjs

      - name: Install dependencies
        run: npm ci

      - name: Validate Safe Harbor Wave B and inherited boundaries
        id: validation
        run: |
          set -o pipefail
          {
            npm run test:safe-harbor:gen3:wave-b
            npm run test:safe-harbor:gen3:track-r
            npm run test:safe-harbor:phase9.1c
            npm run test:safe-harbor:current
            node tests/safe-harbor-gen3-wave-b-production-probe-contract.test.mjs
            node tests/vercel-deploy-hygiene.test.mjs
            node tests/vercel-operator-release-gate.test.mjs
            node tests/vercel-relock-safety.test.mjs
            node --test tests/flowcore-p0-p10-completion.test.mjs
            node --test tests/flowcore-production-promotion.test.mjs
            node --check scripts/safe-harbor-gen3-wave-b-production-assets.mjs
            node --check scripts/safe-harbor-gen3-wave-b-production-probe.mjs
          } 2>&1 | tee /tmp/safe-harbor-wave-b-release-gate.log

      - name: Preserve Wave B release-gate failure log
        if: failure() && steps.validation.conclusion == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: safe-harbor-gen3-wave-b-release-gate-failure
          path: /tmp/safe-harbor-wave-b-release-gate.log
          if-no-files-found: error
          retention-days: 7

      - name: Verify release-law, credential, serverless, and path hygiene
        run: |
          set -euo pipefail
          node --input-type=module <<'NODE'
          import fs from 'node:fs';
          import { execFileSync } from 'node:child_process';
          execFileSync('git', ['fetch', 'origin', 'main'], { stdio: 'inherit' });
          const files = execFileSync('git', ['diff', '--name-only', 'origin/main...HEAD'], { encoding: 'utf8' })
            .trim().split(/\r?\n/u).filter(Boolean);
          const allowed = new Set([
            '.github/workflows/vercel-operator-release.yml',
            '.github/workflows/flowcore-p0-p10-final-stitch.yml',
            'scripts/safe-harbor-gen3-wave-b-production-assets.mjs',
            'scripts/safe-harbor-gen3-wave-b-production-probe.mjs',
            'tests/safe-harbor-gen3-wave-b-production-probe-contract.test.mjs',
            'tests/vercel-operator-release-gate.test.mjs',
            'docs/safe-harbor/gen3-wave-b-release-gate-receipt.md',
            'docs/safe-harbor/README.md',
            'scripts/apply-safe-harbor-gen3-wave-b-release-gate.mjs'
          ]);
          const unexpected = files.filter((file) => !allowed.has(file));
          if (unexpected.length) throw new Error(`Wave B release gate changed unauthorized paths:\n${unexpected.join('\n')}`);
          const concrete = /TD613-SH-9B07D8B-[0-9A-F]{8}/gu;
          const syntheticFixtures = new Set([
            'TD613-SH-9B07D8B-A1B2C3D4',
            'TD613-SH-9B07D8B-FFEEDDCC'
          ]);
          const violations = [];
          for (const file of files) {
            if (!fs.existsSync(file) || !/\.(?:yml|mjs|js|md|json)$/u.test(file)) continue;
            for (const value of fs.readFileSync(file, 'utf8').match(concrete) || []) {
              if (!syntheticFixtures.has(value)) violations.push(`${file}: ${value}`);
            }
          }
          if (violations.length) throw new Error(`Wave B release gate exposed an unrecognized concrete SHI:\n${violations.join('\n')}`);
          const vercel = JSON.parse(fs.readFileSync('vercel.json', 'utf8'));
          if (vercel.git?.deploymentEnabled !== false) throw new Error('Git-triggered Vercel deployment lock is not closed.');
          const workflow = fs.readFileSync('.github/workflows/vercel-operator-release.yml', 'utf8');
          if ((workflow.match(/vercel@latest deploy/gu) || []).length !== 1) throw new Error('Wave B release workflow changed the one-direct-deploy ceiling.');
          if ((workflow.match(/config\.git\.deploymentEnabled = true/gu) || []).length !== 1) throw new Error('Wave B release workflow changed the one-fallback-open ceiling.');
          if ((workflow.match(/deploymentEnabled: false/gu) || []).length !== 1) throw new Error('Wave B release workflow changed the relock ceiling.');
          const serverless = files.filter((file) => /^(?:api|functions|netlify\/functions|vercel\/functions)\//u.test(file));
          if (serverless.length) throw new Error(`Wave B release gate added serverless surfaces:\n${serverless.join('\n')}`);
          console.log(`Wave B release-gate hygiene passed across ${files.length} changed paths.`);
          NODE

      - name: Remove temporary Wave B patcher
        run: rm scripts/apply-safe-harbor-gen3-wave-b-release-gate.mjs

      - name: Commit tested Wave B release gate
        run: |
          set -euo pipefail
          git config user.name 'td613-safe-harbor-bot'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --check
          git commit -m 'Authorize Safe Harbor Gen3 Release Wave B'
          git push origin HEAD:"${{ github.event.pull_request.head.ref }}"