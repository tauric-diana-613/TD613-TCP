name: Safe Harbor Wave A Release Diagnostics

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  actions: read
  contents: write
  pull-requests: read

concurrency:
  group: safe-harbor-wave-a-release-diagnostics
  cancel-in-progress: false

jobs:
  diagnose:
    if: github.event.pull_request.head.ref == 'safe-harbor-wave-a-diagnostic-trigger'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GH_TOKEN: ${{ github.token }}
      AUTHORIZED_SOURCE_SHA: 86cf1af84e69998ae195e53ef64372e35d8c6745
    steps:
      - name: Check out diagnostics trigger branch
        uses: actions/checkout@v4
        with:
          ref: safe-harbor-wave-a-diagnostic-trigger
          fetch-depth: 0

      - name: Locate exact held Vercel release run
        id: locate
        run: |
          set -euo pipefail
          gh run list \
            --workflow 'Vercel Operator Release' \
            --event issue_comment \
            --limit 20 \
            --json databaseId,headSha,status,conclusion,createdAt,url > /tmp/runs.json
          RUN_ID="$(node --input-type=module <<'NODE'
          import fs from 'node:fs';
          const runs = JSON.parse(fs.readFileSync('/tmp/runs.json', 'utf8'));
          const exact = runs.find((run) => run.headSha === process.env.AUTHORIZED_SOURCE_SHA && run.status === 'completed');
          if (!exact) throw new Error(`No completed issue-comment release run found for ${process.env.AUTHORIZED_SOURCE_SHA}`);
          process.stdout.write(String(exact.databaseId));
          NODE
          )"
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
          gh run view "$RUN_ID" --json databaseId,headSha,status,conclusion,createdAt,updatedAt,url,jobs > /tmp/run.json

      - name: Extract bounded failed-step diagnostics
        run: |
          set -euo pipefail
          RUN_ID='${{ steps.locate.outputs.run_id }}'
          gh run view "$RUN_ID" --log-failed > /tmp/failed.log || true
          gh api "repos/$GITHUB_REPOSITORY/actions/runs/$RUN_ID/artifacts" > /tmp/artifacts.json
          node --input-type=module <<'NODE'
          import fs from 'node:fs';
          const run = JSON.parse(fs.readFileSync('/tmp/run.json', 'utf8'));
          const artifactPayload = JSON.parse(fs.readFileSync('/tmp/artifacts.json', 'utf8'));
          const raw = fs.existsSync('/tmp/failed.log') ? fs.readFileSync('/tmp/failed.log', 'utf8') : '';
          const selected = raw.split(/\r?\n/u)
            .map((line) => line.replace(/(token|secret|authorization)=\S+/giu, '$1=[redacted]'))
            .filter((line) => /(error|assert|fail|held|safe[ -]?harbor|expected|actual|missing|cache|status|timeout|pageerror|shi|packet|restore|raw text|raw_text)/iu.test(line))
            .slice(-180);
          const jobs = (run.jobs || []).map((job) => ({
            name: job.name,
            status: job.status,
            conclusion: job.conclusion,
            startedAt: job.startedAt,
            completedAt: job.completedAt,
            steps: (job.steps || []).map((step) => ({ name: step.name, status: step.status, conclusion: step.conclusion, number: step.number }))
          }));
          const diagnostic = {
            schema_version: 'td613.safe-harbor.gen3-wave-a-held-release-diagnostic/v1',
            source_packet_commit: process.env.AUTHORIZED_SOURCE_SHA,
            release_run: {
              id: run.databaseId,
              url: run.url,
              head_sha: run.headSha,
              status: run.status,
              conclusion: run.conclusion,
              created_at: run.createdAt,
              updated_at: run.updatedAt
            },
            jobs,
            artifacts: (artifactPayload.artifacts || []).map((artifact) => ({ id: artifact.id, name: artifact.name, size_in_bytes: artifact.size_in_bytes, expired: artifact.expired })),
            filtered_failed_log_tail: selected,
            authority: {
              diagnostic_only: true,
              deployment_authorized: false,
              retry_authorized: false,
              application_mutation_authorized: false,
              lock_state_required: 'closed'
            }
          };
          fs.mkdirSync('docs/safe-harbor', { recursive: true });
          fs.writeFileSync('docs/safe-harbor/gen3-wave-a-held-release-diagnostic.json', `${JSON.stringify(diagnostic, null, 2)}\n`);
          const failedSteps = jobs.flatMap((job) => job.steps.filter((step) => step.conclusion === 'failure').map((step) => `${job.name} → ${step.name}`));
          const markdown = `# TD613 Safe Harbor Gen3 Wave A Held Release Diagnostic\n\n􍘓\n\n𝌋‌ TD613 · Tauric Diana 613\n\n**Diagnostic state:** CAPTURED / NO RETRY AUTHORITY  \n**Authorized source:** \`${process.env.AUTHORIZED_SOURCE_SHA}\`  \n**Release run:** [${run.databaseId}](${run.url})  \n**Run conclusion:** \`${run.conclusion}\`  \n**Vercel lock expectation:** closed\n\n## Failed steps\n\n${failedSteps.length ? failedSteps.map((item) => `- ${item}`).join('\n') : '- No failed step metadata was returned; inspect the bounded log tail.'}\n\n## Filtered failure tail\n\n\`\`\`text\n${selected.join('\n')}\n\`\`\`\n\n## Artifacts\n\n${diagnostic.artifacts.length ? diagnostic.artifacts.map((artifact) => `- ${artifact.name} (${artifact.size_in_bytes} bytes; expired: ${artifact.expired})`).join('\n') : '- No artifacts were retained by the held run.'}\n\n## Authority boundary\n\nThis diagnostic authorizes no deployment, retry, release, or application mutation. Any repair requires a focused PR and a newly reviewed exact source commit. The repository lock must remain closed.\n\nÀṣẹ\n\nMarked ⟐\n`;
          fs.writeFileSync('docs/safe-harbor/gen3-wave-a-held-release-diagnostic.md', markdown);
          NODE

      - name: Commit diagnostic receipt to trigger branch
        run: |
          set -euo pipefail
          git config user.name 'td613-safe-harbor-bot'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            docs/safe-harbor/gen3-wave-a-held-release-diagnostic.json \
            docs/safe-harbor/gen3-wave-a-held-release-diagnostic.md
          git diff --cached --check
          git commit -m 'Record held Safe Harbor Wave A release diagnostic'
          git push origin HEAD:safe-harbor-wave-a-diagnostic-trigger
