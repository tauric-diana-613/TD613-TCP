name: Safe Harbor Wave A Release Diagnostics

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  actions: read
  contents: read
  pull-requests: read

concurrency:
  group: safe-harbor-wave-a-release-diagnostics
  cancel-in-progress: false

jobs:
  diagnose:
    if: github.event.pull_request.head.ref == 'safe-harbor-wave-a-diagnostic-trigger'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      GH_TOKEN: ${{ github.token }}
      AUTHORIZED_SOURCE_SHA: 86cf1af84e69998ae195e53ef64372e35d8c6745
      TD613_BASE_URL: https://td613.com
    steps:
      - name: Check out diagnostics trigger branch
        uses: actions/checkout@v4
        with:
          ref: safe-harbor-wave-a-diagnostic-trigger
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Locate exact held Vercel release run
        id: locate
        run: |
          set -euo pipefail
          gh run list \
            --workflow 'Vercel Operator Release' \
            --event issue_comment \
            --limit 20 \
            --json databaseId,headSha,status,conclusion,createdAt,url > /tmp/runs.json
          RUN_ID="$(node --input-type=module <<'NODE'
          import fs from 'node:fs';
          const runs = JSON.parse(fs.readFileSync('/tmp/runs.json', 'utf8'));
          const exact = runs.find((run) => run.headSha === process.env.AUTHORIZED_SOURCE_SHA && run.status === 'completed');
          if (!exact) throw new Error(`No completed issue-comment release run found for ${process.env.AUTHORIZED_SOURCE_SHA}`);
          process.stdout.write(String(exact.databaseId));
          NODE
          )"
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
          gh run view "$RUN_ID" --json databaseId,headSha,status,conclusion,createdAt,updatedAt,url,jobs > /tmp/run.json

      - name: Extract bounded failed-step diagnostics
        run: |
          set -euo pipefail
          RUN_ID='${{ steps.locate.outputs.run_id }}'
          gh run view "$RUN_ID" --log-failed > /tmp/failed.log || true
          gh api "repos/$GITHUB_REPOSITORY/actions/runs/$RUN_ID/artifacts" > /tmp/artifacts.json
          node --input-type=module <<'NODE'
          import fs from 'node:fs';
          const run = JSON.parse(fs.readFileSync('/tmp/run.json', 'utf8'));
          const artifactPayload = JSON.parse(fs.readFileSync('/tmp/artifacts.json', 'utf8'));
          const raw = fs.existsSync('/tmp/failed.log') ? fs.readFileSync('/tmp/failed.log', 'utf8') : '';
          const selected = raw.split(/\r?\n/u)
            .map((line) => line.replace(/(token|secret|authorization)=\S+/giu, '$1=[redacted]').trimEnd())
            .filter((line) => /(error|assert|fail|held|safe[ -]?harbor|expected|actual|missing|cache|status|timeout|pageerror|shi|packet|restore|raw text|raw_text)/iu.test(line))
            .slice(-180);
          const jobs = (run.jobs || []).map((job) => ({
            name: job.name,
            status: job.status,
            conclusion: job.conclusion,
            startedAt: job.startedAt,
            completedAt: job.completedAt,
            steps: (job.steps || []).map((step) => ({ name: step.name, status: step.status, conclusion: step.conclusion, number: step.number }))
          }));
          const diagnostic = {
            schema_version: 'td613.safe-harbor.gen3-wave-a-held-release-diagnostic/v1',
            source_packet_commit: process.env.AUTHORIZED_SOURCE_SHA,
            release_run: {
              id: run.databaseId,
              url: run.url,
              head_sha: run.headSha,
              status: run.status,
              conclusion: run.conclusion,
              created_at: run.createdAt,
              updated_at: run.updatedAt
            },
            jobs,
            artifacts: (artifactPayload.artifacts || []).map((artifact) => ({ id: artifact.id, name: artifact.name, size_in_bytes: artifact.size_in_bytes, expired: artifact.expired })),
            filtered_failed_log_tail: selected,
            authority: {
              diagnostic_only: true,
              deployment_authorized: false,
              retry_authorized: false,
              application_mutation_authorized: false,
              lock_state_required: 'closed'
            }
          };
          fs.mkdirSync('artifacts/safe-harbor-wave-a-diagnostic', { recursive: true });
          fs.writeFileSync('artifacts/safe-harbor-wave-a-diagnostic/gen3-wave-a-held-release-diagnostic.json', `${JSON.stringify(diagnostic, null, 2)}\n`);
          NODE

      - name: Probe deployed Safe Harbor route matrix
        run: |
          set -euo pipefail
          node --input-type=module <<'NODE'
          import fs from 'node:fs';
          const base = String(process.env.TD613_BASE_URL).replace(/\/+$/u, '');
          const nonce = process.env.AUTHORIZED_SOURCE_SHA;
          const paths = [
            '/safe-harbor/',
            '/app/safe-harbor/index.html',
            '/safe-harbor/app/safe-harbor-native-finalizer.js',
            '/app/safe-harbor/app/safe-harbor-native-finalizer.js',
            '/safe-harbor/app/safe-harbor-gen3-evidence-contract.js',
            '/app/safe-harbor/app/safe-harbor-gen3-evidence-contract.js',
            '/safe-harbor/app/safe-harbor-gen3-authorship-maturity.js',
            '/app/safe-harbor/app/safe-harbor-gen3-authorship-maturity.js',
            '/safe-harbor/app/safe-harbor-gen3-stage2-controls.js',
            '/app/safe-harbor/app/safe-harbor-gen3-stage2-controls.js'
          ];
          const results = [];
          for (const path of paths) {
            const response = await fetch(`${base}${path}?td613-route-matrix=${nonce}`, {
              cache: 'no-store',
              redirect: 'manual',
              headers: { 'Cache-Control': 'no-cache' }
            });
            const body = await response.text();
            results.push({
              path,
              status: response.status,
              location: response.headers.get('location'),
              content_type: response.headers.get('content-type'),
              cache_control: response.headers.get('cache-control'),
              bytes: Buffer.byteLength(body),
              body_prefix: body.slice(0, 120).replace(/\s+/gu, ' '),
              has_native_finalizer_marker: body.includes('finalizeSafeHarborPacket'),
              has_stage1_marker: body.includes('td613.safe-harbor.authorship-evidence/v1'),
              has_stage2_marker: body.includes('td613.safe-harbor.authorship-maturity/v1'),
              has_controls_marker: body.includes('td613.safe-harbor.stage2-control-receipt/v1')
            });
          }
          const receipt = {
            schema_version: 'td613.safe-harbor.gen3-wave-a-route-matrix/v1',
            observed_at_utc: new Date().toISOString(),
            source_packet_commit: process.env.AUTHORIZED_SOURCE_SHA,
            production_url: base,
            results,
            all_routes_ready: results.every((item) => item.status === 200),
            authority: {
              read_only: true,
              deployment_authorized: false,
              retry_authorized: false,
              route_mutation_authorized: false
            }
          };
          fs.mkdirSync('artifacts/safe-harbor-wave-a-diagnostic', { recursive: true });
          fs.writeFileSync('artifacts/safe-harbor-wave-a-diagnostic/gen3-wave-a-route-matrix.json', `${JSON.stringify(receipt, null, 2)}\n`);
          if (!receipt.all_routes_ready) throw new Error('Safe Harbor route matrix remains incomplete.');
          console.log(JSON.stringify(receipt, null, 2));
          NODE

      - name: Install read-only browser observer
        run: |
          npm ci
          npm install --no-save --package-lock=false playwright@1.53.2
          npx playwright install --with-deps chromium

      - name: Observe deployed Safe Harbor Gen3 Wave A without redeploy
        env:
          TD613_SOURCE_PACKET_COMMIT: 86cf1af84e69998ae195e53ef64372e35d8c6745
          TD613_ARTIFACT_DIR: artifacts/safe-harbor-wave-a-read-only-observation
        run: node scripts/safe-harbor-gen3-wave-a-production-probe.mjs

      - name: Preserve held-release, route-matrix, and read-only runtime evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: safe-harbor-wave-a-held-release-route-and-runtime-observation
          path: |
            artifacts/safe-harbor-wave-a-diagnostic/
            artifacts/safe-harbor-wave-a-read-only-observation/
          if-no-files-found: warn
          retention-days: 30
