name: TCP Smoke

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tcp-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Static TCP smoke gate
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lightweight TCP smoke
        run: node tests/tcp-smoke.test.mjs

      - name: Smoke summary
        if: always()
        run: |
          {
            echo '## TCP Smoke'
            echo ''
            echo '- Runs a lightweight static surface check.'
            echo '- Confirms Flight PR90/PR91/PR92 sentinels and key UI contracts.'
            echo '- Does not run the full Hush / stylometry / recognition regression suite.'
          } >> "$GITHUB_STEP_SUMMARY"
