name: TD613 Cancel Stale Ash Runs

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/td613-cancel-stale-ash-runs.yml'

permissions:
  actions: write
  contents: write

jobs:
  cancel-and-remove:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ github.token }}
      KEEP_SHA: 998ca22059981336659c8fd6a5011c1d2367c91c
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Cancel only superseded Ash runs
        shell: bash
        run: |
          set -euo pipefail
          ids="$({
            for status in queued in_progress; do
              gh api --paginate "repos/$GITHUB_REPOSITORY/actions/runs?status=$status&per_page=100" \
                --jq ".workflow_runs[] | select((.head_branch == \"agent/ash-arrival-animation-close-boundary\") or (.head_branch == \"agent/ash-close-ingress-animation-boundary\") or (.head_branch == \"agent/ash-flowcore-ingress-release-clean\" and .head_sha != env.KEEP_SHA)) | .id"
            done
          } | sort -u)"
          while IFS= read -r id; do
            [[ -n "$id" ]] || continue
            echo "Cancelling stale run $id"
            gh api --method POST "repos/$GITHUB_REPOSITORY/actions/runs/$id/cancel" || true
          done <<< "$ids"
      - name: Remove one-use maintenance workflow
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git pull --ff-only origin main
          git rm .github/workflows/td613-cancel-stale-ash-runs.yml
          git commit -m 'chore: remove stale-run maintenance workflow'
          git push origin HEAD:main
