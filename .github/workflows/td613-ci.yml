name: TD613 Core CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: td613-core-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core:
    name: Core, release, and Safe Harbor
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: node tests/workflow-estate.test.mjs
      - run: npm test
      - run: npm run test:safe-harbor:current
      - run: npm run test:safe-harbor:gen3:wave-b

  hush:
    name: Hush retained phase suites
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test:hush:phase9
      - run: npm run test:hush:phase10
      - run: npm run test:hush:phase11
      - run: npm run test:hush:phase12
      - run: npm run test:hush:phase13
      - run: npm run test:hush:phase14
      - run: npm run test:hush:packets:check

  dome-world:
    name: Dome-World and Ash contracts
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Dome-World art and shell
        run: npm run test:dome-world:art
      - name: Dome-World Phase III shared boundary
        run: npm run test:dome-world:phase3
      - name: Ash custody contract
        run: node tests/dome-world-ash-custody.test.mjs
      - name: Ash leak challenge
        id: ash_leak
        continue-on-error: true
        run: |
          mkdir -p artifacts/ash-leak-challenge
          node tests/dome-world-ash-leak-challenge.test.mjs > artifacts/ash-leak-challenge/test.log 2>&1
      - name: Preserve held Ash leak challenge diagnostics
        if: steps.ash_leak.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: ash-leak-challenge-diagnostic
          path: artifacts/ash-leak-challenge/test.log
          if-no-files-found: error
          retention-days: 3
      - name: Enforce Ash leak challenge
        if: steps.ash_leak.outcome == 'failure'
        run: |
          cat artifacts/ash-leak-challenge/test.log
          exit 1
      - name: Ash veil contract
        run: node tests/dome-world-ash-veil.test.mjs
      - name: Ash Cinder contract
        run: node tests/dome-world-ash-cinder.test.mjs
      - name: Ash comparison contract
        run: node tests/dome-world-ash-compare.test.mjs
      - name: Ash recall contract
        run: node tests/dome-world-ash-recall.test.mjs
      - name: Ash HCC grade gate
        run: node tests/dome-world-ash-hcc-grade-gate.test.mjs
      - name: Ash Keep core contracts
        run: npm run test:ash-keep
      - name: Ash and Flow-Core retained witnesses
        run: |
          node tests/ash-four-profile-pedagogy.test.mjs
          node tests/ash-investigation-guidance.test.mjs
          node tests/ash-legal-ux.test.mjs
          node tests/ash-live-ingress-demos-cache.test.mjs
          node tests/ash-research-ux-rehydration.test.mjs
          node tests/ash-keep-choir-calibration-schemas.test.mjs
          node tests/ash-keep-production-closure-contract.test.mjs
          node tests/ash-lifecycle-production-contract.test.mjs
          node tests/flowcore-p0-p7-seam-closure.test.mjs
          node tests/flowcore-p0-p10-completion.test.mjs
          node tests/flowcore-production-observation.test.mjs
      - name: Product architecture contracts
        run: |
          node tests/product-architecture/shell.test.mjs
          node tests/product-architecture/lifecycle.test.mjs

  deployment-law:
    name: Deployment law, locked posture
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: node tests/vercel-deploy-hygiene.test.mjs
      - run: node tests/vercel-operator-release-gate.test.mjs
      - run: node tests/vercel-relock-safety.test.mjs
      - run: node tests/release-plumbing.test.mjs
