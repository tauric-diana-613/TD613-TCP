name: TD613 Emergency Vercel Fallback

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/td613-emergency-vercel-fallback.yml'

permissions:
  contents: write
  statuses: read

concurrency:
  group: td613-emergency-vercel-fallback
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TD613_SOURCE_MERGE: 065b46e05b72d1c9ab11fceded3fcebdb5cae0f1
      TD613_EXPECTED_EPOCH: 20260718-emergency-stability-v5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Verify bounded source tree
        run: |
          set -euo pipefail
          git diff --exit-code "$TD613_SOURCE_MERGE" HEAD -- . ':(exclude).github/workflows/td613-emergency-vercel-fallback.yml'
          node <<'NODE'
          const fs = require('node:fs');
          const source = fs.readFileSync('vercel.json', 'utf8');
          const matches = source.match(/"deploymentEnabled": false/g) || [];
          if (matches.length !== 1) throw new Error(`Expected one locked Vercel gate; observed ${matches.length}.`);
          NODE

      - name: Enable one Vercel deployment
        id: release
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('node:fs');
          const path = 'vercel.json';
          const source = fs.readFileSync(path, 'utf8');
          const from = '"deploymentEnabled": false';
          const to = '"deploymentEnabled": true';
          if (source.split(from).length - 1 !== 1) throw new Error('Vercel lock seam was not singular.');
          fs.writeFileSync(path, source.replace(from, to));
          NODE
          git config user.name 'tauric-diana-613'
          git config user.email '248391538+tauric-diana-613@users.noreply.github.com'
          git add vercel.json
          git commit -m 'Open one-shot Vercel gate for Ash emergency repair'
          git push origin HEAD:main
          release_sha="$(git rev-parse HEAD)"
          echo "sha=$release_sha" >> "$GITHUB_OUTPUT"
          echo "release_sha=$release_sha"

      - name: Wait for one deployment and Ash observers
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_SHA: ${{ steps.release.outputs.sha }}
        run: |
          set -euo pipefail
          api="https://api.github.com/repos/${GITHUB_REPOSITORY}/commits/${RELEASE_SHA}/status"
          success=0
          for attempt in $(seq 1 120); do
            body="$(curl -fsSL -H "Authorization: Bearer ${GH_TOKEN}" -H 'X-GitHub-Api-Version: 2022-11-28' "$api")"
            printf '%s' "$body" > /tmp/td613-release-status.json
            readarray -t states < <(node <<'NODE'
          const fs = require('node:fs');
          const body = JSON.parse(fs.readFileSync('/tmp/td613-release-status.json', 'utf8'));
          const wanted = [
            'Vercel',
            'Ash Lifecycle Deployed Observation',
            'Ash Custodian Return Local Observation',
            'Ash Custodian Return Deployed Observation'
          ];
          const byContext = new Map((body.statuses || []).map(item => [item.context, item.state]));
          for (const context of wanted) console.log(`${context}\t${byContext.get(context) || 'missing'}`);
          NODE
            )
            printf 'attempt=%s\n%s\n' "$attempt" "$(printf '%s\n' "${states[@]}")"
            terminal_failure=0
            all_success=1
            for row in "${states[@]}"; do
              state="${row##*$'\t'}"
              case "$state" in
                success) ;;
                failure|error) terminal_failure=1; all_success=0 ;;
                *) all_success=0 ;;
              esac
            done
            if [ "$terminal_failure" -eq 1 ]; then
              echo 'A production witness failed; no retry is authorized.' >&2
              exit 1
            fi
            if [ "$all_success" -eq 1 ]; then success=1; break; fi
            sleep 10
          done
          if [ "$success" -ne 1 ]; then
            echo 'Timed out waiting for the single deployment and Ash observers.' >&2
            exit 1
          fi

      - name: Verify public emergency epoch
        env:
          RELEASE_SHA: ${{ steps.release.outputs.sha }}
        run: |
          set -euo pipefail
          nonce="${RELEASE_SHA}-$(date +%s)"
          for attempt in $(seq 1 30); do
            cache="$(curl -fsSL -H 'Cache-Control: no-cache, no-store, max-age=0' "https://td613.com/dome-world/ash-cache-flush.js?release=${nonce}-${attempt}" || true)"
            bridge="$(curl -fsSL -H 'Cache-Control: no-cache, no-store, max-age=0' "https://td613.com/dome-world/ash-workspace-bridge.js?release=${nonce}-${attempt}" || true)"
            close="$(curl -fsSL -H 'Cache-Control: no-cache, no-store, max-age=0' "https://td613.com/dome-world/ash-case-close-repair.js?release=${nonce}-${attempt}" || true)"
            if printf '%s' "$cache" | grep -q '2026-07-18-emergency-stability-v5' \
              && printf '%s' "$bridge" | grep -q '20260718-emergency-stability-v5' \
              && printf '%s' "$close" | grep -q 'v1.1-pointer-release'; then
              printf '%s' "$cache" > /tmp/ash-cache-flush.production.js
              printf '%s' "$bridge" > /tmp/ash-workspace-bridge.production.js
              printf '%s' "$close" > /tmp/ash-case-close-repair.production.js
              exit 0
            fi
            sleep 4
          done
          echo 'Public Ash assets did not expose the emergency epoch.' >&2
          exit 1

      - name: Relock and remove fallback
        if: always()
        run: |
          set -euo pipefail
          git fetch origin main
          git reset --hard origin/main
          node <<'NODE'
          const fs = require('node:fs');
          const path = 'vercel.json';
          const source = fs.readFileSync(path, 'utf8');
          const unlocked = '"deploymentEnabled": true';
          const locked = '"deploymentEnabled": false';
          if (source.includes(unlocked)) {
            if (source.split(unlocked).length - 1 !== 1) throw new Error('Unlocked Vercel seam was not singular.');
            fs.writeFileSync(path, source.replace(unlocked, locked));
          } else if (source.split(locked).length - 1 !== 1) {
            throw new Error('Vercel gate was neither singularly open nor singularly locked.');
          }
          NODE
          rm -f .github/workflows/td613-emergency-vercel-fallback.yml
          git config user.name 'tauric-diana-613'
          git config user.email '248391538+tauric-diana-613@users.noreply.github.com'
          git add vercel.json .github/workflows/td613-emergency-vercel-fallback.yml
          if git diff --cached --quiet; then
            echo 'Fallback already relocked and removed.'
          else
            git commit -m 'Relock Vercel after Ash emergency deployment'
            git push origin HEAD:main
          fi
          git diff --exit-code "$TD613_SOURCE_MERGE" HEAD
          echo "relock_sha=$(git rev-parse HEAD)"
