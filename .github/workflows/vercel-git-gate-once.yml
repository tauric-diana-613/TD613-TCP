name: Apply Strategic Vercel Git Gate Once

on:
  pull_request:
    paths:
      - ".github/workflows/vercel-git-gate-once.yml"

permissions:
  contents: write

jobs:
  apply-gate:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Apply main-only Vercel Git deployment gate
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const path = 'vercel.json';
          const config = JSON.parse(fs.readFileSync(path, 'utf8'));
          config.git = {
            ...(config.git || {}),
            deploymentEnabled: {
              main: true,
              '*': false
            }
          };
          fs.writeFileSync(path, `${JSON.stringify(config, null, 2)}\n`);
          NODE
          rm .github/workflows/vercel-git-gate-once.yml
      - name: Commit gate and remove one-shot workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add vercel.json .github/workflows/vercel-git-gate-once.yml
          git commit -m "Enforce strategic Vercel branch gate"
          git push origin HEAD:${GITHUB_HEAD_REF}
