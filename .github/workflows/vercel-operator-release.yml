name: Vercel Operator Release

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write

concurrency:
  group: td613-vercel-production-release
  cancel-in-progress: false

jobs:
  release:
    if: >-
      github.event.issue.number == 405 &&
      github.event.issue.pull_request == null &&
      github.event.comment.user.login == github.repository_owner &&
      startsWith(github.event.comment.body, '/td613-vercel-release ')
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      RELEASE_GATE_ISSUE: '405'
      VERCEL_PROJECT: td-613-tcp
      VERCEL_SCOPE: tauric-diana-s-projects
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      TD613_CANONICAL_PRODUCTION_URL: https://td613.com
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Check out current main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Validate operator authorization and exact commit
        id: authorize
        env:
          AUTHORIZATION: ${{ github.event.comment.body }}
        run: |
          set -euo pipefail
          read -r COMMAND TARGET SELECTED_SHA EXTRA <<< "$AUTHORIZATION"
          [[ "$COMMAND" == "/td613-vercel-release" ]] || { echo 'Unexpected release command.' >&2; exit 1; }
          [[ "$TARGET" == "PRODUCTION" ]] || { echo 'Only PRODUCTION is accepted.' >&2; exit 1; }
          [[ -z "${EXTRA:-}" && "$SELECTED_SHA" =~ ^[0-9a-f]{40}$ ]] || { echo 'Exact 40-character SHA required.' >&2; exit 1; }
          CURRENT_MAIN="$(git rev-parse HEAD)"
          [[ "$SELECTED_SHA" == "$CURRENT_MAIN" ]] || { echo "Authorized SHA $SELECTED_SHA is not current main $CURRENT_MAIN." >&2; exit 1; }
          node --input-type=module <<'NODE'
          import fs from 'node:fs';
          const config = JSON.parse(fs.readFileSync('vercel.json','utf8'));
          if (config.git?.deploymentEnabled !== false) throw new Error('Git-triggered Vercel deployment lock is not active.');
          NODE
          echo "selected_sha=$SELECTED_SHA" >> "$GITHUB_OUTPUT"
      - name: Record accepted release gesture
        run: |
          gh api "repos/$GITHUB_REPOSITORY/issues/$RELEASE_GATE_ISSUE/comments" -f body="$(cat <<EOF_COMMENT
          𝌋 Operator release gesture accepted.

          \`\`\`text
          target = PRODUCTION
          selected_commit = ${{ steps.authorize.outputs.selected_sha }}
          deployment_ceiling = 1
          git_auto_deploy = disabled
          workflow_run = $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID
          \`\`\`
          The gate will run Flow-Core and Ash AIA3 closure, deploy once, verify exact production bytes, observe all browser matrices, and restore the lock. ⟐
          EOF_COMMENT
          )"
      - name: Install dependencies
        run: npm ci
      - name: Verify release-critical, Flow-Core, and Ash AIA3 closure contracts
        run: |
          node tests/vercel-deploy-hygiene.test.mjs
          node tests/vercel-operator-release-gate.test.mjs
          node tests/product-architecture/shell.test.mjs
          node tests/ash-live-ingress-demos-cache.test.mjs
          node tests/ash-keep-live-aia-surface.test.mjs
          node tests/td613-flight-mobile-layout.test.mjs
          node tests/flowcore-p0-p10-completion.test.mjs
          node tests/flowcore-p0-p7-seam-closure.test.mjs
          node tests/flowcore-physical-scene.test.mjs
          node tests/flowcore-empirical-validation.test.mjs
          node tests/flowcore-production-promotion.test.mjs
          node tests/flowcore-runtime-browser-probe.test.mjs
          node --check scripts/ash-keep-aia3-task-journey-v2.mjs
      - name: Choose one bounded Vercel release route
        id: mode
        run: |
          if [[ -n "${VERCEL_TOKEN:-}" ]]; then echo 'mode=direct-token' >> "$GITHUB_OUTPUT"; else echo 'mode=git-fallback' >> "$GITHUB_OUTPUT"; fi
      - name: Link exact repository to the existing Vercel project
        if: steps.mode.outputs.mode == 'direct-token'
        run: npx --yes vercel@latest link --yes --project "$VERCEL_PROJECT" --scope "$VERCEL_SCOPE" --token "$VERCEL_TOKEN"
      - name: Pull production environment and build once
        if: steps.mode.outputs.mode == 'direct-token'
        run: |
          set -euo pipefail
          npx --yes vercel@latest pull --yes --environment=production --scope "$VERCEL_SCOPE" --token "$VERCEL_TOKEN"
          npx --yes vercel@latest build --prod --scope "$VERCEL_SCOPE" --token "$VERCEL_TOKEN"
      - name: Deploy the completed packet once through the token bridge
        if: steps.mode.outputs.mode == 'direct-token'
        id: direct_deploy
        env:
          VERCEL_GIT_COMMIT_SHA: ${{ steps.authorize.outputs.selected_sha }}
          VERCEL_GIT_COMMIT_REF: main
          VERCEL_GIT_REPO_SLUG: TD613-TCP
          VERCEL_GIT_REPO_OWNER: tauric-diana-613
        run: |
          set -euo pipefail
          DEPLOY_LOG="$(mktemp)"
          npx --yes vercel@latest deploy --prebuilt --prod --yes --scope "$VERCEL_SCOPE" --token "$VERCEL_TOKEN" | tee "$DEPLOY_LOG"
          DEPLOY_URL="$(grep -Eo 'https://[^[:space:]]+' "$DEPLOY_LOG" | tail -n 1)"
          [[ -n "$DEPLOY_URL" ]] || { echo 'Vercel returned no deployment URL.' >&2; exit 1; }
          echo "deployment_url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
      - name: Create one bounded Git-fallback release commit
        if: steps.mode.outputs.mode == 'git-fallback'
        id: fallback_release
        run: |
          set -euo pipefail
          node --input-type=module <<'NODE'
          import fs from 'node:fs';
          const path='vercel.json'; const config=JSON.parse(fs.readFileSync(path,'utf8'));
          if (config.git?.deploymentEnabled !== false) throw new Error('Fallback requires the lock closed.');
          config.git.deploymentEnabled=true; fs.writeFileSync(path,`${JSON.stringify(config,null,2)}\n`);
          NODE
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add vercel.json
          git commit -m "release: enable one Vercel deployment for ${{ steps.authorize.outputs.selected_sha }}"
          RELEASE_SHA="$(git rev-parse HEAD)"
          git push origin HEAD:main
          echo "release_sha=$RELEASE_SHA" >> "$GITHUB_OUTPUT"
          echo "deployment_url=$TD613_CANONICAL_PRODUCTION_URL" >> "$GITHUB_OUTPUT"
      - name: Resolve deployed production URL
        id: deployed
        run: |
          if [[ "${{ steps.mode.outputs.mode }}" == 'direct-token' ]]; then URL='${{ steps.direct_deploy.outputs.deployment_url }}'; else URL='${{ steps.fallback_release.outputs.deployment_url }}'; fi
          [[ -n "$URL" ]] || { echo 'Release route produced no URL.' >&2; exit 1; }
          echo "url=$URL" >> "$GITHUB_OUTPUT"
      - name: Verify deployed bytes match the authorized source packet
        env:
          TD613_BASE_URL: ${{ steps.deployed.outputs.url }}
          TD613_SOURCE_PACKET_COMMIT: ${{ steps.authorize.outputs.selected_sha }}
          TD613_ARTIFACT_DIR: artifacts/flowcore-production-observation
          TD613_PROBE_ATTEMPTS: ${{ steps.mode.outputs.mode == 'git-fallback' && '72' || '24' }}
          TD613_PROBE_DELAY_MS: '5000'
        run: node scripts/flowcore-release-content-probe.mjs
      - name: Install production browser observers
        run: |
          npm install --no-save --package-lock=false playwright@1.53.2
          npx playwright install --with-deps chromium firefox webkit
      - name: Observe deployed Flow-Core browser matrix
        env:
          TD613_BASE_URL: ${{ steps.deployed.outputs.url }}
          TD613_FLOWCORE_ROUTE_PREFIX: dome-world
          TD613_BROWSERS: chromium,firefox,webkit
          TD613_SOURCE_PACKET_COMMIT: ${{ steps.authorize.outputs.selected_sha }}
          TD613_PRODUCTION_OBSERVATION: 'true'
          TD613_ARTIFACT_DIR: artifacts/flowcore-production-observation
        run: node scripts/flowcore-runtime-browser-probe.mjs
      - name: Observe deployed Ash Keep AIA3 task matrix
        env:
          TD613_BASE_URL: ${{ steps.deployed.outputs.url }}
          TD613_SOURCE_PACKET_COMMIT: ${{ steps.authorize.outputs.selected_sha }}
          TD613_PRODUCTION_OBSERVATION: 'true'
        run: |
          set -euo pipefail
          for browser in chromium firefox webkit; do
            TD613_BROWSER="$browser" TD613_ARTIFACT_DIR="artifacts/ash-aia3-production/$browser" node scripts/ash-keep-aia3-task-journey-v2.mjs
          done
      - name: Verify production observations remained bounded
        run: |
          node --input-type=module <<'NODE'
          import fs from 'node:fs';
          const content=JSON.parse(fs.readFileSync('artifacts/flowcore-production-observation/flowcore-production-content-observation.json','utf8'));
          const runtime=JSON.parse(fs.readFileSync('artifacts/flowcore-production-observation/flowcore-runtime-browser-evidence.json','utf8'));
          if(content.status!=='PASS'||content.exact_source_content_verified!==true||content.application_tree_drift!=='none')throw new Error('Exact production content held.');
          if(runtime.status!=='PASS'||runtime.source_packet_commit!==content.source_packet_commit)throw new Error('Flow-Core production matrix held.');
          if(runtime.authority.counts_as_human_evidence!==false||runtime.authority.authorizes_public_route_promotion!==false||runtime.authority.closes_program!==false)throw new Error('Flow-Core observer widened authority.');
          for(const browser of ['chromium','firefox','webkit']){
            const receipt=JSON.parse(fs.readFileSync(`artifacts/ash-aia3-production/${browser}/ash-aia3-task-continuity.json`,'utf8'));
            if(receipt.status!=='PASS'||receipt.source_packet_commit!==content.source_packet_commit)throw new Error(`${browser} AIA3 production journey held or drifted.`);
            if(receipt.authority.counts_as_human_evidence!==false||receipt.authority.authorizes_child_study!==false||receipt.authority.authorizes_release!==false||receipt.authority.closes_program!==false)throw new Error(`${browser} AIA3 observer widened authority.`);
          }
          NODE
      - name: Preserve production evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flowcore-and-ash-aia3-production-release-evidence
          path: |
            artifacts/flowcore-production-observation/
            artifacts/ash-aia3-production/
          if-no-files-found: warn
          retention-days: 45
      - name: Restore the Git deployment lock after fallback
        if: always() && steps.mode.outputs.mode == 'git-fallback' && steps.fallback_release.outputs.release_sha != ''
        id: relock
        run: |
          set -euo pipefail
          node --input-type=module <<'NODE'
          import fs from 'node:fs'; const path='vercel.json'; const config=JSON.parse(fs.readFileSync(path,'utf8')); config.git={...(config.git||{}),deploymentEnabled:false}; fs.writeFileSync(path,`${JSON.stringify(config,null,2)}\n`);
          NODE
          git add vercel.json
          git commit -m "release: restore Vercel deployment lock for ${{ steps.authorize.outputs.selected_sha }}"
          RELOCK_SHA="$(git rev-parse HEAD)"
          git push origin HEAD:main
          echo "relock_sha=$RELOCK_SHA" >> "$GITHUB_OUTPUT"
      - name: Seal successful production release
        if: success()
        run: |
          gh api "repos/$GITHUB_REPOSITORY/issues/$RELEASE_GATE_ISSUE/comments" -f body="$(cat <<EOF_COMMENT
          𝌋 Vercel production release completed and observed.

          \`\`\`text
          source_packet_commit = ${{ steps.authorize.outputs.selected_sha }}
          release_mode = ${{ steps.mode.outputs.mode }}
          release_commit = ${{ steps.fallback_release.outputs.release_sha || 'not-applicable' }}
          relock_commit = ${{ steps.relock.outputs.relock_sha || 'not-applicable' }}
          target = PRODUCTION
          deployment_count = 1
          deployment_url = ${{ steps.deployed.outputs.url }}
          exact_source_content = PASS
          flowcore_browser_matrix = PASS
          ash_keep_aia3_task_matrix = PASS
          ash_keep_desktop = PASS
          ash_keep_mobile_390x844 = PASS
          canonical_fixed_ingress = PASS
          cache_storage_eviction = PASS
          service_worker_eviction = PASS
          indexeddb_cases_preserved = true
          counts_as_human_evidence = false
          child_study_authorized = false
          public_route_promotion_authorized = false
          application_tree_drift = none
          git_auto_deploy = disabled
          \`\`\`
          The production observation closes the exact-source, Flow-Core, AIA3 task-continuity, and tester-cache seams. It does not satisfy the human-study gate, authorize a child study, authorize public promotion, or close the program. Sealed ⟐
          EOF_COMMENT
          )"
      - name: Record held release
        if: failure()
        run: |
          gh api "repos/$GITHUB_REPOSITORY/issues/$RELEASE_GATE_ISSUE/comments" -f body="𝌋 Vercel production release held. Source: ${{ steps.authorize.outputs.selected_sha || 'unresolved' }}. Mode: ${{ steps.mode.outputs.mode || 'unresolved' }}. Release: ${{ steps.fallback_release.outputs.release_sha || 'not-created' }}. Relock: ${{ steps.relock.outputs.relock_sha || 'not-created' }}. Workflow: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID. The fallback relock was attempted when applicable. No additional deployment attempt is authorized by this failure. ⟐"
