name: Vercel Operator Release

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write

concurrency:
  group: td613-vercel-production-release
  cancel-in-progress: false

jobs:
  release:
    if: >-
      github.event.issue.number == 405 &&
      github.event.issue.pull_request == null &&
      github.event.comment.user.login == github.repository_owner &&
      startsWith(github.event.comment.body, '/td613-vercel-release ')
    runs-on: ubuntu-latest
    timeout-minutes: 100
    env:
      RELEASE_GATE_ISSUE: '405'
      VERCEL_PROJECT: td-613-tcp
      VERCEL_SCOPE: tauric-diana-s-projects
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      TD613_CANONICAL_PRODUCTION_URL: https://td613.com
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Check out current main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Validate operator authorization and exact commit
        id: authorize
        shell: bash
        env:
          AUTHORIZATION: ${{ github.event.comment.body }}
        run: |
          set -euo pipefail
          read -r COMMAND TARGET SELECTED_SHA EXTRA <<< "$AUTHORIZATION"
          [[ "$COMMAND" == '/td613-vercel-release' ]] || { echo 'Unexpected release command.' >&2; exit 1; }
          [[ "$TARGET" == 'PRODUCTION' ]] || { echo 'Only the explicitly named PRODUCTION target is accepted.' >&2; exit 1; }
          [[ -z "${EXTRA:-}" ]] || { echo 'Release command must contain exactly command, target, and SHA.' >&2; exit 1; }
          [[ "$SELECTED_SHA" =~ ^[0-9a-f]{40}$ ]] || { echo 'Release command omitted a valid 40-character commit SHA.' >&2; exit 1; }
          CURRENT_MAIN="$(git rev-parse HEAD)"
          [[ "$SELECTED_SHA" == "$CURRENT_MAIN" ]] || { echo "Authorized SHA $SELECTED_SHA is not current main $CURRENT_MAIN." >&2; exit 1; }
          node --input-type=module <<'NODE'
          import fs from 'node:fs';
          const config = JSON.parse(fs.readFileSync('vercel.json', 'utf8'));
          if (config.git?.deploymentEnabled !== false) throw new Error('Git-triggered Vercel deployment lock is not active.');
          NODE
          echo "selected_sha=$SELECTED_SHA" >> "$GITHUB_OUTPUT"

      - name: Record accepted release gesture
        run: |
          gh api "repos/$GITHUB_REPOSITORY/issues/$RELEASE_GATE_ISSUE/comments" \
            -f body="$(cat <<EOF_COMMENT
          𝌋 Operator release gesture accepted.

          \`\`\`text
          target = PRODUCTION
          selected_commit = ${{ steps.authorize.outputs.selected_sha }}
          deployment_ceiling = 1
          safe_harbor_wave_b = required
          ash_generation = AIA3
          git_auto_deploy = disabled
          workflow_run = $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID
          \`\`\`

          The gate will run the complete Safe Harbor Gen3 Wave B, Research Track R boundary, Flow-Core, and Ash Keep AIA3 closures; choose one bounded credential route; deploy once; observe exact production content; and run the governed browser matrices. ⟐
          EOF_COMMENT
          )"

      - name: Install dependencies
        run: npm ci

      - name: Verify release-critical, Safe Harbor Wave B, Flow-Core, and Ash Keep AIA3 closure contracts
        run: |
          node tests/vercel-deploy-hygiene.test.mjs
          node tests/vercel-operator-release-gate.test.mjs
          npm run test:safe-harbor:gen3:wave-b
          npm run test:safe-harbor:gen3:track-r
          npm run test:safe-harbor:phase9.1c
          npm run test:safe-harbor:current
          node tests/safe-harbor-gen3-wave-b-production-probe-contract.test.mjs
          node tests/product-architecture/shell.test.mjs
          node tests/ash-live-ingress-demos-cache.test.mjs
          node tests/ash-aia3-mass-eviction.test.mjs
          node --test tests/ash-keep-live-aia-surface.test.mjs
          node tests/td613-flight-mobile-layout.test.mjs
          node tests/flowcore-p0-p10-completion.test.mjs
          node tests/flowcore-p0-p7-seam-closure.test.mjs
          node tests/flowcore-physical-scene.test.mjs
          node tests/flowcore-empirical-validation.test.mjs
          node tests/flowcore-production-promotion.test.mjs
          node tests/flowcore-runtime-browser-probe.test.mjs
          node --check scripts/safe-harbor-gen3-wave-a-production-probe.mjs
          node --check scripts/safe-harbor-gen3-wave-b-production-assets.mjs
          node --check scripts/safe-harbor-gen3-wave-b-production-probe.mjs
          node --check scripts/ash-keep-local-closure-server.mjs
          node --check scripts/ash-keep-aia3-task-journey-v3.mjs

      - name: Choose one bounded Vercel release route
        id: mode
        run: |
          if [[ -n "${VERCEL_TOKEN:-}" ]]; then
            echo 'mode=direct-token' >> "$GITHUB_OUTPUT"
          else
            echo 'mode=git-fallback' >> "$GITHUB_OUTPUT"
          fi

      - name: Link exact repository to the existing Vercel project
        if: steps.mode.outputs.mode == 'direct-token'
        run: npx --yes vercel@latest link --yes --project "$VERCEL_PROJECT" --scope "$VERCEL_SCOPE" --token "$VERCEL_TOKEN"

      - name: Pull production environment and build once
        if: steps.mode.outputs.mode == 'direct-token'
        run: |
          set -euo pipefail
          npx --yes vercel@latest pull --yes --environment=production --scope "$VERCEL_SCOPE" --token "$VERCEL_TOKEN"
          npx --yes vercel@latest build --prod --scope "$VERCEL_SCOPE" --token "$VERCEL_TOKEN"

      - name: Deploy the completed packet once through the token bridge
        if: steps.mode.outputs.mode == 'direct-token'
        id: direct_deploy
        env:
          VERCEL_GIT_COMMIT_SHA: ${{ steps.authorize.outputs.selected_sha }}
          VERCEL_GIT_COMMIT_REF: main
          VERCEL_GIT_REPO_SLUG: TD613-TCP
          VERCEL_GIT_REPO_OWNER: tauric-diana-613
        run: |
          set -euo pipefail
          DEPLOY_LOG="$(mktemp)"
          npx --yes vercel@latest deploy --prebuilt --prod --yes --scope "$VERCEL_SCOPE" --token "$VERCEL_TOKEN" | tee "$DEPLOY_LOG"
          DEPLOY_URL="$(grep -Eo 'https://[^[:space:]]+' "$DEPLOY_LOG" | tail -n 1)"
          [[ -n "$DEPLOY_URL" ]] || { echo 'Vercel returned no deployment URL.' >&2; exit 1; }
          echo "deployment_url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"

      - name: Create one bounded Git-fallback release commit
        if: steps.mode.outputs.mode == 'git-fallback'
        id: fallback_release
        run: |
          set -euo pipefail
          node --input-type=module <<'NODE'
          import fs from 'node:fs';
          const path = 'vercel.json';
          const config = JSON.parse(fs.readFileSync(path, 'utf8'));
          if (config.git?.deploymentEnabled !== false) throw new Error('Fallback requires the deployment lock to begin closed.');
          config.git.deploymentEnabled = true;
          fs.writeFileSync(path, `${JSON.stringify(config, null, 2)}\n`);
          NODE
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add vercel.json
          git commit -m "release: enable one Vercel deployment for ${{ steps.authorize.outputs.selected_sha }}"
          RELEASE_SHA="$(git rev-parse HEAD)"
          git push origin HEAD:main
          echo "release_sha=$RELEASE_SHA" >> "$GITHUB_OUTPUT"
          echo "deployment_url=$TD613_CANONICAL_PRODUCTION_URL" >> "$GITHUB_OUTPUT"

      - name: Resolve deployed production URL
        id: deployed
        run: |
          if [[ "${{ steps.mode.outputs.mode }}" == 'direct-token' ]]; then
            URL='${{ steps.direct_deploy.outputs.deployment_url }}'
          else
            URL='${{ steps.fallback_release.outputs.deployment_url }}'
          fi
          [[ -n "$URL" ]] || { echo 'Release route produced no production URL.' >&2; exit 1; }
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Verify deployed bytes match the authorized source packet
        env:
          TD613_BASE_URL: ${{ steps.deployed.outputs.url }}
          TD613_SOURCE_PACKET_COMMIT: ${{ steps.authorize.outputs.selected_sha }}
          TD613_ARTIFACT_DIR: artifacts/flowcore-production-observation
          TD613_PROBE_ATTEMPTS: ${{ steps.mode.outputs.mode == 'git-fallback' && '72' || '24' }}
          TD613_PROBE_DELAY_MS: '5000'
        run: node scripts/flowcore-release-content-probe.mjs

      - name: Install production browser observers
        run: |
          npm install --no-save --package-lock=false playwright@1.53.2
          npx playwright install --with-deps chromium firefox webkit

      - name: Observe deployed Safe Harbor Gen3 Wave A
        env:
          TD613_BASE_URL: ${{ steps.deployed.outputs.url }}
          TD613_SOURCE_PACKET_COMMIT: ${{ steps.authorize.outputs.selected_sha }}
          TD613_ARTIFACT_DIR: artifacts/safe-harbor-gen3-wave-a-production
        run: node scripts/safe-harbor-gen3-wave-a-production-probe.mjs

      - name: Observe deployed Safe Harbor Gen3 Wave B
        env:
          TD613_BASE_URL: ${{ steps.deployed.outputs.url }}
          TD613_SOURCE_PACKET_COMMIT: ${{ steps.authorize.outputs.selected_sha }}
          TD613_ARTIFACT_DIR: artifacts/safe-harbor-gen3-wave-b-production
        run: node scripts/safe-harbor-gen3-wave-b-production-probe.mjs

      - name: Observe the deployed Flow-Core browser matrix
        env:
          TD613_BASE_URL: ${{ steps.deployed.outputs.url }}
          TD613_FLOWCORE_ROUTE_PREFIX: dome-world
          TD613_BROWSERS: chromium,firefox,webkit
          TD613_SOURCE_PACKET_COMMIT: ${{ steps.authorize.outputs.selected_sha }}
          TD613_PRODUCTION_OBSERVATION: 'true'
          TD613_ARTIFACT_DIR: artifacts/flowcore-production-observation
        run: node scripts/flowcore-runtime-browser-probe.mjs

      - name: Observe the deployed Ash Keep AIA3 task matrix
        env:
          TD613_BASE_URL: ${{ steps.deployed.outputs.url }}
          TD613_SOURCE_PACKET_COMMIT: ${{ steps.authorize.outputs.selected_sha }}
          TD613_PRODUCTION_OBSERVATION: 'true'
        run: |
          set -euo pipefail
          for browser in chromium firefox webkit; do
            TD613_BROWSER="$browser" \
            TD613_ARTIFACT_DIR="artifacts/ash-aia3-production/$browser" \
            node scripts/ash-keep-aia3-task-journey-v3.mjs
          done

      - name: Verify production observations remained bounded
        run: |
          node --input-type=module <<'NODE'
          import fs from 'node:fs';
          const content = JSON.parse(fs.readFileSync('artifacts/flowcore-production-observation/flowcore-production-content-observation.json', 'utf8'));
          const runtime = JSON.parse(fs.readFileSync('artifacts/flowcore-production-observation/flowcore-runtime-browser-evidence.json', 'utf8'));
          const safeHarborWaveA = JSON.parse(fs.readFileSync('artifacts/safe-harbor-gen3-wave-a-production/safe-harbor-gen3-wave-a-production-observation.json', 'utf8'));
          const safeHarborWaveB = JSON.parse(fs.readFileSync('artifacts/safe-harbor-gen3-wave-b-production/safe-harbor-gen3-wave-b-production-observation.json', 'utf8'));
          if (content.status !== 'PASS' || content.exact_source_content_verified !== true || content.application_tree_drift !== 'none') throw new Error('Exact production content observation held.');
          if (safeHarborWaveA.status !== 'PASS') throw new Error('Production Safe Harbor Gen3 Wave A observation held.');
          if (safeHarborWaveA.source_packet_commit !== content.source_packet_commit) throw new Error('Safe Harbor Wave A and Flow-Core observations disagree on the source packet.');
          if (safeHarborWaveA.authority?.counts_as_identity_adjudication !== false || safeHarborWaveA.authority?.counts_as_external_authorship_adjudication !== false || safeHarborWaveA.authority?.authorizes_research_track_r_promotion !== false || safeHarborWaveA.authority?.authorizes_wave_b !== false) throw new Error('Safe Harbor Wave A production observer widened authority.');
          if (safeHarborWaveB.status !== 'PASS') throw new Error('Production Safe Harbor Gen3 Wave B observation held.');
          if (safeHarborWaveB.source_packet_commit !== content.source_packet_commit) throw new Error('Safe Harbor Wave B and Flow-Core observations disagree on the source packet.');
          if (safeHarborWaveB.authority?.counts_as_identity_adjudication !== false || safeHarborWaveB.authority?.counts_as_external_authorship_adjudication !== false || safeHarborWaveB.authority?.authorizes_research_track_r_promotion !== false || safeHarborWaveB.authority?.authorizes_future_release !== false) throw new Error('Safe Harbor Wave B production observer widened authority.');
          if (runtime.status !== 'PASS') throw new Error('Production Flow-Core browser matrix held.');
          if (runtime.source_packet_commit !== content.source_packet_commit) throw new Error('Production Flow-Core observations disagree on the source packet.');
          if (runtime.authority.counts_as_human_evidence !== false || runtime.authority.authorizes_public_route_promotion !== false || runtime.authority.closes_program !== false) throw new Error('Production Flow-Core observer widened authority.');
          for (const browser of ['chromium', 'firefox', 'webkit']) {
            const receipt = JSON.parse(fs.readFileSync(`artifacts/ash-aia3-production/${browser}/ash-aia3-task-continuity.json`, 'utf8'));
            if (receipt.status !== 'PASS') throw new Error(`Production Ash Keep AIA3 ${browser} task journey held.`);
            if (receipt.source_packet_commit !== content.source_packet_commit) throw new Error(`Production Ash Keep AIA3 ${browser} source packet drifted.`);
            const authority = receipt.authority || {};
            if (authority.counts_as_human_evidence !== false || authority.authorizes_child_study !== false || authority.authorizes_release !== false || authority.closes_program !== false) throw new Error(`Production Ash Keep AIA3 ${browser} observer widened authority.`);
          }
          NODE

      - name: Preserve production evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: safe-harbor-wave-a-wave-b-flowcore-and-ash-aia3-production-release-evidence
          path: |
            artifacts/safe-harbor-gen3-wave-a-production/
            artifacts/safe-harbor-gen3-wave-b-production/
            artifacts/flowcore-production-observation/
            artifacts/ash-aia3-production/
          if-no-files-found: warn
          retention-days: 45

      - name: Restore the Git deployment lock after fallback
        if: always() && steps.mode.outputs.mode == 'git-fallback' && steps.fallback_release.outputs.release_sha != ''
        id: relock
        run: |
          set -euo pipefail
          node --input-type=module <<'NODE'
          import fs from 'node:fs';
          const path = 'vercel.json';
          const config = JSON.parse(fs.readFileSync(path, 'utf8'));
          config.git = { ...(config.git || {}), deploymentEnabled: false };
          fs.writeFileSync(path, `${JSON.stringify(config, null, 2)}\n`);
          NODE
          git add vercel.json
          git commit -m "release: restore Vercel deployment lock for ${{ steps.authorize.outputs.selected_sha }}"
          RELOCK_SHA="$(git rev-parse HEAD)"
          git push origin HEAD:main
          echo "relock_sha=$RELOCK_SHA" >> "$GITHUB_OUTPUT"

      - name: Seal successful production release
        if: success()
        run: |
          gh api "repos/$GITHUB_REPOSITORY/issues/$RELEASE_GATE_ISSUE/comments" \
            -f body="$(cat <<EOF_COMMENT
          𝌋 Vercel production release completed and observed.

          \`\`\`text
          source_packet_commit = ${{ steps.authorize.outputs.selected_sha }}
          release_mode = ${{ steps.mode.outputs.mode }}
          release_commit = ${{ steps.fallback_release.outputs.release_sha || 'not-applicable' }}
          relock_commit = ${{ steps.relock.outputs.relock_sha || 'not-applicable' }}
          target = PRODUCTION
          deployment_count = 1
          deployment_url = ${{ steps.deployed.outputs.url }}
          exact_source_content = PASS
          safe_harbor_gen3_wave_a = PASS
          safe_harbor_gen3_wave_b = PASS
          safe_harbor_packet_creation = PASS
          safe_harbor_shi_exact_match = PASS
          safe_harbor_packet_restore = PASS
          safe_harbor_adverse_result_retention = PASS
          safe_harbor_raw_text_exclusion = PASS
          temporal_bloom_desktop_1440x1000 = PASS
          temporal_bloom_mobile_390x844 = PASS
          temporal_bloom_reduced_motion = PASS
          temporal_bloom_public_counts_hidden = PASS
          provenance_authority_chronology = PASS
          provenance_countersignature_states = PASS
          provenance_deterministic_svg = PASS
          provenance_imitation_collision_reduction = PASS
          flowcore_browser_matrix = PASS
          ash_keep_aia3_task_matrix = PASS
          ash_keep_fresh_client = PASS
          ash_keep_retired_aia2_eviction = PASS
          ash_keep_case_preservation = PASS
          ash_keep_desktop = PASS
          ash_keep_mobile_390x844 = PASS
          counts_as_identity_adjudication = false
          research_track_r_promotion_authorized = false
          future_safe_harbor_release_authorized = false
          counts_as_human_evidence = false
          child_study_authorized = false
          public_route_promotion_authorized = false
          application_tree_drift = none
          git_auto_deploy = disabled
          \`\`\`

          The production observation closes the exact-source, Safe Harbor Gen3 Wave A and Wave B runtimes, Flow-Core runtime, Ash Keep AIA3 task-continuity, and retired-client delivery seams. It does not prove civil identity or universal authorship, promote Research Track R, authorize a future Safe Harbor release, satisfy the held adult empirical gate, authorize a child study, authorize public route promotion, or close the program. Sealed ⟐
          EOF_COMMENT
          )"

      - name: Record held release
        if: failure()
        run: |
          gh api "repos/$GITHUB_REPOSITORY/issues/$RELEASE_GATE_ISSUE/comments" \
            -f body="$(cat <<EOF_COMMENT
          𝌋 Vercel production release held.

          \`\`\`text
          source_packet_commit = ${{ steps.authorize.outputs.selected_sha || 'unresolved' }}
          release_mode = ${{ steps.mode.outputs.mode || 'unresolved' }}
          release_commit = ${{ steps.fallback_release.outputs.release_sha || 'not-created' }}
          relock_commit = ${{ steps.relock.outputs.relock_sha || 'not-created' }}
          target = PRODUCTION
          deployment_ceiling = 1
          workflow_run = $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID
          \`\`\`

          The fallback lock-restoration step was attempted when applicable. No additional deployment attempt is authorized by this failure. ⟐
          EOF_COMMENT
          )"
