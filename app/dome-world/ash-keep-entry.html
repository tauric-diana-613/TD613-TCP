<!doctype html>
<html lang="en" data-ash-delivery-state="booting">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="color-scheme" content="dark">
  <meta name="theme-color" content="#04130f">
  <meta name="ash-delivery-adapter" content="v0.1">
  <meta name="ash-lifecycle" content="v0.1">
  <link rel="modulepreload" href="/dome-world/ash-lifecycle.js">
  <title>TD613 Ash Keep · Opening</title>
  <style>
    :root{color-scheme:dark;font-family:Inter,system-ui,sans-serif;background:#020806;color:#fff8da}
    *{box-sizing:border-box}html,body{min-height:100%;margin:0}body{display:grid;place-items:center;padding:24px;background:#020806;background-image:linear-gradient(rgba(118,234,212,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(118,234,212,.035) 1px,transparent 1px);background-size:32px 32px}
    main{width:min(680px,100%);padding:28px;border:1px solid rgba(118,234,212,.24);background:#071a15;clip-path:polygon(14px 0,100% 0,100% calc(100% - 14px),calc(100% - 14px) 100%,0 100%,0 14px)}
    p{color:#9ab4aa;line-height:1.6}code{color:#76ead4}strong{color:#e4c66c}.pulse{width:9px;height:9px;background:#76ead4;box-shadow:0 0 18px #76ead4;animation:pulse 1.2s ease-in-out infinite alternate}@keyframes pulse{to{opacity:.25}}
    @media(prefers-reduced-motion:reduce){.pulse{animation:none}}
  </style>
</head>
<body>
  <main id="ashDeliveryAdapter" aria-live="polite">
    <div class="pulse" aria-hidden="true"></div>
    <h1>Opening Ash Keep</h1>
    <p id="ashDeliveryStatus">Receiving the static source document, then binding the lifecycle locally.</p>
    <p><code>document delivery ≠ custody · adapter ≠ transport</code></p>
  </main>
  <script type="module" src="/dome-world/ash-keep-entry.js"></script>
</body>
</html>
