<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="color-scheme" content="dark light">
  <title>Information Dome · Flow-Core Pedagogue</title>
  <link rel="stylesheet" href="./flowcore-pedagogue.css">
  <link rel="stylesheet" href="./information-dome-pedagogue.css">
</head>
<body>
  <main class="information-dome" data-flowcore-pedagogue aria-busy="true">
    <header class="information-dome__header">
      <p class="information-dome__eyebrow">U+10D613 · Tauric Diana 613</p>
      <h1>Information Dome</h1>
      <p>Experience consequence before ontology. Choose the scene and legibility route explicitly; the system does not infer one for you.</p>
    </header>

    <nav class="information-dome__choices" aria-label="Canonical proving scene" data-scene-nav></nav>
    <nav class="information-dome__choices" aria-label="Anisotropic information route" data-route-nav></nav>

    <section class="information-dome__status" aria-labelledby="scene-title">
      <h2 id="scene-title" data-scene-title>Loading governed scene…</h2>
      <p aria-live="polite" aria-atomic="true" data-bounded-live>Compiling deterministic scene packages.</p>
    </section>

    <section class="flowcore-pedagogue__channels" data-scene-stage></section>

    <footer class="information-dome__controls">
      <button type="button" data-rest>𝄐 Rest</button>
      <button type="button" data-return>Return</button>
      <button type="button" data-replay>Replay</button>
      <a class="information-dome__exit" href="./index.html">Exit to Dome-World</a>
    </footer>
  </main>
  <script type="module" src="./information-dome-pedagogue-page.js"></script>
</body>
</html>
