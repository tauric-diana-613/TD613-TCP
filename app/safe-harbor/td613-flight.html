<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>TD613 Flight</title>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<style>
html,body{margin:0;width:100%;height:100%;min-height:100dvh;overflow:hidden;background:#010606}
#flightFrame{display:block;width:100vw;height:100dvh;border:0;background:#010606}
#flightLoading{position:fixed;inset:0;display:grid;place-items:center;font:700 12px ui-monospace,monospace;letter-spacing:.14em;text-transform:uppercase;color:#31ff8a;background:#010606}
</style>
</head>
<body>
<div id="flightLoading">Loading TD613 Flight…</div>
<iframe id="flightFrame" title="TD613 Flight" src="./td613-flight-legacy.html" allow="clipboard-read; clipboard-write"></iframe>
<script>
(function(){
  var frame=document.getElementById('flightFrame');
  var loading=document.getElementById('flightLoading');
  function inject(){
    var doc;
    try{doc=frame.contentDocument||frame.contentWindow.document;}catch(e){return;}
    if(!doc||!doc.head)return;
    if(loading)loading.hidden=true;
    if(!doc.getElementById('td613-flight-mobile-hotfix-css')){
      var link=doc.createElement('link');
      link.id='td613-flight-mobile-hotfix-css';
      link.rel='stylesheet';
      link.href='./td613-flight-mobile-hotfix.css';
      doc.head.appendChild(link);
    }
    if(!doc.getElementById('td613-flight-mobile-hotfix-js')){
      var script=doc.createElement('script');
      script.id='td613-flight-mobile-hotfix-js';
      script.src='./td613-flight-mobile-hotfix.js';
      doc.body.appendChild(script);
    }
  }
  frame.addEventListener('load',function(){inject();setTimeout(inject,60);setTimeout(inject,300);});
})();
</script>
</body>
</html>
